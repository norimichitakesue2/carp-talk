<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カープトーク 管理画面</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0e11;color:#eef0f4;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px;min-height:100vh}
header{background:#13161b;border-bottom:1px solid rgba(255,255,255,0.1);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:700;color:#c8102e}
.logo span{color:#eef0f4;font-weight:400;font-size:13px;margin-left:8px}
.container{max-width:800px;margin:0 auto;padding:2rem 1rem}
.card{background:#13161b;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.card-title{font-size:12px;font-weight:700;letter-spacing:0.12em;color:#7a8090;text-transform:uppercase;margin-bottom:1.25rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.single{grid-template-columns:1fr}
.form-row.triple{grid-template-columns:1fr 1fr 1fr}
label{font-size:12px;color:#7a8090;margin-bottom:4px;display:block}
input,select,textarea{width:100%;background:#0c0e11;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px 12px;font-size:14px;color:#eef0f4;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#4a9eff}
textarea{resize:vertical;min-height:120px;font-size:12px;font-family:'Menlo','Monaco',monospace}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity 0.15s}
.btn-primary{background:#c8102e;color:#fff}
.btn-secondary{background:#1a1e25;color:#eef0f4;border:1px solid rgba(255,255,255,0.12)}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-row{display:flex;gap:8px;margin-top:1rem}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(12px);background:#3ecf8e;color:#061a10;font-size:13px;font-weight:700;padding:0.5rem 1.4rem;border-radius:99px;opacity:0;pointer-events:none;transition:opacity 0.25s,transform 0.25s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:#f46060;color:#fff}
.game-list{display:flex;flex-direction:column;gap:8px}
.game-item{background:#1a1e25;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color 0.15s}
.game-item:hover{border-color:rgba(255,255,255,0.2)}
.game-item-date{font-size:13px;font-weight:600}
.game-item-actions{display:flex;gap:6px}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
.token-input-row{display:flex;gap:8px}
.token-input-row input{flex:1}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-ok{background:#3ecf8e}
.status-ng{background:#f46060}
.help-text{font-size:11px;color:#7a8090;margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem}
.tab{padding:6px 16px;font-size:13px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);color:#7a8090;background:transparent;font-family:inherit}
.tab.active{background:#1a1e25;color:#eef0f4;border-color:rgba(255,255,255,0.15)}
.moment-item{background:#1a1e25;border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:12px;margin-bottom:8px}
.moment-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.moment-header input{flex:1}
.add-moment-btn{width:100%;padding:8px;background:transparent;border:1px dashed rgba(255,255,255,0.15);border-radius:8px;color:#7a8090;cursor:pointer;font-family:inherit;font-size:13px;margin-top:4px}
.add-moment-btn:hover{border-color:rgba(255,255,255,0.3);color:#eef0f4}
.player-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.player-item{display:flex;gap:6px}
.player-item input:first-child{flex:2}
.player-item input:last-child{flex:1;min-width:40px}
.add-player-btn{margin-top:8px;padding:6px;background:transparent;border:1px dashed rgba(255,255,255,0.15);border-radius:6px;color:#7a8090;cursor:pointer;font-family:inherit;font-size:12px;width:100%}
</style>
</head>
<body>
<header>
  <div class="logo">カープトーク <span>管理画面</span></div>
  <div id="token-status" style="font-size:12px;color:#7a8090">未設定</div>
</header>
<div class="container">
  <div class="card">
    <div class="card-title">GitHub 設定</div>
    <div class="token-input-row">
      <input type="password" id="gh-token" placeholder="GitHub Personal Access Token (repo権限)">
      <button class="btn btn-secondary" onclick="saveToken()">保存</button>
    </div>
    <div class="help-text">トークンはlocalStorageに保存されます（リポジトリ: norimichitakesue2/carp-talk）</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('edit',this)">試合データ登録・編集</button>
    <button class="tab" onclick="showTab('list',this)">登録済み試合一覧</button>
  </div>
  <div id="tab-edit">
    <div class="card">
      <div class="card-title">試合基本情報</div>
      <div class="form-row">
        <div><label>試合日</label><input type="date" id="f-date"></div>
        <div><label>会場</label><input type="text" id="f-venue" value="マツダスタジアム"></div>
      </div>
      <div class="form-row">
        <div><label>ホーム</label><input type="text" id="f-home" value="広島"></div>
        <div><label>アウェイ</label><input type="text" id="f-away" placeholder="例: 阪神"></div>
      </div>
      <div class="form-row triple">
        <div><label>広島得点</label><input type="number" id="f-home-score" min="0" value="0"></div>
        <div><label>相手得点</label><input type="number" id="f-away-score" min="0" value="0"></div>
        <div><label>結果ラベル</label><input type="text" id="f-result" placeholder="例: サヨナラ、延長10回"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">分岐点シーン</div>
      <div id="moments-list"></div>
      <button class="add-moment-btn" onclick="addMoment()">＋ シーンを追加</button>
    </div>
    <div class="card">
      <div class="card-title">出場選手</div>
      <div id="players-list" class="player-grid"></div>
      <button class="add-player-btn" onclick="addPlayer()">＋ 選手を追加</button>
    </div>
    <div class="card">
      <div class="card-title">継投情報（JSON）</div>
      <textarea id="f-pitchers" placeholder='[{"team":"広島","role":"先発","name":"栗林 良吏","era":"0.00","result":"win"},{"team":"阪神","role":"先発","name":"大竹 耕太郎","result":"loss"}]'></textarea>
      <div class="help-text">result: "win"/"loss"/"save"、era: 防御率（任意）</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveGame()">GitHubに保存してデプロイ</button>
      <button class="btn btn-secondary" onclick="previewJSON()">JSON確認</button>
      <button class="btn btn-secondary" onclick="clearForm()">クリア</button>
    </div>
  </div>
  <div id="tab-list" style="display:none">
    <div class="card">
      <div class="card-title">登録済み試合</div>
      <div id="game-list-container"><div style="color:#7a8090;font-size:13px">読み込み中...</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var REPO='norimichitakesue2/carp-talk';
function getToken(){return localStorage.getItem('ct_gh_token')||'';}
function saveToken(){var t=document.getElementById('gh-token').value.trim();if(!t)return;localStorage.setItem('ct_gh_token',t);updateTokenStatus();showToast('トークンを保存しました');}
function updateTokenStatus(){var t=getToken(),el=document.getElementById('token-status');el.innerHTML=t?'<span class="status-dot status-ok"></span>設定済み':'<span class="status-dot status-ng"></span>未設定';}
function showToast(msg,isErr){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(isErr?' error':'');setTimeout(function(){t.className='toast';},3000);}
function showTab(tab,el){document.getElementById('tab-edit').style.display=tab==='edit'?'block':'none';document.getElementById('tab-list').style.display=tab==='list'?'block':'none';document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');if(tab==='list')loadGameList();}
var momentCount=0;
function addMoment(data){momentCount++;var id=momentCount;var div=document.createElement('div');div.className='moment-item';div.id='moment-'+id;div.innerHTML='<div class="moment-header"><input type="text" placeholder="例: 1回裏" style="width:90px;flex:none" id="m-inning-'+id+'" value="'+(data?esc(data.inning):'')+'"><select id="m-type-'+id+'" style="width:100px;flex:none"><option value="score"'+(data&&data.type==='score'?' selected':'')+'>得点</option><option value="pitcher"'+(data&&data.type==='pitcher'?' selected':'')+'>投手好投</option><option value="hr"'+(data&&data.type==='hr'?' selected':'')+'>本塁打</option><option value="crisis"'+(data&&data.type==='crisis'?' selected':'')+'>ピンチ脱出</option></select><button onclick="document.getElementById('moment-'+id+'').remove()" style="background:transparent;border:none;color:#7a8090;cursor:pointer;font-size:16px;padding:0 4px">×</button></div><input type="text" placeholder="シーンの説明" id="m-desc-'+id+'" value="'+(data?esc(data.desc||''):'')+'"><input type="text" placeholder="補足" id="m-sub-'+id+'" value="'+(data?esc(data.sub||''):'')+'" style="margin-top:6px">';document.getElementById('moments-list').appendChild(div);}
function getMoments(){var r=[];document.querySelectorAll('.moment-item').forEach(function(item,i){var id=item.id.replace('moment-','');r.push({id:i+1,inning:document.getElementById('m-inning-'+id).value,type:document.getElementById('m-type-'+id).value,desc:document.getElementById('m-desc-'+id).value,sub:document.getElementById('m-sub-'+id).value});});return r;}
var playerCount=0;
function addPlayer(data){playerCount++;var id=playerCount;var div=document.createElement('div');div.className='player-item';div.id='player-'+id;div.innerHTML='<input type="text" placeholder="選手名" id="p-name-'+id+'" value="'+(data?esc(data.name||''):'')+'"><input type="text" placeholder="守" id="p-pos-'+id+'" value="'+(data?esc(data.pos||''):'')+'" style="width:50px"><button onclick="document.getElementById('player-'+id+'').remove()" style="background:transparent;border:none;color:#7a8090;cursor:pointer;padding:0 4px;flex:none">×</button>';document.getElementById('players-list').appendChild(div);}
function getPlayers(){var r=[];document.querySelectorAll('.player-item').forEach(function(item){var id=item.id.replace('player-','');var n=document.getElementById('p-name-'+id).value.trim();if(n)r.push({name:n,pos:document.getElementById('p-pos-'+id).value.trim()});});return r;}
function esc(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function clearForm(){document.getElementById('moments-list').innerHTML='';momentCount=0;document.getElementById('players-list').innerHTML='';playerCount=0;document.getElementById('f-away').value='';document.getElementById('f-home-score').value=0;document.getElementById('f-away-score').value=0;document.getElementById('f-result').value='';document.getElementById('f-pitchers').value='';}
function buildGameData(){var date=document.getElementById('f-date').value;var pitRaw=document.getElementById('f-pitchers').value.trim();var pit=[];if(pitRaw){try{pit=JSON.parse(pitRaw);}catch(e){showToast('継投JSONが無効です',true);return null;}}return{id:'npb_'+date.replace(/-/g,''),game_date:date,home_team:document.getElementById('f-home').value,away_team:document.getElementById('f-away').value,home_score:parseInt(document.getElementById('f-home-score').value)||0,away_score:parseInt(document.getElementById('f-away-score').value)||0,venue:document.getElementById('f-venue').value,status:'final',result_label:document.getElementById('f-result').value,pitchers:pit,moments:getMoments(),players:getPlayers()};}
function previewJSON(){var d=buildGameData();if(!d)return;alert(JSON.stringify(d,null,2));}
async function saveGame(){var token=getToken();if(!token){showToast('GitHubトークンを設定してください',true);return;}var data=buildGameData();if(!data)return;if(!data.away_team){showToast('相手チームを入力してください',true);return;}if(!data.moments.length){showToast('分岐点シーンを追加してください',true);return;}var btn=document.querySelector('.btn-primary');btn.disabled=true;btn.textContent='保存中...';try{var path='games/'+data.game_date+'.json';var H={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};var api='https://api.github.com/repos/'+REPO;var content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));var existing=await fetch(api+'/contents/'+path,{headers:H});var sha=existing.ok?(await existing.json()).sha:null;var body={message:'試合データ: '+data.game_date+' 広島vs'+data.away_team,content:content};if(sha)body.sha=sha;var res=await fetch(api+'/contents/'+path,{method:'PUT',headers:H,body:JSON.stringify(body)});var result=await res.json();if(result.content){showToast('✅ 保存完了！Vercelが自動デプロイします');}else{showToast('エラー: '+JSON.stringify(result).slice(0,60),true);}}catch(e){showToast('エラー: '+e.message,true);}finally{btn.disabled=false;btn.textContent='GitHubに保存してデプロイ';}}
async function loadGameList(){var token=getToken();if(!token){document.getElementById('game-list-container').innerHTML='<div style="color:#7a8090;font-size:13px">トークンを設定してください</div>';return;}var H={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'};try{var r=await fetch('https://api.github.com/repos/'+REPO+'/contents/games',{headers:H});if(!r.ok){document.getElementById('game-list-container').innerHTML='<div style="color:#7a8090;font-size:13px">gamesフォルダがまだありません</div>';return;}var files=await r.json();if(!files.length){document.getElementById('game-list-container').innerHTML='<div style="color:#7a8090;font-size:13px">試合データがまだありません</div>';return;}var html='<div class="game-list">';files.sort(function(a,b){return b.name.localeCompare(a.name);}).forEach(function(f){var date=f.name.replace('.json','');html+='<div class="game-item"><span class="game-item-date">'+date+'</span><div class="game-item-actions"><a href="/?date='+date+'" target="_blank" class="btn btn-secondary btn-sm">表示</a><button class="btn btn-secondary btn-sm" onclick="loadGameToEdit(''+date+'')">編集</button></div></div>';});html+='</div>';document.getElementById('game-list-container').innerHTML=html;}catch(e){document.getElementById('game-list-container').innerHTML='<div style="color:#f46060;font-size:13px">'+e.message+'</div>';}}
async function loadGameToEdit(date){var token=getToken();var H={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'};try{var r=await fetch('https://api.github.com/repos/'+REPO+'/contents/games/'+date+'.json',{headers:H});var file=await r.json();var data=JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/
/g,'')))));fillForm(data);showTab('edit',document.querySelectorAll('.tab')[0]);showToast(date+' のデータを読み込みました');}catch(e){showToast('読み込みエラー: '+e.message,true);}}
function fillForm(data){document.getElementById('f-date').value=data.game_date||'';document.getElementById('f-home').value=data.home_team||'広島';document.getElementById('f-away').value=data.away_team||'';document.getElementById('f-home-score').value=data.home_score||0;document.getElementById('f-away-score').value=data.away_score||0;document.getElementById('f-venue').value=data.venue||'マツダスタジアム';document.getElementById('f-result').value=data.result_label||'';document.getElementById('f-pitchers').value=data.pitchers?JSON.stringify(data.pitchers,null,2):'';document.getElementById('moments-list').innerHTML='';momentCount=0;(data.moments||[]).forEach(function(m){addMoment(m);});document.getElementById('players-list').innerHTML='';playerCount=0;(data.players||[]).forEach(function(p){addPlayer(p);});}
window.addEventListener('DOMContentLoaded',function(){var saved=localStorage.getItem('ct_gh_token');if(saved)document.getElementById('gh-token').value='●'.repeat(20);updateTokenStatus();var today=new Date().toISOString().slice(0,10);document.getElementById('f-date').value=today;});
</script>
</body>
</html>
