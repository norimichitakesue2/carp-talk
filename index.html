<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忙聹卢忙聴楼茫聛庐茫聜芦茫聝录茫聝聴茫聝聢茫聝录茫聜炉</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script>
(function(){
  var cdns=['https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js','https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js'];
  var idx=0;
  function load(){
    if(idx>=cdns.length){return;}
    var s=document.createElement('script');
    s.src=cdns[idx++];
    s.onerror=load;
    s.onload=function(){document.dispatchEvent(new Event('supabase-ready'));};
    document.head.appendChild(s);
  }
  load();
})();
</script>
<style>
:root{--bg:#0c0e11;--surface:#13161b;--surface2:#1a1e25;--surface3:#20252f;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#eef0f4;--muted:#7a8090;--faint:#2e3340;--accent:#f0c040;--blue:#4a9eff;--green:#3ecf8e;--red:#f46060;--orange:#f07840;--carp:#c8102e;--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(12,14,17,0.95);backdrop-filter:blur(14px);z-index:100}
.site-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.1em;color:var(--carp);line-height:1}
.site-sub{font-size:10px;color:var(--muted)}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.x-connect-btn{display:flex;align-items:center;gap:5px;background:#000;color:#fff;border:1px solid #333;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.x-connected{border-color:#1d9bf0;color:#1d9bf0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.container{max-width:740px;margin:0 auto;padding:0 1rem 5rem}

/* 忙聴楼盲禄聵茫聝聤茫聝聯 */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 0;margin:0.5rem 0}
.date-nav-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 12px;font-size:13px;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.date-nav-btn:hover{color:var(--text)}
.date-nav-btn:disabled{opacity:0.3;cursor:default}
.date-nav-label{font-size:14px;font-weight:500;color:var(--text)}

/* 茫聜陋茫聝聲忙聴楼 */
.no-game{text-align:center;padding:4rem 2rem}
.no-game-icon{font-size:48px;margin-bottom:1rem}
.no-game-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--muted);margin-bottom:0.5rem}
.no-game-sub{font-size:14px;color:var(--muted)}
.no-game-link{display:inline-block;margin-top:1.5rem;padding:8px 20px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);text-decoration:none;font-size:13px}

.hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin:1.25rem 0;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--carp),#ff4060,var(--accent))}
.hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.14em;color:var(--carp);text-transform:uppercase;margin-bottom:0.4rem}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);margin-bottom:0.4rem}
.hero-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:1.25rem}
.scoreboard{display:flex;align-items:center;justify-content:center;gap:2rem;margin-bottom:1rem}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:24px;text-align:center}
.team-name.carp{color:var(--carp)}.team-name.away{color:#f5d000}
.team-score{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:1;text-align:center}
.score-sep{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--faint);padding-top:0.75rem}
.game-meta{display:flex;align-items:center;justify-content:center;gap:0.6rem;font-size:12px;color:var(--muted);flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.badge-final{background:var(--faint);color:var(--muted)}
.badge-win{background:rgba(200,16,46,0.2);color:#ff7090;border:1px solid rgba(200,16,46,0.3)}
.inning-table-wrap{margin-top:1rem;overflow-x:auto}
.inning-table{width:100%;border-collapse:collapse;font-size:12px}
.inning-table th,.inning-table td{text-align:center;padding:4px 6px;border:1px solid var(--border);min-width:26px}
.inning-table th{color:var(--muted);background:var(--surface2)}
.inning-table td.team-label{text-align:left;font-weight:500;padding-left:10px;min-width:48px}
.inning-table td.score-col{color:var(--text);font-weight:700;font-size:13px;border-left:1px solid var(--border2)}
.inning-table td.zero{color:var(--faint)}.inning-table td.scoring{color:var(--accent);font-weight:700}
.pitcher-bar{margin-top:1rem;display:flex;gap:6px;flex-wrap:wrap}
.pitcher-chip{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:3px 9px;font-size:12px}
.pitcher-chip .role{font-size:10px;color:var(--muted)}
.s-win{font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(62,207,142,0.2);color:var(--green)}
.s-loss{font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(244,96,96,0.2);color:var(--red)}
.s-good{font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(74,158,255,0.15);color:var(--blue)}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;margin-bottom:1rem}
.section-desc{font-size:13px;color:var(--muted);margin-bottom:1rem;line-height:1.6}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%}
.live-update{font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;padding:0.4rem 0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
.timeline{position:relative;padding-left:1.75rem}
.timeline-rail{position:absolute;left:6px;top:8px;bottom:8px;width:1px;background:var(--border2)}
.moment{position:relative;margin-bottom:0.65rem;cursor:pointer}
.moment-dot{position:absolute;left:-1.45rem;top:16px;width:13px;height:13px;border-radius:50%;border:2px solid var(--faint);background:var(--surface2);transition:all 0.2s}
.moment.selected .moment-dot{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(240,192,64,0.5)}
.moment.voted .moment-dot{background:var(--green);border-color:var(--green)}
.type-score .moment-dot{border-color:var(--accent)}.type-pitcher .moment-dot{border-color:var(--blue)}
.type-crisis .moment-dot{border-color:var(--orange)}.type-hr .moment-dot{border-color:var(--red)}
.moment-inner{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.7rem 0.9rem;transition:border-color 0.15s,background 0.15s}
.moment:hover .moment-inner{border-color:var(--border2);background:var(--surface3)}
.moment.selected .moment-inner{border-color:var(--accent);background:rgba(240,192,64,0.05)}
.moment.voted .moment-inner{border-color:var(--green)}
.moment-header{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.moment-inning{font-size:11px;color:var(--muted);white-space:nowraw;font-weight:500}
.moment-type-badge{font-size:10px;padding:1px 6px;border-radius:3px;white-space:nowrap;font-weight:700}
.type-score-badge{background:rgba(240,192,64,0.15);color:var(--accent)}
.type-pitcher-badge{background:rgba(74,158,255,0.15);color:var(--blue)}
.type-crisis-badge{background:rgba(240,120,64,0.15);color:var(--orange)}
.type-hr-badge{background:rgba(244,96,96,0.15);color:var(--red)}
.moment-desc{font-size:14px;color:var(--text);line-height:1.5;margin-bottom:4px}
.moment-sub{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:6px;font-style:italic}
.moment-footer{display:flex;align-items:center;justify-content:space-between}
.moment-bar-row{display:flex;align-items:center;gap:8px;flex:1}
.moment-bar-wrap{flex:1;height:3px;background:var(--faint);border-radius:2px;overflow:hidden}
.moment-bar{height:3px;border-radius:2px;transition:width 0.5s ease}
.bar-score{background:var(--accent)}.bar-pitcher{background:var(--blue)}.bar-crisis{background:var(--orange)}.bar-hr{background:var(--red)}
.moment-pct{font-size:11px;color:var(--muted);min-width:54px;text-align:right}
.moment-share-btn{background:transparent;border:1px solid var(--border2);border-radius:5px;padding:3px 8px;font-size:11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:3px;flex-shrink:0;margin-left:8px;font-family:'Noto Sans JP',sans-serif}
.loading-line{height:3px;background:var(--faint);border-radius:2px;overflow:hidden}
.loading-line-inner{height:3px;width:40%;background:var(--blue);border-radius:2px;animation:loadSlide 1s ease-in-out infinite alternate}
@keyframes loadSlide{from{transform:translateX(-100%)}to{transform:translateX(250%)}}
.vote-prompt{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:14px}
.vote-prompt-icon{font-size:28px;margin-bottom:6px}
.selected-tag{background:rgba(240,192,64,0.08);border:1px solid rgba(240,192,64,0.25);border-radius:var(--radius-sm);padding:0.65rem 0.9rem;font-size:13px;color:var(--accent);margin-bottom:0.75rem}
.reason-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:0.7rem 0.9rem;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);resize:none;min-height:80px}
.reason-input::placeholder{color:var(--faint)}.reason-input:focus{outline:none;border-color:var(--accent)}
.btn-vote{margin-top:0.75rem;width:100%;padding:0.75rem;background:var(--carp);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.btn-vote:disabled{opacity:0.5;cursor:not-allowed}
.voted-tag{background:rgba(62,207,142,0.08);border:1px solid rgba(62,207,142,0.25);border-radius:var(--radius-sm);padding:0.65rem 0.9rem;font-size:13px;color:var(--green);margin-bottom:0.75rem}
.btn-x-post{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:0.65rem;background:#000;color:#fff;border:1px solid #333;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.player-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.9rem 0.75rem;display:flex;flex-direction:column;align-items:center;gap:6px}
.player-icon{border-radius:50%;background:var(--surface3);border:2px solid var(--faint);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--muted);transition:all 0.35s;width:52px;height:52px}
.player-icon.carp-player{border-color:var(--carp);color:var(--carp);background:rgba(200,16,46,0.1)}
.player-name{font-size:13px;font-weight:500;color:var(--text);text-align:center}
.player-pos{font-size:10px;color:var(--muted)}
.rating-btns{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.rating-btn{font-size:10px;padding:3px 7px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
.rating-btn.active-mvp{background:rgba(240,192,64,0.2);border-color:var(--accent);color:var(--accent)}
.rating-btn.active-great{background:rgba(62,207,142,0.2);border-color:var(--green);color:var(--green)}
.rating-btn.active-ganbatte{background:rgba(74,158,255,0.2);border-color:var(--blue);color:var(--blue)}
.rating-btn.active-nigun{background:rgba(244,96,96,0.15);border-color:var(--red);color:var(--red)}
.player-votes{font-size:10px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.vote-pill{padding:1px 5px;border-radius:3px;font-size:10px}
.pill-mvp{background:rgba(240,192,64,0.15);color:var(--accent)}.pill-great{background:rgba(62,207,142,0.15);color:var(--green)}
.pill-ganbatte{background:rgba(74,158,255,0.15);color:var(--blue)}.pill-nigun{background:rgba(244,96,96,0.12);color:var(--red)}
.tabs{display:flex;gap:4px;margin-bottom:1rem}
.tab{flex:1;text-align:center;padding:0.45rem 0.5rem;font-size:13px;cursor:pointer;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);font-family:'Noto Sans JP',sans-serif}
.tab.active{background:var(--surface2);color:var(--text);font-weight:500;border-color:var(--border2)}
.comment{padding:0.75rem 0;border-bottom:1px solid var(--border)}
.comment:last-child{border-bottom:none}
.comment-header{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.comment-name{font-size:13px;font-weight:500}
.moment-tag-sm{font-size:10px;padding:1px 6px;border-radius:3px;margin-left:4px;font-weight:500}
.tag-score{background:rgba(240,192,64,0.15);color:var(--accent)}.tag-pitcher{background:rgba(74,158,255,0.15);color:var(--blue)}
.tag-crisis{background:rgba(240,120,64,0.15);color:var(--orange)}.tag-hr{background:rgba(244,96,96,0.15);color:var(--red)}
.comment-body{font-size:14px;color:var(--text);line-height:1.65;padding-left:38px}
.comment-time{font-size:11px;color:var(--muted);padding-left:38px;margin-top:2px}
.comment-actions{display:flex;align-items:center;justify-content:space-between;padding-left:38px;margin-top:5px}
.like-btn{font-size:12px;color:var(--muted);cursor:pointer;padding:2px 8px;border-radius:4px;border:1px solid transparent;font-family:'Noto Sans JP',sans-serif;background:transparent}
.like-btn.liked{color:var(--red)}
.comment-share-btn{font-size:11px;color:var(--muted);background:transparent;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;padding:2px 6px;font-family:'Noto Sans JP',sans-serif}
.new-comment-area{margin-top:0.75rem}
.x-name-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px;color:var(--muted)}
.new-comment-row{display:flex;gap:8px}
.new-comment-input{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:0.55rem 0.9rem;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text)}
.new-comment-input::placeholder{color:var(--faint)}.new-comment-input:focus{outline:none;border-color:var(--blue)}
.send-btn{padding:0.55rem 1.1rem;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
.send-btn:disabled{opacity:0.5;cursor:not-allowed}
.empty-state{text-align:center;padding:2rem;color:var(--muted);font-size:14px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--faint);border-top-color:var(--blue);border-radius:50%;animation:spinAnim 0.7s linear infinite}
@keyframes spinAnim{to{transform:rotate(360deg)}}
.ai-box{background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.2);border-radius:var(--radius-sm);padding:1rem 1.1rem;font-size:14px;color:#c4b5fd;line-height:1.75}
.ai-box strong{color:var(--text);font-weight:500}
.ai-share-btn{display:inline-flex;align-items:center;gap:5px;margin-top:0.75rem;padding:0.4rem 0.9rem;background:#000;color:#fff;border:1px solid #444;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(12px);background:var(--green);color:#061a10;font-size:13px;font-weight:700;padding:0.5rem 1.4rem;border-radius:99px;opacity:0;pointer-events:none;transition:opacity 0.25s,transform 0.25s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:480px){.team-score{font-size:40px}.players-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <div><div class="site-title">忙聹卢忙聴楼茫聛庐茫聜芦茫聝录茫聝聴茫聝聢茫聝录茫聜炉</div><div class="site-sub">氓潞聝氓鲁露忙聺卤忙麓聥茫聜芦茫聝录茫聝聴 茫聝聲茫聜隆茫聝鲁猫颅掳猫芦聳</div></div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="online-dot"></div>
    <button class="x-connect-btn" id="x-btn" onclick="handleXConnect()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.731-8.836L2.13 2.25h6.962l4.265 5.638L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      <span id="x-btn-label">X茅聙拢忙聬潞</span>
    </button>
  </div>
</header>
<div class="container">
  <!-- 忙聴楼盲禄聵茫聝聤茫聝聯 -->
  <div class="date-nav">
    <button class="date-nav-btn" id="btn-prev" onclick="goDate(-1)">芒聠聬 氓聣聧忙聴楼</button>
    <span class="date-nav-label" id="date-nav-label">猫陋颅茫聛驴猫戮录茫聛驴盲赂颅...</span>
    <button class="date-nav-btn" id="btn-next" onclick="goDate(1)">莽驴聦忙聴楼 芒聠聮</button>
  </div>

  <!-- 茫聜鲁茫聝鲁茫聝聠茫聝鲁茫聝聞茂录聢氓聥聲莽職聞茫聛芦氓聟楼茫聜聦忙聸驴茫聛聢茂录聣 -->
  <div id="main-content">
    <div style="text-align:center;padding:4rem 0;color:var(--muted)"><span class="spin"></span></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var GAME_ID='';
var GAME={};
var MOMENTS=[];
var PLAYERS=[];
var TYPE_LABEL={score:'氓戮聴莽聜鹿茫聜路茫聝录茫聝鲁',pitcher:'忙聤聲忙聣聥氓楼陆忙聤聲',crisis:'茫聝聰茫聝鲁茫聝聛猫聞卤氓聡潞',hr:'忙聹卢氓隆聛忙聣聯'};
var TYPE_BADGE={score:'type-score-badge',pitcher:'type-pitcher-badge',crisis:'type-crisis-badge',hr:'type-hr-badge'};
var BAR_CLS={score:'bar-score',pitcher:'bar-pitcher',crisis:'bar-crisis',hr:'bar-hr'};

function todayStr(){var d=new Date();return d.getFullYear()+'-'+(String(d.getMonth()+1).padStart(2,'0'))+'-'+(String(d.getDate()).padStart(2,'0'));}
function dateLabel(str){var p=str.split('-');return p[0]+'氓鹿麓'+parseInt(p[1])+'忙聹聢'+parseInt(p[2])+'忙聴楼';}
function addDays(str,n){var d=new Date(str);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}

function goDate(n){
  var newDate=addDays(currentDate,n);
  history.pushState({},'','/?date='+newDate);
  loadGame(newDate);
}

async function loadGame(date){
  currentDate=date;
  var today=todayStr();
  document.getElementById('date-nav-label').textContent=dateLabel(date)+(date===today?' (盲禄聤忙聴楼)':'');
  document.getElementById('btn-next').disabled=(date>=today);
  document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:4rem 0;color:var(--muted)"><span class="spin"></span></div>';
  
  // JSON茫聝聲茫聜隆茫聜陇茫聝芦茫聜聮氓聫聳氓戮聴
  var url='https://raw.githubusercontent.com/norimichitakesue2/carp-talk/main/games/'+date+'.json?t='+Date.now();
  var r=await fetch(url);
  
  if(!r.ok){
    // 猫漏娄氓聬聢茫聛陋茫聛聴
    document.getElementById('main-content').innerHTML=
      '<div class="no-game">'+
      '<div class="no-game-icon">芒職戮</div>'+

      '</div>';
    return;
  }
  
  var gameData=await r.json();
  GAME_ID=gameData.id;
  GAME={home:gameData.home_team,away:gameData.away_team,homeScore:gameData.home_score,awayScore:gameData.away_score,date:dateLabel(gameData.game_date),venue:gameData.venue};

document.addEventListener('click',function(e){
  var mid=e.target.closest('[data-mid]');
  if(mid&&!e.target.closest('[data-share]')){selectMoment(parseInt(mid.dataset.mid));}
  var share=e.target.closest('[data-share]');
  if(share){e.stopPropagation();shareMoment(parseInt(share.dataset.share));}
  var rate=e.target.closest('[data-rate]');
  if(rate){ratePlayer(rate.dataset.player,rate.dataset.rate);}
  var like=e.target.closest('[data-like]');
  if(like){toggleLike(like.dataset.like);}
  var cshr=e.target.closest('[data-cshr]');
  if(cshr){shareComment(cshr.dataset.cshr);}
});

// ===== UTILS =====
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hashStr(s){var h=0;for(var i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return h;}
function formatTime(iso){var d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/1000);if(diff<60)return '茫聛聼茫聛拢茫聛聼盲禄聤';if(diff<3600)return Math.floor(diff/60)+'氓聢聠氓聣聧';if(diff<86400)return Math.floor(diff/3600)+'忙聶聜茅聳聯氓聣聧';return (d.getMonth()+1)+'/'+d.getDate();}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function xSVG(sz,fill){return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="'+(fill||'currentColor')+'"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.731-8.836L2.13 2.25h6.962l4.265 5.638L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>';}

function getDisplayName(){if(xUser)return xUser.name;var adj=['莽聠卤猫隆聙','茅聥颅莽聹录','忙赂聥茫聛聞','莽聦聸茅炉聣','氓驴芦茅聙聼','氓聣聸猫聟聲','氓录路猫聜漏','盲驴聤猫露鲁'];var nou=['茫聝聲茫聜隆茫聝鲁','猫娄鲁氓庐垄','氓驴聹忙聫麓氓聸拢','茫聝聻茫聝聥茫聜垄','茅聙職','茫聜娄茫聜漏茫聝聝茫聝聛茫聝拢茫聝录','猫篓聵猫聙聟'];var s=userId.charCodeAt(2)+userId.charCodeAt(3);return adj[s%adj.length]+nou[(s>>2)%nou.length];}

async function loadVoteCounts(){
  var r=await sb.from('votes').select('moment_id').eq('game_id',GAME_ID);
  voteCounts={};MOMENTS.forEach(function(m){voteCounts[m.id]=0;});
  if(r.data)r.data.forEach(function(v){voteCounts[v.moment_id]=(voteCounts[v.moment_id]||0)+1;});
  renderMoments();

async function loadPlayerRatings(){
  var r=await sb.from('player_ratings').select('player_name,rating').eq('game_id',GAME_ID);
  playerRatings={};
  PLAYERS.forEach(function(p){playerRatings[p.name]={mvp:0,great:0,ganbatte:0,nigun:0};});
  if(r.data)r.data.forEach(function(v){if(playerRatings[v.player_name])playerRatings[v.player_name][v.rating]++;});
  renderPlayers();
}
function playerTotal(name){var r=playerRatings[name]||{};return(r.mvp||0)+(r.great||0)+(r.ganbatte||0)+(r.nigun||0);}
function iconSize(name){var tot=playerTotal(name);var max=Math.max.apply(null,PLAYERS.map(function(p){return playerTotal(p.name);}).concat([1]));return Math.round(52+(tot/max)*44);}
function renderPlayers(){

  document.getElementById('players-grid').innerHTML=html;
