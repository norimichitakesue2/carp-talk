function renderDebates(){
  var list=document.getElementById('deb-list');
  if(!list) return;
  var debates=GAME.debates||[];
  if(!debates.length){
    list.innerHTML='<div class="deb-empty">この試合の論点はまだありません。<br>試合終了後にAIが生成します。</div>';
    return;
  }
  list.innerHTML=debates.map(function(d){return renderDebateCard(d);}).join('');
}

function renderDebateCard(d){
  var votes=debateVotes[d.id]||{};  // {0:N, 1:N, 2:N, ...}
  var total=Object.values(votes).reduce(function(s,v){return s+v;},0);
  var myChoice=myDebateVotes[d.id];  // index or undefined
  var voted=myChoice!==undefined;

  var choicesHtml=(d.choices||[]).map(function(c,idx){
    var count=votes[idx]||0;
    var pct=total>0?Math.round(count/total*100):0;
    var picked=myChoice===idx;
    return '<button class="deb-choice'+(picked?' picked':'')+'" onclick="voteDebate(\''+esc(d.id)+'\','+idx+')">'+
      '<div class="deb-choice-fill" style="width:'+(voted?pct:0)+'%"></div>'+
      '<div class="deb-choice-body">'+
        (c.stance?'<span class="deb-choice-stance">'+esc(c.stance)+'</span>':'')+
        '<span>'+esc(c.label||c)+'</span>'+
      '</div>'+
      (voted?'<span class="deb-choice-pct">'+pct+'% ('+count+')</span>':'')+
    '</button>';
  }).join('');

  var commentsHtml='';
  if(voted){
    var stanceLabel=(d.choices[myChoice]?.stance)||(d.choices[myChoice]?.label)||'';
    var minorityIdx=getMinorityIndex(votes,total);
    var cmts=debateComments[d.id]||[];
    var sortedCmts=cmts.slice().sort(function(a,b){
      // 自分と異なる立場のコメントを上に
      var aDiff=a.choice_idx!==myChoice?1:0;
      var bDiff=b.choice_idx!==myChoice?1:0;
      if(aDiff!==bDiff) return bDiff-aDiff;
      return new Date(b.created_at)-new Date(a.created_at);
    });
    commentsHtml='<div class="deb-cmt-wrap">'+
      '<div class="deb-meta">'+
        '<span class="deb-stance-badge">あなたの立場：'+esc(stanceLabel)+'</span>'+
        '<span>'+total+'人投票</span>'+
      '</div>'+
      '<div class="deb-cmt-list">'+
        (sortedCmts.length?sortedCmts.slice(0,30).map(function(c){
          var stance=d.choices[c.choice_idx]?.stance||'?';
          var isMinority=c.choice_idx===minorityIdx;
          return '<div class="deb-cmt-item'+(isMinority?' minority':'')+'">'+
            '<span class="deb-cmt-stance'+(isMinority?' minority':'')+'">'+esc(stance)+'</span>'+
            esc(c.body)+
            '<span class="deb-cmt-time">'+formatTime(c.created_at)+'</span>'+
          '</div>';
        }).join(''):'<div style="font-size:11px;color:var(--muted);text-align:center;padding:.5rem">まだコメントなし</div>')+
      '</div>'+
      '<div class="deb-cmt-input-row">'+
        '<input class="deb-cmt-input" id="deb-cmt-inp-'+esc(d.id)+'" placeholder="この立場でひとこと..." maxlength="200">'+
        '<button class="deb-cmt-btn" onclick="sendDebateComment(\''+esc(d.id)+'\')">送信</button>'+
      '</div>'+
    '</div>';
  }

  return '<div class="deb-card" data-debate-id="'+esc(d.id)+'">'+
    '<div class="deb-q">'+esc(d.question||'')+'</div>'+
    (d.context?'<div class="deb-ctx">'+esc(d.context)+'</div>':'')+
    '<div class="deb-choices">'+choicesHtml+'</div>'+
    commentsHtml+
  '</div>';
}

function getMinorityIndex(votes,total){
  if(total===0) return -1;
  var min=Infinity, idx=-1;
  for(var k in votes){
    if(votes[k]>0 && votes[k]<min){min=votes[k];idx=parseInt(k,10);}
  }
  return idx;
}

async function voteDebate(debateId,choiceIdx){
  try{
    if(myDebateVotes[debateId]===choiceIdx){
      // 同じものを2回押したら取り消し
      await sb.from('debate_votes').delete().eq('debate_id',debateId).eq('user_id',userId);
      var v=debateVotes[debateId]||{};
      v[choiceIdx]=Math.max(0,(v[choiceIdx]||1)-1);
      delete myDebateVotes[debateId];
    } else {
      var prevIdx=myDebateVotes[debateId];
      // 既存の投票を削除
      await sb.from('debate_votes').delete().eq('debate_id',debateId).eq('user_id',userId);
      var v=debateVotes[debateId]||{};
      if(prevIdx!==undefined) v[prevIdx]=Math.max(0,(v[prevIdx]||1)-1);
      // 新規投票
      await sb.from('debate_votes').insert({game_id:GAME_ID,debate_id:debateId,user_id:userId,choice_idx:choiceIdx});
      v[choiceIdx]=(v[choiceIdx]||0)+1;
      debateVotes[debateId]=v;
      myDebateVotes[debateId]=choiceIdx;
    }
    renderDebates();
    renderMyCard();
  }catch(e){
    console.warn('[debate] vote failed:',e.message||e);
    showToast('投票に失敗しました');
  }
}

async function sendDebateComment(debateId){
  var inp=document.getElementById('deb-cmt-inp-'+debateId);
  if(!inp) return;
  var txt=(inp.value||'').trim();
  if(!txt){showToast('内容を入力してください');return;}
  var choiceIdx=myDebateVotes[debateId];
  if(choiceIdx===undefined){showToast('まず投票してください');return;}
  try{
    var r=await sb.from('debate_comments').insert({game_id:GAME_ID,debate_id:debateId,user_id:userId,choice_idx:choiceIdx,body:txt}).select().single();
    if(r.error) throw r.error;
    inp.value='';
    if(r.data){
      var arr=debateComments[debateId]||[];
      arr.unshift(r.data);
      debateComments[debateId]=arr;
      renderDebates();
    }
    showToast('💬 コメントしました');
  }catch(e){
    console.warn('[debate] comment failed:',e.message||e);
    showToast('コメント送信に失敗しました');
  }
}

async function loadDebates(){
  var debates=GAME.debates||[];
  if(!debates.length) return;
  var ids=debates.map(function(d){return d.id;});
  try{
    // 全投票を取得
    var rv=await sb.from('debate_votes').select('debate_id,choice_idx,user_id').in('debate_id',ids);
    if(rv.data){
      rv.data.forEach(function(v){
        if(!debateVotes[v.debate_id]) debateVotes[v.debate_id]={};
        debateVotes[v.debate_id][v.choice_idx]=(debateVotes[v.debate_id][v.choice_idx]||0)+1;
        if(v.user_id===userId) myDebateVotes[v.debate_id]=v.choice_idx;
      });
    }
    // コメント取得
    var rc=await sb.from('debate_comments').select('*').in('debate_id',ids).order('created_at',{ascending:false}).limit(100);
    if(rc.data){
      rc.data.forEach(function(c){
        if(!debateComments[c.debate_id]) debateComments[c.debate_id]=[];
        debateComments[c.debate_id].push(c);
      });
    }
    renderDebates();
  }catch(e){
    console.warn('[debate] load failed:',e.message||e);
  }
}

// ===== 😤 気分チェックイン =====
async function loadMoodVotes(){
  try{
    var r=await sb.from('mood_votes').select('mood,user_id').eq('game_id',GAME_ID);
    if(r.data){
      var c={angry:0,sigh:0,mixed:0,light:0,best:0};
      r.data.forEach(function(v){
        if(c[v.mood] !== undefined) c[v.mood]++;
        if(v.user_id===userId) myMood=v.mood;
      });
      moodCounts=c;
    }
    renderMood();
  }catch(e){
    console.warn('[mood] load failed:',e.message||e);
    renderMood();
  }
}

function renderMood(){
  var total=Object.values(moodCounts).reduce(function(s,v){return s+v;},0);
  var voted=!!myMood;
  // ボタンの選択状態
  document.querySelectorAll('.mood-btn').forEach(function(b){
    b.classList.toggle('picked', b.dataset.mood===myMood);
  });
  // パーセンテージ・バー（投票済み かつ N≥5 のみ）
  var showStats = voted && total >= 5;
  ['angry','sigh','mixed','light','best'].forEach(function(m){
    var pctEl=document.querySelector('.mood-pct[data-pct="'+m+'"]');
    var fillEl=document.querySelector('.mood-fill[data-fill="'+m+'"]');
    if(showStats){
      var pct=Math.round((moodCounts[m]||0)/total*100);
      if(pctEl) pctEl.textContent=pct+'%';
      if(fillEl) fillEl.style.width=pct+'%';
    } else {
      if(pctEl) pctEl.textContent='';
      if(fillEl) fillEl.style.width='0';
    }
  });
  // メタ表示
  var meta=document.getElementById('mood-meta');
  if(meta) meta.textContent=total>0?total+'人参加':'';
  // シェア行
  var shareRow=document.getElementById('mood-share-row');
  var status=document.getElementById('mood-status');
  if(voted){
    if(shareRow) shareRow.style.display='flex';
    if(status){
      if(showStats){
        var pct=Math.round(moodCounts[myMood]/total*100);
        status.innerHTML='あなたは「<span class="em">'+esc(MOOD_LABELS[myMood])+'</span>」（'+pct+'%）';
      } else if(total<=1){
        status.innerHTML='あなたが今日の最初の投票者です！';
      } else {
        status.innerHTML='あなたは「<span class="em">'+esc(MOOD_LABELS[myMood])+'</span>」（あと'+(5-total)+'人で分布表示）';
      }
    }
  } else {
    if(shareRow) shareRow.style.display='none';
  }
}

async function voteMood(mood){
  try{
    if(myMood===mood){
      // 同じものを再タップで解除
      await sb.from('mood_votes').delete().eq('game_id',GAME_ID).eq('user_id',userId);
      moodCounts[mood]=Math.max(0,moodCounts[mood]-1);
      myMood=null;
    } else {
      var prev=myMood;
      // upsertで新規 or 更新
      await sb.from('mood_votes').upsert({game_id:GAME_ID,user_id:userId,mood:mood}, {onConflict:'game_id,user_id'});
      if(prev) moodCounts[prev]=Math.max(0,moodCounts[prev]-1);
      moodCounts[mood]=(moodCounts[mood]||0)+1;
      myMood=mood;
    }
    renderMood();
    renderMyCard();
  }catch(e){
    console.warn('[mood] vote failed:',e.message||e);
    showToast('投票に失敗しました');
  }
}

// ===== 🎫 マイカード =====
// 自分の「今日の光」を1件取得（投稿>わかる、ファン>キュレーションの優先）
function pickMyLight(){
  // 1) 自分が投稿したファンの光
  var posted = (typeof fanPositives !== 'undefined' && Array.isArray(fanPositives))
    ? fanPositives.find(function(p){ return p.user_id===userId; })
    : null;
  if(posted) return { kind:'posted', text:posted.body||'' };
  // 2) 自分が「わかる」したファンの光
  if(typeof fanPositives !== 'undefined' && Array.isArray(fanPositives)){
    for(var i=0;i<fanPositives.length;i++){
      var p=fanPositives[i];
      if(myPosLikes && myPosLikes.has('f_'+p.id)) return { kind:'liked', text:p.body||'' };
    }
  }
  // 3) 自分が「わかる」したキュレーションの光（layer1/2）
  var curated = (GAME && GAME.positives) ? GAME.positives : [];
  for(var j=0;j<curated.length;j++){
    var c=curated[j];
    if(myPosLikes && myPosLikes.has(c.id)) return { kind:'liked', text:c.title || c.desc || '' };
  }
  return null;
}

function renderMyCard(){
  var body=document.getElementById('mc-card-body');
  var hint=document.getElementById('mc-empty-hint');
  if(!body) return;

  // 自分の「今日の光」を取得（投稿 > わかる、ファン > キュレーション の優先順）
  var myLight = pickMyLight();

  var rows=[];
  // 1. 気分
  if(myMood){
    rows.push({icon:'❤️', key:'今日の気分', val:MOOD_LABELS[myMood]});
  }
  // 2. タイトル投票
  if(myTitleVote){
    rows.push({icon:'💬', key:'一言', val:'「'+myTitleVote+'」'});
  }
  // 3. 分岐点
  if(myTurning){
    var t=turnings.find(function(x){return x.id===myTurning;});
    if(t) rows.push({icon:'🔻', key:'分岐点', val:t.inning+' '+(t.description||'').slice(0,30)});
  }
  // 4. 今日の光（自分が投稿/わかる した1件）
  if(myLight){
    var lightLabel = myLight.kind==='posted' ? '光（投稿）' : '光';
    rows.push({icon:'✨', key:lightLabel, val:'「'+myLight.text.slice(0,40)+'」'});
  }
  // 5. 議論への参加（最大2件）
  var debateRows=Object.keys(myDebateVotes).slice(0,2);
  debateRows.forEach(function(did){
    var d=(GAME.debates||[]).find(function(x){return x.id===did;});
    if(!d) return;
    var idx=myDebateVotes[did];
    var c=d.choices[idx];
    if(c){
      rows.push({icon:'⚔️', key:'論点', val:'「'+(d.question||'').slice(0,24)+'」→ '+(c.label||c)+(c.stance?'<span class="mc-stance">'+esc(c.stance)+'</span>':'')});
    }
  });
  // 6. 選手評価（簡易）
  var ratedCount=0;
  try{
    if(typeof PLAYER_RATINGS_MINE === 'object' && PLAYER_RATINGS_MINE){
      ratedCount=Object.keys(PLAYER_RATINGS_MINE).length;
    }
  }catch(e){}
  if(ratedCount>0){
    rows.push({icon:'⭐', key:'選手評価', val:ratedCount+'人を評価'});
  }

  // 試合情報
  var scoreText=GAME.away+' '+(GAME.awayScore!=null?GAME.awayScore:'-')+'-'+(GAME.homeScore!=null?GAME.homeScore:'-')+' '+GAME.home;
  var headerRow={icon:'⚾', key:'試合', val:scoreText+' ('+currentDate+')'};

  if(rows.length===0){
    body.innerHTML='<div class="mc-row">'+
      '<span class="mc-icon-mini">'+headerRow.icon+'</span>'+
      '<span class="mc-key">'+headerRow.key+'</span>'+
      '<span class="mc-val empty">まだ何も投稿していません</span>'+
    '</div>';
    if(hint) hint.style.display='block';
    return;
  }

  if(hint) hint.style.display='none';

  var allRows=[headerRow].concat(rows);
  body.innerHTML=allRows.map(function(r){
    return '<div class="mc-row">'+
      '<span class="mc-icon-mini">'+r.icon+'</span>'+
      '<span class="mc-key">'+esc(r.key)+'</span>'+
      '<span class="mc-val">'+r.val+'</span>'+
    '</div>';
  }).join('');
}

// ===== Canvas画像生成 + シェア =====
// text には URL（試合ページのリンク）・ハッシュタグまで全て含めて渡すこと
async function shareCanvasImage(canvas, text, filename){
  // PNG Blob 化
  var blob = await new Promise(function(resolve){ canvas.toBlob(resolve,'image/png',0.95); });
  if(!blob){ showToast('画像生成に失敗しました'); return; }

  var file = new File([blob], filename, { type:'image/png' });
  // 1) Web Share API（モバイル中心）に画像添付できるなら最優先
  try{
    if(navigator.canShare && navigator.canShare({files:[file]}) && navigator.share){
      await navigator.share({ files:[file], text:text });
      return;
    }
  }catch(e){ /* user cancelled or unsupported */ }

  // 2) フォールバック: 画像をダウンロード → X intent をテキスト で開く
  var blobUrl = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = blobUrl; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(blobUrl); }, 1000);
  showToast('📥 画像をダウンロードしました。Xに添付してください');
  setTimeout(function(){
    // X intent — text にURL・ハッシュタグまで全て含めて渡す（&url=は使わない）
    var shareUrl='https://twitter.com/intent/tweet?text='+encodeURIComponent(text);
    window.open(shareUrl,'_blank','noopener,noreferrer,width=600,height=500');
  }, 600);
}

// 共通：背景・タイトル等の描画
function _drawCardBase(ctx, W, H){
  // 背景グラデ
  var g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a1820'); g.addColorStop(1,'#0a0c0f');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // 上端カープレッドストライプ
  var s = ctx.createLinearGradient(0,0,W,0);
  s.addColorStop(0,'#8a0a1e'); s.addColorStop(.5,'#c8102e'); s.addColorStop(1,'#f0c040');
  ctx.fillStyle=s; ctx.fillRect(0,0,W,12);

  // 下端 ストライプ
  ctx.fillStyle=s; ctx.fillRect(0,H-12,W,12);

  // 微細な縦ストライプ（電光掲示板風）
  ctx.fillStyle='rgba(255,255,255,.018)';
  for(var x=30; x<W; x+=60){ ctx.fillRect(x,12,1,H-24); }
}
function _drawScoreboard(ctx, W, y, away, awayS, home, homeS){
  ctx.textAlign='center';
  ctx.fillStyle='#f0c040';
  ctx.font='bold 24px sans-serif';
  ctx.fillText(currentDate+' ／ '+(GAME.venue||'マツダスタジアム'), W/2, y);
  // チーム名 + スコア
  var awayDisp=(awayS!=null?awayS:'-'), homeDisp=(homeS!=null?homeS:'-');
  // away
  ctx.fillStyle='#f5d000';
  ctx.font='36px "Bebas Neue", sans-serif';
  ctx.fillText(away, W*0.22, y+58);
  ctx.font='120px "Bebas Neue", sans-serif';
  ctx.fillText(awayDisp, W*0.22, y+170);
  // separator
  ctx.fillStyle='rgba(255,255,255,.25)'; ctx.font='90px "Bebas Neue", sans-serif';
  ctx.fillText('—', W/2, y+155);
  // home
  ctx.fillStyle='#ff4060';
  ctx.font='36px "Bebas Neue", sans-serif';
  ctx.fillText(home, W*0.78, y+58);
  ctx.font='120px "Bebas Neue", sans-serif';
  ctx.fillText(homeDisp, W*0.78, y+170);
  ctx.textAlign='left';
}
function _drawWatermark(ctx, W, H){
  ctx.fillStyle='rgba(240,192,64,.55)';
  ctx.font='bold 20px sans-serif';
  ctx.textAlign='right';
  ctx.fillText('CARP TALK · #carptalk', W-25, H-25);

}

function generateMyCardImage(){
  var W=800, H=1100;
  var canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  var ctx=canvas.getContext('2d');

  _drawCardBase(ctx, W, H);

  // ヘッダー：チケット風タイトル
  ctx.fillStyle='#f0c040'; ctx.font='bold 32px sans-serif';
  ctx.fillText('🎫 観戦カード', 35, 60);
  ctx.font='16px sans-serif'; ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.fillText('CARP TALK', 35, 88);

  // スコアボード
  _drawScoreboard(ctx, W, 120, GAME.away, GAME.awayScore, GAME.home, GAME.homeScore);

  // 区切り線
  ctx.strokeStyle='rgba(240,192,64,.35)'; ctx.lineWidth=2;
  ctx.setLineDash([8,6]);
  ctx.beginPath(); ctx.moveTo(40,355); ctx.lineTo(W-40,355); ctx.stroke();
  ctx.setLineDash([]);

  // ユーザー参加内容（rows各要素は { key, type:'simple'|'debate', val 等 }）
  var rows=[];
  if(myMood) rows.push({key:'気分', type:'simple', val:MOOD_LABELS[myMood]});
  if(myTitleVote) rows.push({key:'一言', type:'simple', val:'「'+myTitleVote+'」'});
  if(myTurning){
    var t=turnings.find(function(x){return x.id===myTurning;});
    if(t) rows.push({key:'分岐点', type:'simple', val:t.inning+' '+(t.description||'')});
  }
  var myLight = pickMyLight();
  if(myLight){
    rows.push({key:(myLight.kind==='posted'?'光（投稿）':'光'), type:'simple', val:'「'+myLight.text+'」'});
  }
  Object.keys(myDebateVotes).slice(0,2).forEach(function(did){
    var d=(GAME.debates||[]).find(function(x){return x.id===did;});
    if(!d) return;
    var c=d.choices[myDebateVotes[did]];
    if(c) rows.push({
      key:'論点',
      type:'debate',
      question:d.question||'',
      choice:c.label||c||'',
      stance:c.stance||'',
    });
  });

  // 各行を描画
  var y=405;
  ctx.textAlign='left';
  var maxW=W-200;

  // テキスト折返し描画ヘルパー（最大 maxLines 行、超えたら最後の行末に…）
  function drawWrappedText(text, x, y, maxWidth, lineHeight, maxLines){
    var s=String(text);
    var lines=[];
    var i=0;
    while(i<s.length && lines.length<maxLines){
      var line='';
      while(i<s.length){
        var test=line+s[i];
        if(ctx.measureText(test).width>maxWidth && line.length>0) break;
        line=test;
        i++;
      }
      // 最終行で残りがあるなら末尾に「…」
      if(lines.length===maxLines-1 && i<s.length){
        while(ctx.measureText(line+'…').width>maxWidth && line.length>1){
          line=line.slice(0,-1);
        }
        line=line+'…';
        i=s.length;
      }
      lines.push(line);
    }
    for(var j=0;j<lines.length;j++){
      ctx.fillText(lines[j], x, y+j*lineHeight);
    }
    return lines.length*lineHeight;
  }

  for (var i=0; i<rows.length && i<6; i++){
    var r=rows[i];
    var rowHeight;

    if(r.type==='debate'){
      // 論点行：質問（小・muted）→ 選択肢（大・白）→ stanceバッジ
      ctx.fillStyle='#f0c040';
      ctx.font='bold 26px sans-serif';
      ctx.fillText(r.key, 35, y);

      // 質問（2行まで折返し）
      ctx.fillStyle='rgba(255,255,255,.65)';
      ctx.font='24px sans-serif';
      var qHeight = drawWrappedText('Q. '+r.question, 175, y, maxW, 32, 2);

      // 選択肢（2行まで折返し）
      ctx.fillStyle='#ffd965';
      ctx.font='bold 32px sans-serif';
      var aY = y + qHeight + 12;
      var aHeight = drawWrappedText('→ '+r.choice, 175, aY, maxW, 40, 2);

      // stanceバッジ
      var endY = aY + aHeight;
      if(r.stance){
        ctx.font='bold 18px sans-serif';
        var st='['+r.stance+']';
        var stW=ctx.measureText(st).width;
        ctx.fillStyle='rgba(240,192,64,.18)';
        ctx.fillRect(175, endY-4, stW+18, 30);
        ctx.fillStyle='#ffd965';
        ctx.fillText(st, 184, endY+15);
        endY += 36;
      } else {
        endY += 8;
      }
      rowHeight = (endY - y) + 14;
    } else {
      // シンプル行
      ctx.fillStyle='#f0c040';
      ctx.font='bold 26px sans-serif';
      ctx.fillText(r.key, 35, y);
      ctx.fillStyle='#fff';
      ctx.font='34px sans-serif';
      var sHeight = drawWrappedText(r.val, 175, y, maxW, 42, 2);
      rowHeight = sHeight + 20;
    }

    // 区切り線
    ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(40, y + rowHeight - 8); ctx.lineTo(W-40, y + rowHeight - 8); ctx.stroke();
    y += rowHeight;
  }

  // 中央: 結果バッジ（FINAL勝利／引き分け／LIVEなど）
  if(GAME.status==='final' && GAME.result_label){
    ctx.fillStyle='#ffd965';
    ctx.font='bold 28px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('FINAL · '+GAME.result_label, W/2, H-70);
    ctx.textAlign='left';
  }

  _drawWatermark(ctx, W, H);
  return canvas;
}

// ===== 波形 + 分岐点横スクロール =====
var SEL_INN=null;
function ptX(i){return (i/8)*540+10;}

function drawWave(){
  var el=document.getElementById('wave-svg');if(!el)return;
  var flows=[];
  var hiroshimaIsAway = GAME && GAME.away === '広島';
  for(var i=1;i<=9;i++){
    var evts=MOMENTS.filter(function(m){return m.inning&&parseInt(m.inning)===i;});
    var base=45;
    // 表・裏それぞれの最悪値（最も影響の大きい値）を計算
    var omoteVal=null, uraVal=null;
    evts.forEach(function(evt){
      var isUra=evt.inning&&evt.inning.includes('裏');
      var isHiroshimaAttack=hiroshimaIsAway?!isUra:isUra;
      var val;
      if(evt.type==='hr') val=isHiroshimaAttack?18:80;   // 広島HR=上(Y小)、相手HR=下(Y大)
      else if(evt.type==='score') val=isHiroshimaAttack?25:72;  // 広島得点=上、相手得点=下
      else if(evt.type==='crisis') val=isHiroshimaAttack?62:58; // チャンス逃し=やや下
      else val=45;
      if(!isUra){
        // 表のイベント：広島の攻撃なら上昇（大きい方）、相手なら下降（小さい方）
        if(omoteVal===null) omoteVal=val;
        else omoteVal=isHiroshimaAttack?Math.max(omoteVal,val):Math.min(omoteVal,val);
      } else {
        // 裏のイベント
        if(uraVal===null) uraVal=val;
        else uraVal=isHiroshimaAttack?Math.max(uraVal,val):Math.min(uraVal,val);
      }
    });
    // 表・裏両方あれば裏（その回の最終状態）を優先、なければ表
    if(uraVal!==null) base=uraVal;
    else if(omoteVal!==null) base=omoteVal;
    flows.push({x:ptX(i-1),y:base});
  }
  var d='M'+flows[0].x+','+flows[0].y;
  for(var i=1;i<flows.length;i++){
    var p=flows[i-1],c=flows[i],cx=(p.x+c.x)/2;
    d+=' C'+cx+','+p.y+' '+cx+','+c.y+' '+c.x+','+c.y;
  }
  document.getElementById('wave-line').setAttribute('d',d);
  document.getElementById('wave-fill').setAttribute('d',d+' L'+flows[8].x+',90 L10,90 Z');
  var tpInns={};
  turnings.forEach(function(t){var n=parseInt(t.inning);if(!isNaN(n)&&n>=1&&n<=9)tpInns[n]=true;});
  var markers='';
  Object.keys(tpInns).forEach(function(inn){
    var n=parseInt(inn)-1;
    var p=flows[n];
    var isSel=(SEL_INN===parseInt(inn));
    var r=isSel?9:6;
    markers+='<circle cx="'+p.x+'" cy="'+p.y+'" r="'+r+'" fill="#c8102e" stroke="var(--surface)" stroke-width="2" style="cursor:pointer;transition:r .2s" onclick="tapInn('+inn+')"/>';
    if(isSel)markers+='<circle cx="'+p.x+'" cy="'+p.y+'" r="14" fill="none" stroke="#c8102e" stroke-width="1.5" opacity=".3"/>';
  });
  document.getElementById('wave-markers').innerHTML=markers;
  renderInnLabels(tpInns);
  renderConnector(flows);
  renderTpCards();
}

function renderInnLabels(tpInns){
  var el=document.getElementById('wave-inn-labels');if(!el)return;
  var html='';
  for(var i=1;i<=9;i++){
    var hasTp=!!tpInns[i];
    var isSel=(SEL_INN===i);
    html+='<button class="wave-inn-btn'+(hasTp?' has-tp':'')+(isSel?' sel':'')+'" onclick="tapInn('+i+')">';
    html+=i+'回';
    if(hasTp)html+='<span class="wave-inn-dot"></span>';
    html+='</button>';
  }

async function voteTitle(txt){
  if(myTitleVote===txt){
    await sb.from('title_votes').delete().eq('game_id',GAME_ID).eq('user_id',userId);
    if(titleVotes[txt])titleVotes[txt]--;myTitleVote=null;
  } else {
    if(myTitleVote){
      await sb.from('title_votes').delete().eq('game_id',GAME_ID).eq('user_id',userId);
      if(titleVotes[myTitleVote])titleVotes[myTitleVote]--;
    }
    var r=await sb.from('title_votes').insert({game_id:GAME_ID,title_text:txt,user_id:userId});
    if(!r.error){myTitleVote=txt;titleVotes[txt]=(titleVotes[txt]||0)+1;}
    else if(r.error.code==='23505'){showToast('すでに投票済みです');return;}
  }
  renderTitles();
  renderMyCard();
  showToast(myTitleVote?'「'+txt+'」に投票しました！':'投票を取り消しました');
}

// ===== ストーリー =====
function renderStory(){
  var el=document.getElementById('story-root');if(!el)return;
  var html='';
  // イニング別モーメント
  for(var inn=1;inn<=9;inn++){
    var evts=MOMENTS.filter(function(m){return m.inning&&parseInt(m.inning)===inn;});
    var myT=turnings.filter(function(t){return parseInt(t.inning)===inn;});
    if(!evts.length&&!myT.length)continue;

    // 流れ変化
    if(inn>1){
      var prevEvts=MOMENTS.filter(function(m){return m.inning&&parseInt(m.inning)===inn-1;});
      var hiroshimaIsAway4 = GAME && GAME.away === '広島';
      // 広島の攻撃かどうか判定してラベルを変える
      var hiroScore=evts.some(function(e){
        var isUra=e.inning&&e.inning.includes('裏');
        var isHiro=hiroshimaIsAway4?!isUra:isUra;
        return isHiro&&(e.type==='hr'||e.type==='score');
      });
      var aiteScore=evts.some(function(e){
        var isUra=e.inning&&e.inning.includes('裏');
        var isAite=hiroshimaIsAway4?isUra:!isUra;
        return isAite&&(e.type==='hr'||e.type==='score');
      });
      var hasPrevCrisis=prevEvts.some(function(e){return e.type==='crisis';});
      if(hiroScore){
        html+='<div class="flow-change up"><div class="fc-line"></div>▲ 流れが来た！<div class="fc-line"></div></div>';
      } else if(aiteScore){
        html+='<div class="flow-change down"><div class="fc-line"></div>▼ 流れが傾いた<div class="fc-line"></div></div>';
      } else if(hasPrevCrisis){
        html+='<div class="flow-change flat"><div class="fc-line"></div>▽ チャンスを逃した<div class="fc-line"></div></div>';
      } else {
        html+='<div class="flow-change flat">│</div>';
      }
    }

    html+='<div class="fi">';
    // イニングヘッダー
    // flow: 広島優勢=小(上)、相手優勢=大(下)、45=平常
    var hiroshimaIsAway3 = GAME && GAME.away === '広島';
    var flow = 45;
    if(evts.length){
      var bestFlow = 45;
      evts.forEach(function(evt){
        var isUra = evt.inning && evt.inning.includes('裏');
        var isHiroAttack = hiroshimaIsAway3 ? !isUra : isUra;
        var f;
        if(evt.type==='hr') f = isHiroAttack ? 18 : 80;
        else if(evt.type==='score') f = isHiroAttack ? 25 : 72;
        else if(evt.type==='crisis') f = isHiroAttack ? 62 : 58;
        else f = 45;
        // 最も極端な値を使う（広島優勢なら最小、相手優勢なら最大）
        if(isHiroAttack) bestFlow = Math.min(bestFlow, f);
        else bestFlow = Math.max(bestFlow, f);
      });
      flow = bestFlow;
    }
    var emo=getEmotion(flow);
    html+='<div class="inning-head"><span class="inning-num">'+inn+'回</span>';
    html+='<span class="inning-emotion '+emo.cls+'">'+emo.label+'</span>';
    html+='<div class="inning-divider"></div></div>';

    // イベント
    evts.forEach(function(e){
      html+='<div class="evt '+e.type+'">'+
        '<div class="evt-meta"><span class="evt-badge '+(TYPE_BADGE[e.type]||'')+'">'+(TYPE_LABEL[e.type]||e.type)+'</span></div>'+
        '<div class="evt-desc">'+esc(e.desc)+'</div>'+
        (e.sub?'<div class="evt-sub">'+esc(e.sub)+'</div>':'')+
        '</div>';
    });

    html+='</div>';// fi
  }
  el.innerHTML=html||'<div class="empty-state">試合データを読み込み中...</div>';
  initFI();
}

];

  '床田 寛樹','九里 亜蓮','森下 暢仁','大瀬良 大地',
  'ターノック','アドゥワ 誠','玉村 昇悟','高橋 昂也',

async function initLineup(g){
  var area = document.getElementById('lineup-body-area');
  if(!area) return;
  var players = [];
  var pitchers = [];

  // 守備位置を 投/捕/内/外 に正規化（carpLineup由来の「中」「二」「三」等も対応）
  function normalizePos(pos){
    if(!pos) return '?';
    var first = String(pos).charAt(0);
    if(first==='投') return '投';
    if(first==='捕') return '捕';
    if(['一','二','三','遊'].indexOf(first)>=0) return '内';
    if(['左','中','右'].indexOf(first)>=0) return '外';
    if(pos==='DH') return '内';
    if(['投','捕','内','外'].indexOf(pos)>=0) return pos;
    return pos;
  }

  // 優先1: 今日の試合JSONの players（NPB roster.html 由来の最新ベンチ入り）
  // ベンチ入りは通常25〜26人なので24人以上を「信頼できる」と判定
  // それ未満は carpLineup（実際の出場選手のみ）の可能性が高いので使わない
  var ROSTER_THRESHOLD = 24;
  if(g && Array.isArray(g.players) && g.players.length >= ROSTER_THRESHOLD){
    g.players.forEach(function(p){
      var np = normalizePos(p.pos);
      if(np==='投') pitchers.push(p.name);
      else players.push({name:p.name, pos:np});
    });
  }

  // 優先2: 直近1週間の試合JSONを遡って探す
  // 14人以上あれば実績データとして許容（carpLineup でも欠損 carpRoster でも）
  // ただし正規化してグルーピング可能にする
  var FALLBACK_THRESHOLD = 14;
  if(!players.length){
    for(var d=1; d<=7; d++){
      var prevDate = addDays(currentDate, -d);
      try{
        var pr = await fetch('/games/'+prevDate+'.json?t='+Date.now());
        if(!pr.ok) continue;
        var pd = await pr.json();
        if(pd && Array.isArray(pd.players) && pd.players.length >= FALLBACK_THRESHOLD){
          pd.players.forEach(function(p){
            var np = normalizePos(p.pos);
            if(np==='投') pitchers.push(p.name);
            else players.push({name:p.name, pos:np});
          });
          break;
        }
      } catch(e){ /* try next */ }
    }
  }

  // 優先3: 静的マスター（hiroshima_roster.json）
  if(!players.length || !pitchers.length){
    try{
      var rr=await fetch('/games/hiroshima_roster.json?t='+Date.now());
      var rd=await rr.json();
      if(!players.length){
        (rd.players||[]).forEach(function(p){
          var np=normalizePos(p.pos);
          if(np==='投')pitchers.push(p.name);
          else players.push({name:p.name, pos:np});
        });
      } else if(!pitchers.length){
        (rd.players||[]).forEach(function(p){if(normalizePos(p.pos)==='投') pitchers.push(p.name);});
      }
    }catch(e){
      console.warn('hiroshima_roster.json fetch failed:', e);
    }
  }

  // 最終フォールバック: ハードコード
  if(!players.length){
    players = (g&&g.players&&g.players.length)?g.players:CARP_PLAYERS_MASTER;
    // ハードコードも正規化（"一" のような場合のため）
    players = players.map(function(p){return {name:p.name, pos:normalizePos(p.pos)};});
  }
  if(!pitchers.length) pitchers = CARP_PITCHERS_MASTER;

  // 先発投手をplayersに追加
  var pitcherName=(g.away_team==='広島'?g.away_pitcher:g.home_pitcher)||g.homePitcher||'';
  if(pitcherName&&!players.find(function(p){return p.name===pitcherName;})){
    players=[{name:pitcherName,pos:'投'}].concat(players);
  }
  LINEUP_PITCHER=pitcherName;
  renderLineupForm(area, players, pitchers);
  loadMinnaLineup();
}

function addLineupPlayer(btn){
  if(LINEUP_ORDER.length>=9) return;
  var name=btn.dataset.name, pos=btn.dataset.pos;
  LINEUP_ORDER.push({order:LINEUP_ORDER.length+1, name:name, pos:pos});
  btn.classList.add('used');
  renderLineupOrder();
  updateLineupSubmit();
}

function removeLineupPlayer(order){
  var removed = LINEUP_ORDER.find(function(p){return p.order===order;});
  LINEUP_ORDER = LINEUP_ORDER.filter(function(p){return p.order!==order;});
  // 順番を振り直す
  LINEUP_ORDER.forEach(function(p,i){p.order=i+1;});
  // ボタンを戻す
  if(removed){
    Array.from(document.querySelectorAll('#lineup-players .lp-btn')).forEach(function(btn){
      if(btn.dataset.name===removed.name) btn.classList.remove('used');
    });
  }
  renderLineupOrder();
  updateLineupSubmit();
}

async function submitLineup(){
  if(LINEUP_POSTED){showToast('投稿済みです');return;}
  if(LINEUP_ORDER.length!==9){showToast('9人を選択してください');return;}
  // 試合開始前チェック
  if(!isBeforeGameStart()){showToast('試合が始まっているため投稿できません');return;}
  var r=await sb.from('lineup_predictions').upsert({
    game_id:GAME_ID, user_id:userId,
    lineup:LINEUP_ORDER,
    pitcher:LINEUP_PITCHER
  },{onConflict:'game_id,user_id'});
  if(r.error){showToast('投稿に失敗しました');return;}
  LINEUP_POSTED=true;
  showToast('予想オーダーを投稿しました！');
  // ボタンを「投稿済み・シェア」に切り替え
  var nav=document.getElementById('lineup-nav');
  if(nav){
    nav.innerHTML='<button class="ep-back" onclick="resetLineup()">やり直す</button>'+
      '<button class="ep-btn-share" onclick="shareLineup()">'+
      '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'+
      'シェア</button>';
  }
  await loadMinnaLineup();
}

function isBeforeGameStart(){
  if(GAME.status==='final') return false;
  if(!GAME.startTime) return true;
  var today=new Date();
  var gameDateStr=currentDate+'T'+GAME.startTime+':00+09:00';
  var gameTime=new Date(gameDateStr);
  return today < gameTime;
}

function resetLineup(){
  LINEUP_ORDER=[];LINEUP_POSTED=false;LINEUP_PITCHER='';
  var area=document.getElementById('lineup-body-area');
  if(area){
    var players=(PLAYERS&&PLAYERS.length>0)?PLAYERS:CARP_PLAYERS_MASTER;
    renderLineupForm(area, players, CARP_PITCHERS_MASTER);
  }
}

function shareLineup(){
  var score=GAME.away+'vs'+GAME.home+'（'+GAME.date+'）';
  var shareUrl='https://carp-talk.vercel.app/?date='+currentDate;
  var orderText=LINEUP_ORDER.map(function(p){return p.order+'番 '+p.name;}).join('\n');
  var text='【カープ予想スタメン】\n'+score+'\n先発：'+LINEUP_PITCHER+'\n'+orderText+'\n#広島カープ #カープトーク\n'+shareUrl;

  // Canvas画像生成
  function buildLineupCanvas(cb){
    try{
      var cv=document.createElement('canvas');cv.width=640;cv.height=720;
      var ctx=cv.getContext('2d');
      // 背景
      ctx.fillStyle='#0a0c10';ctx.fillRect(0,0,640,720);
      // グラデバー
      var grad=ctx.createLinearGradient(0,0,640,0);
      grad.addColorStop(0,'#c8102e');grad.addColorStop(1,'#ff6040');
      ctx.fillStyle=grad;ctx.fillRect(0,0,640,5);
      // タイトル
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='12px sans-serif';
      ctx.fillText('本日のカープトーク｜予想スタメン',24,30);
      ctx.fillStyle='#ffffff';ctx.font='bold 18px sans-serif';
      ctx.fillText(GAME.date+' vs '+GAME.home,24,56);
      // 先発
      ctx.fillStyle='#f0c040';ctx.font='bold 14px sans-serif';
      ctx.fillText('先発：'+LINEUP_PITCHER,24,82);
      // 区切り線
      ctx.strokeStyle='rgba(200,16,46,0.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(24,96);ctx.lineTo(616,96);ctx.stroke();
      // 打順リスト
      var startY=116;var rowH=56;
      LINEUP_ORDER.forEach(function(p,idx){
        var y=startY+idx*rowH;
        // 行背景（交互）
        ctx.fillStyle=idx%2===0?'rgba(255,255,255,0.03)':'transparent';
        ctx.fillRect(16,y-2,608,rowH-4);
        // 番号サークル
        var grad2=ctx.createLinearGradient(0,y,0,y+40);
        grad2.addColorStop(0,'#c8102e');grad2.addColorStop(1,'#a00020');
        ctx.fillStyle=grad2;
        ctx.beginPath();ctx.arc(48,y+22,20,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffffff';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
        ctx.fillText(p.order,48,y+28);ctx.textAlign='left';
        // ポジションバッジ
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.beginPath();ctx.roundRect(80,y+8,36,22,4);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='11px sans-serif';
        ctx.textAlign='center';ctx.fillText(p.pos,98,y+23);ctx.textAlign='left';
        // 選手名
        ctx.fillStyle='#ffffff';ctx.font='bold 20px sans-serif';
        ctx.fillText(p.name,126,y+28);
      });
      // フッター
      ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='11px sans-serif';
      ctx.textAlign='right';ctx.fillText('carp-talk.vercel.app',616,705);
      ctx.fillStyle='#c8102e';ctx.font='bold 11px sans-serif';
      ctx.textAlign='left';ctx.fillText('本日のカープトーク',24,705);
      cb(cv);
    }catch(e){console.error(e);cb(null);}
  }

  if(navigator.share&&navigator.canShare){
    buildLineupCanvas(function(cv){
      if(cv){
        cv.toBlob(function(blob){
          var file=new File([blob],'lineup-'+currentDate+'.png',{type:'image/png'});
          var shareData={title:'カープ予想スタメン',text:text,files:[file]};
          if(navigator.canShare(shareData)){
            navigator.share(shareData).catch(function(e){
              if(e.name!=='AbortError'){
                window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank');
              }
            });return;
          }
          var a=document.createElement('a');a.download='lineup-'+currentDate+'.png';
          a.href=URL.createObjectURL(blob);a.click();
          setTimeout(function(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(shareUrl),'_blank');},600);
        },'image/png');
      }
    });
  } else {
    buildLineupCanvas(function(cv){
      if(cv){var a=document.createElement('a');a.download='lineup-'+currentDate+'.png';a.href=cv.toDataURL('image/png');a.click();}
      setTimeout(function(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(shareUrl),'_blank');},600);
    });
  }
}

async function postTurning(){
  var desc=document.getElementById('pf-desc');
  if(!desc||!desc.value.trim()){showToast('内容を入力してください');return;}
  var innSel=document.getElementById('pf-inn');
  var reason=document.getElementById('pf-reason');
  var r=await sb.from('turnings').insert({
    game_id:GAME_ID,inning:innSel?innSel.value:'不明',
    description:desc.value.trim(),
    reason:reason?reason.value.trim()||null:null,
    intensity:pfIntensity||'strong',source:'user',user_id:userId
  }).select().single();
  if(r.error){showToast('投稿に失敗しました');return;}
  var t=r.data;
  await sb.from('turning_votes').insert({turning_id:t.id,game_id:GAME_ID,user_id:userId});
  t.vote_count=1;t.source='user';

  desc.value='';
  if(reason)reason.value='';
  pfIntensity='strong';
  setPfInt('strong');
  togglePostForm();
  drawWave();

async function voteTurning(id){
  var t=turnings.find(function(x){return x.id===id;});if(!t)return;
  if(myTurning===id){
    await sb.from('turning_votes').delete().eq('turning_id',id).eq('user_id',userId);
    t.vote_count=Math.max(0,(t.vote_count||1)-1);myTurning=null;
    renderStory();drawWave();
    showToast('投票を取り消しました');
  } else {
    if(myTurning){
      await sb.from('turning_votes').delete().eq('turning_id',myTurning).eq('user_id',userId);
      var prev=turnings.find(function(x){return x.id===myTurning;});
      if(prev)prev.vote_count=Math.max(0,(prev.vote_count||1)-1);
    }
    var r=await sb.from('turning_votes').insert({turning_id:id,game_id:GAME_ID,user_id:userId});
    if(r.error&&r.error.code==='23505'){showToast('すでに投票済みです');return;}
    t.vote_count=(t.vote_count||0)+1;myTurning=id;
    renderStory();drawWave();
    // 投票後にポップアップを表示
    setTimeout(function(){openPopup(id,t.inning+'の分岐点に投票しました');},300);
  }
  renderMyCard();
}

// ===== ターニングポイント読み込み =====
async function loadTurnings(g){
  // ① JSONのsystem候補をDBに upsert（なければ追加）
  if(g.turning_suggestions){
    for(var i=0;i<g.turning_suggestions.length;i++){
      var s=g.turning_suggestions[i];
      var ex=await sb.from('turnings').select('id').eq('game_id',GAME_ID).eq('description',s.description).eq('source','system').maybeSingle();
      if(!ex.data){
        await sb.from('turnings').insert({game_id:GAME_ID,inning:s.inning,description:s.description,reason:s.reason||null,intensity:s.intensity||'mid',source:'system',user_id:'system',choices:s.choices||null});
      } else if(ex.data&&s.choices){
        await sb.from('turnings').update({choices:s.choices}).eq('id',ex.data.id);
      }
    }
  }
  // ② DBから全分岐点を取得
  var r=await sb.from('turnings').select('*').eq('game_id',GAME_ID).order('created_at',{ascending:true});
  turnings=r.data||[];
  // ③ 投票数を別クエリで取得（より確実）
  var rv=await sb.from('turning_votes').select('turning_id,choice').eq('game_id',GAME_ID);
  var counts={};
  if(rv.data)rv.data.forEach(function(v){counts[v.turning_id]=(counts[v.turning_id]||0)+1;});
  // choice別の集計
  var choiceCounts={};
  if(rv.data)rv.data.forEach(function(v){if(v.choice){var key=v.turning_id+'::'+v.choice;choiceCounts[key]=(choiceCounts[key]||0)+1;}});
  turnings.forEach(function(t){t.vote_count=counts[t.id]||0;
    t.choice_counts={};
    if(t.choices)t.choices.forEach(function(c){t.choice_counts[c]=choiceCounts[t.id+'::'+c]||0;});});
  // JSONのchoicesをDBのturningsにマージ
  if(g&&g.turning_suggestions){
    g.turning_suggestions.forEach(function(s){
      var found=turnings.find(function(t){return t.description===s.description;});
      if(found&&s.choices)found.choices=s.choices;
    });
  }
}

  if(isCancelled){

    ['player-section','minna-section','comment-section','title-section','wave-svg','wg','conn-svg','story-root','tp-track','tp-hint','tp-add-toggle','wave-inn-labels','wave-markers','wave-fill','wave-line','wave-box','ai-section','positive-section','debate-section','mood-section','mycard-section','preview-section','lineup-section'].forEach(function(id){
      var el=document.getElementById(id);
      if(el)el.style.display='none';
    });
    // 「中止」の補足メッセージを表示
    var mc=document.getElementById('main-content');
    if(mc && !document.getElementById('cancelled-note')){
      var note=document.createElement('div');
      note.id='cancelled-note';
      note.style.cssText='background:rgba(180,180,180,.08);border:1px solid rgba(200,200,200,.2);border-radius:var(--r);padding:1.1rem 1.1rem;margin-bottom:1rem;text-align:center;color:var(--muted);font-size:13px;line-height:1.7';
      note.innerHTML='⚪ 本日の試合は中止になりました。<br><span style="font-size:11px">次の試合をお楽しみに ⚾</span>';
      // スコアカードの直後に挿入
      var sc=mc.querySelector('.score-card');
      if(sc&&sc.nextSibling) mc.insertBefore(note, sc.nextSibling);
      else mc.appendChild(note);
    }
  } else if(!isScheduled){
    // 選手評価セクションを表示
    var ps=document.getElementById('player-section');
    if(ps)ps.style.display='';
  } else {
    // scheduled時は評価系セクションを非表示
    ['player-section','minna-section','comment-section','title-section','wave-svg','wg','conn-svg','story-root','tp-track','tp-hint','tp-add-toggle','wave-inn-labels','wave-markers','wave-fill','wave-line','wave-box','ai-section','positive-section','debate-section','mood-section','mycard-section'].forEach(function(id){
      var el=document.getElementById(id);
      if(el)el.style.display='none';
    });
  }
  initLineup(g);
  loadMinnaEval();
  // 少し遅延してchoice表示を確実に初期化
  setTimeout(loadAllTpChoices,800);
  // 気分チェックイン・マイカードを初期化
  loadMoodVotes();
  renderMyCard();

  // リアルタイム購読
  subscribeRealtime();
}

function subscribeRealtime(){
  sb.channel('title-'+GAME_ID).on('postgres_changes',{event:'INSERT',schema:'public',table:'title_votes',filter:'game_id=eq.'+GAME_ID},function(payload){
    titleVotes[payload.new.title_text]=(titleVotes[payload.new.title_text]||0)+1;
    renderTitles();flashLive();
  }).subscribe();
  sb.channel('turnings-'+GAME_ID).on('postgres_changes',{event:'*',schema:'public',table:'turning_votes',filter:'game_id=eq.'+GAME_ID},function(){
    // 再取得
    sb.from('turning_votes').select('turning_id').eq('game_id',GAME_ID).then(function(r){
      if(r.data){var counts={};r.data.forEach(function(v){counts[v.turning_id]=(counts[v.turning_id]||0)+1;});turnings.forEach(function(t){t.vote_count=counts[t.id]||0;});renderStory();drawWave();}
    });
    flashLive();
  }).subscribe();
  sb.channel('comments-'+GAME_ID).on('postgres_changes',{event:'INSERT',schema:'public',table:'comments',filter:'game_id=eq.'+GAME_ID},function(){loadComments();flashLive();}).subscribe();
  // 議論エンジンのリアルタイム
  sb.channel('debate-votes-'+GAME_ID).on('postgres_changes',{event:'*',schema:'public',table:'debate_votes',filter:'game_id=eq.'+GAME_ID},function(){
    debateVotes={};
    sb.from('debate_votes').select('debate_id,choice_idx,user_id').eq('game_id',GAME_ID).then(function(r){
      if(r.data){
        r.data.forEach(function(v){
          if(!debateVotes[v.debate_id]) debateVotes[v.debate_id]={};
          debateVotes[v.debate_id][v.choice_idx]=(debateVotes[v.debate_id][v.choice_idx]||0)+1;
          if(v.user_id===userId) myDebateVotes[v.debate_id]=v.choice_idx;
        });
        renderDebates();
        flashLive();
      }
    });
  }).subscribe();
  sb.channel('debate-cmts-'+GAME_ID).on('postgres_changes',{event:'INSERT',schema:'public',table:'debate_comments',filter:'game_id=eq.'+GAME_ID},function(payload){
    var c=payload.new;
    if(!c) return;
    if(!debateComments[c.debate_id]) debateComments[c.debate_id]=[];
    if(!debateComments[c.debate_id].find(function(x){return x.id===c.id;})){
      debateComments[c.debate_id].unshift(c);
      renderDebates();
      flashLive();
    }
  }).subscribe();
  // 気分チェックインのリアルタイム
  sb.channel('mood-'+GAME_ID).on('postgres_changes',{event:'*',schema:'public',table:'mood_votes',filter:'game_id=eq.'+GAME_ID},function(){
    loadMoodVotes();flashLive();
  }).subscribe();
}

async function submitPopup(){

    });

  } else if(popupTab==='rate'){

      await sb.from('player_ratings').delete().eq('game_id',GAME_ID).eq('user_id',userId).eq('player_name',entries[i][0]);

function renderPlayerGrid(){
  var el=document.getElementById('player-grid');if(!el)return;
  if(!PLAYERS||!PLAYERS.length){
    el.innerHTML='<div style="color:var(--muted);font-size:13px">選手データを読み込み中...</div>';
    return;
  }
  var html='';
  PLAYERS.forEach(function(p){
    var r=playerRatings[p.name]||null;
    var c=playerRatingCounts[p.name]||{mvp:0,good:0,cheer:0};
    var total=c.mvp+c.good+c.cheer;
    var BTNS=[{v:'mvp',l:'MVP',col:'var(--accent)'},{v:'good',l:'よかった',col:'var(--green)'},{v:'cheer',l:'もっと頑張れ',col:'var(--carp)'}];
    html+='<div class="player-row" style="flex-direction:column;align-items:stretch;gap:5px">';
    // 上段：アバター + 名前 + ボタン
    html+='<div style="display:flex;align-items:center;gap:10px">';
    html+='<div class="player-av">'+p.name.slice(0,1)+'</div>';
    html+='<span class="player-name">'+esc(p.name)+'</span>';
    html+='<span class="player-pos">'+esc(p.pos)+'</span>';
    html+='<div class="rating-row" style="margin-left:auto">';
    BTNS.forEach(function(rb){
      var sel=r===rb.v;
      var cnt=c[rb.v]||0;
      html+='<button class="rating-btn '+rb.v+(sel?' sel':'')+'" onclick="ratePlayerGrid(this)" data-name="'+p.name+'" data-rv="'+rb.v+'">';
      html+=rb.l+(cnt>0?'<span class="rating-count">'+cnt+'</span>':'');
      html+='</button>';
    });
    html+='</div></div>';
    // 下段：票数バー（1票以上あるとき）
    if(total>0){
      html+='<div class="player-rating-bar" style="padding:0 0 0 42px">';
      BTNS.forEach(function(rb){
        var cnt=c[rb.v]||0;
        if(cnt===0)return;
        var pct=Math.round(cnt/total*100);
        html+='<div style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--muted)">';
        html+='<div class="rating-bar-seg" style="width:'+pct+'px;background:'+rb.col+';opacity:.6"></div>';
        html+=rb.l+' '+pct+'%';
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });
  el.innerHTML=html;
}

async function ratePlayerGrid(btn){
  var name=btn.dataset.name,rating=btn.dataset.rv;
  playerRatings[name]=(playerRatings[name]===rating)?null:rating;
  renderPlayerGrid();
  await sb.from('player_ratings').delete().eq('game_id',GAME_ID).eq('user_id',userId).eq('player_name',name);
  if(playerRatings[name]){
    await sb.from('player_ratings').insert({game_id:GAME_ID,user_id:userId,player_name:name,rating:playerRatings[name]});
    var L={mvp:'MVP',good:'よかった',cheer:'もっと頑張れ'};
    showToast(name+' に「'+(L[playerRatings[name]]||'')+'」をつけました！');
  } else {
    showToast(name+' の評価を取り消しました');
  }
}

async function loadPlayerRatings(){
  // 自分の投票（ハイライト用）
  var r=await sb.from('player_ratings').select('player_name,rating').eq('game_id',GAME_ID).eq('user_id',userId);
  if(r.data)r.data.forEach(function(x){
    if(x.rating) playerRatings[x.player_name]=x.rating;
  });
  // 全員の集計（票数表示用）
  var all=await sb.from('player_ratings').select('player_name,rating').eq('game_id',GAME_ID);
  playerRatingCounts={};
  if(all.data)all.data.forEach(function(x){
    if(!x.rating)return;
    if(!playerRatingCounts[x.player_name])playerRatingCounts[x.player_name]={mvp:0,good:0,cheer:0};
    x.rating.split(',').filter(Boolean).forEach(function(rv){
      if(playerRatingCounts[x.player_name][rv]!==undefined)
        playerRatingCounts[x.player_name][rv]++;
    });
  });
  renderPlayerGrid();
}

function renderEpStep(n){
  EP.step=n;
  [1,2,3].forEach(function(i){
    var p=document.getElementById('ep-p'+i);
    if(p)p.classList.toggle('active',i===n);
    var d=document.getElementById('ep'+i);
    if(d){d.classList.toggle('done',i<n);d.classList.toggle('active',i===n);}
  });
  var back=document.getElementById('ep-btn-back');
  var next=document.getElementById('ep-btn-next');
  if(back)back.style.display=n>1?'':'none';
  if(next){
    next.textContent=n===3?'決定':'次へ →';
    var hasVal=(n===1&&EP.v1)||(n===2&&EP.v2)||(n===3&&EP.v3);
    next.classList.toggle('on',!!hasVal);
  }
  var sum=document.getElementById('ep-summary');
  if(sum)sum.style.display='none';
}

function epNext(){
  if(EP.step===1&&!EP.v1)return;
  if(EP.step===2&&!EP.v2)return;
  if(EP.step===3){
    if(!EP.v3)return;
    epShowShare();
    return;
  }
  if(EP.step===2)renderEpStep3Choices(turnings.find(function(t){return t.id===EP.bunki;}));
  EP.step++;
  renderEpStep(EP.step);
  if(EP.step===2)renderEpStep2();
}

function epBack(){
  if(EP.step>1){EP.step--;renderEpStep(EP.step);}
}

function epShowShare(){
  [1,2,3].forEach(function(i){
    var p=document.getElementById('ep-p'+i);if(p)p.classList.remove('active');
    var d=document.getElementById('ep'+i);if(d){d.classList.add('done');d.classList.remove('active');}
  });
  var sum=document.getElementById('ep-summary');
  if(sum)sum.style.display='flex';
  var nav=document.getElementById('ep-nav');
  if(nav){
    nav.innerHTML='<button class="ep-back" onclick="epReset()">やり直す</button>'+
      '<button class="ep-btn-post" onclick="epPost()">決定</button>'+
      '<button class="ep-btn-share" onclick="epShare()">'+
      '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'+
      'シェア</button>';
  }
}

function epShare(){
  var score=GAME.home+GAME.homeScore+'-'+GAME.awayScore+GAME.away;
  var shareText='【カープトーク】'+GAME.date+' '+score+'\n'+
    '一言：「'+EP.v1+'」\n'+
    '分岐点：'+EP.v2+'\n'+
    '自分なら：'+EP.v3+'\n'+
    '#広島カープ #カープトーク';
  var shareUrl='https://carp-talk.vercel.app/?date='+currentDate;

  // Canvas でシェアカード画像を生成
  function buildCanvas(cb){
    try{
      var cv=document.createElement('canvas');
      cv.width=800;cv.height=420;
      var ctx=cv.getContext('2d');
      ctx.fillStyle='#0a0c10';ctx.fillRect(0,0,800,420);
      var grad=ctx.createLinearGradient(0,0,800,0);
      grad.addColorStop(0,'#c8102e');grad.addColorStop(.5,'#ff4060');grad.addColorStop(1,'#f0c040');
      ctx.fillStyle=grad;ctx.fillRect(0,0,800,4);
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='14px sans-serif';
      ctx.fillText(GAME.date+'  '+score,40,40);
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='11px sans-serif';
      ctx.fillText('この試合を一言で言うと',40,80);
      ctx.fillStyle='#f0c040';ctx.font='bold 22px sans-serif';
      ctx.fillText('「'+EP.v1+'」',40,112);
      ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(40,135);ctx.lineTo(760,135);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='11px sans-serif';
      ctx.fillText('ここが分岐点だと思った',40,162);
      ctx.fillStyle='#ffffff';ctx.font='bold 18px sans-serif';
      var bt=EP.v2;if(ctx.measureText(bt).width>680)bt=bt.slice(0,28)+'...';
      ctx.fillText(bt,40,190);
      ctx.beginPath();ctx.moveTo(40,215);ctx.lineTo(760,215);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='11px sans-serif';
      ctx.fillText('自分ならこうしてた',40,242);
      ctx.fillStyle='#4adf9a';ctx.font='bold 18px sans-serif';
      var ct=EP.v3;if(ctx.measureText(ct).width>680)ct=ct.slice(0,28)+'...';
      ctx.fillText(ct,40,270);
      ctx.beginPath();ctx.moveTo(40,295);ctx.lineTo(760,295);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='13px sans-serif';
      ctx.fillText('#広島カープ #カープトーク',40,330);
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='12px sans-serif';
      ctx.textAlign='right';ctx.fillText('carp-talk.vercel.app',760,330);ctx.textAlign='left';
      ctx.fillStyle='#c8102e';ctx.font='bold 13px sans-serif';
      ctx.fillText('本日のカープトーク',40,370);
      ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='11px sans-serif';
      ctx.fillText('あなたの分岐点を、シェアしよう。',40,390);
      cb(cv);
    }catch(e){console.error('Canvas error:',e);cb(null);}
  }

  // Web Share API（スマホ対応）
  if(navigator.share && navigator.canShare){
    buildCanvas(function(cv){
      if(cv){
        cv.toBlob(function(blob){
          var file=new File([blob],'carp-talk-'+currentDate+'.png',{type:'image/png'});
          var shareData={title:'本日のカープトーク',text:shareText,files:[file]};
          if(navigator.canShare(shareData)){
            navigator.share(shareData).catch(function(e){
              // シェアキャンセル or エラー時はURL共有にフォールバック
              if(e.name!=='AbortError'){
                window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText)+'&url='+encodeURIComponent(shareUrl),'_blank','noopener,noreferrer');
              }
            });
            return;
          }
          // canShare=falseの場合はダウンロード+X
          var a=document.createElement('a');
          a.download='carp-talk-'+currentDate+'.png';
          a.href=URL.createObjectURL(blob);a.click();
          setTimeout(function(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText)+'&url='+encodeURIComponent(shareUrl),'_blank','noopener,noreferrer');},600);
        },'image/png');
      }
    });
  } else {
    // PC: ダウンロード + X投稿画面
    buildCanvas(function(cv){
      if(cv){
        var a=document.createElement('a');
        a.download='carp-talk-'+currentDate+'.png';
        a.href=cv.toDataURL('image/png');a.click();
      }
      setTimeout(function(){
        window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText)+'&url='+encodeURIComponent(shareUrl),'_blank','noopener,noreferrer');
      },600);
    });
  }
}

function epReset(){

  }
  renderEpStep(1);
}

function epShowShareSilent(){
  [1,2,3].forEach(function(i){
    var p=document.getElementById('ep-p'+i);if(p)p.classList.remove('active');
    var d=document.getElementById('ep'+i);if(d){d.classList.add('done');d.classList.remove('active');}
  });
  var sv1=document.getElementById('ep-sv1');if(sv1)sv1.textContent=EP.v1;
  var sv2=document.getElementById('ep-sv2');if(sv2)sv2.textContent=EP.v2;
  var sv3=document.getElementById('ep-sv3');if(sv3)sv3.textContent=EP.v3;
  updateEpSelBar();
  var sum=document.getElementById('ep-summary');
  if(sum)sum.style.display='flex';
  var nav=document.getElementById('ep-nav');
  if(nav){
    nav.innerHTML='<button class="ep-back" onclick="epReset()" style="opacity:.5;font-size:11px">やり直す</button>'+
      '<button class="ep-btn-post" style="color:var(--green);border-color:var(--green);cursor:default">✓ 投稿済み</button>'+
      '<button class="ep-btn-share" onclick="epShare()">'+
      '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'+
      'シェア</button>';
  }
}

async function epPost(){
  if(evalPostDone){showToast('投稿済みです');return;}
  // sel-barからフォールバック取得（EP変数が空の場合）
  if(!EP.v1){var e=document.getElementById('ep-sv1-bar');if(e&&e.textContent.trim())EP.v1=e.textContent.trim();}
  if(!EP.v2){var e=document.getElementById('ep-sv2-bar');if(e&&e.textContent.trim())EP.v2=e.textContent.trim();}
  if(!EP.v3){var e=document.getElementById('ep-sv3-bar');if(e&&e.textContent.trim())EP.v3=e.textContent.trim();}
  // summaryからもフォールバック
  if(!EP.v1){var e=document.getElementById('ep-sv1');if(e&&e.textContent.trim())EP.v1=e.textContent.trim();}
  if(!EP.v2){var e=document.getElementById('ep-sv2');if(e&&e.textContent.trim())EP.v2=e.textContent.trim();}
  if(!EP.v3){var e=document.getElementById('ep-sv3');if(e&&e.textContent.trim())EP.v3=e.textContent.trim();}
  console.log('[epPost] v1='+EP.v1+' v2='+EP.v2+' v3='+EP.v3);
  if(!EP.v1||!EP.v2||!EP.v3){showToast('全ての項目を選択してください');return;}
  var t=turnings.find(function(x){
    return (EP.bunki&&x.id===EP.bunki)||(x.description&&EP.v2.includes(x.description.slice(0,10)));
  });
  var r=await sb.from('eval_posts').upsert({
    game_id:GAME_ID, user_id:userId,
    title:EP.v1,
    bunki_id:t?t.id:null,
    bunki_text:EP.v2,
    choice:EP.v3
  },{onConflict:'game_id,user_id'});
  if(r.error){showToast('投稿に失敗しました：'+r.error.message);return;}
  evalPostDone=true;
  showToast('評価を投稿しました！');
  epShowShareSilent();
  await loadMinnaEval();
}

async function loadMinnaEval(){
  var el=document.getElementById('minna-track');if(!el)return;
  var r=await sb.from('eval_posts').select('*').eq('game_id',GAME_ID).order('created_at',{ascending:false}).limit(20);
  if(!r.data||!r.data.length){
    el.innerHTML='<div class="minna-empty">まだ評価がありません。最初の一人になりましょう！</div>';
    return;
  }
  el.innerHTML=r.data.map(function(p){
    var isMe=p.user_id===userId;
    return '<div class="minna-card'+(isMe?' mine':'')+'">'+
      (isMe?'<div class="minna-mine-lbl">あなた</div>':'')+
      '<div class="minna-kw">「'+esc(p.title||'')+'」</div>'+
      '<div class="minna-bunki">'+esc(p.bunki_text||'')+'</div>'+
      '<div class="minna-choice">→ '+esc(p.choice||'')+'</div>'+
      '<div class="minna-time">'+formatTime(p.created_at)+'</div>'+
      '</div>';
  }).join('');
}

// ===== 分岐点choice表示 =====
async function loadTpChoicesAll(){
  if(!turnings||!turnings.length)return;
  // 全分岐点のchoice集計を一括取得
  var r=await sb.from('turning_votes').select('turning_id,choice').eq('game_id',GAME_ID);
  if(!r.data)return;
  // turning_idごとに集計
  var map={};
  r.data.forEach(function(v){
    if(!v.choice)return;
    if(!map[v.turning_id])map[v.turning_id]={};
    map[v.turning_id][v.choice]=(map[v.turning_id][v.choice]||0)+1;
  });
  // 各分岐点のbodyに表示
  turnings.forEach(function(t){
    var body=document.getElementById('tpcb-'+t.id);
    if(!body)return;
    var counts=map[t.id]||{};
    var total=Object.values(counts).reduce(function(s,v){return s+v;},0);
    var choices=(t.choices)||[];
    if(total===0){
      if(choices.length){
        body.innerHTML=choices.map(function(c){
          return '<div class="choice-bar-row">'+
            '<span class="choice-lbl">'+esc(c)+'</span>'+
            '<div class="choice-bar"><div class="choice-bar-fill" style="width:0%"></div></div>'+
            '<span class="choice-pct">0%</span></div>';
        }).join('');
      } else {
        body.innerHTML='<div style="font-size:11px;color:var(--muted);padding:.25rem 0">まだ回答がありません</div>';
      }
      return;
    }
    // 得票順にソート
    var allChoices=choices.length?choices:Object.keys(counts);
    var sorted=allChoices.map(function(c){return{c:c,n:counts[c]||0};}).sort(function(a,b){return b.n-a.n;});
    body.innerHTML=sorted.map(function(e){
      var pct=Math.round(e.n/total*100);
      return '<div class="choice-bar-row">'+
        '<span class="choice-lbl">'+esc(e.c)+'</span>'+
        '<div class="choice-bar"><div class="choice-bar-fill" style="width:'+pct+'%"></div></div>'+
        '<span class="choice-pct">'+pct+'%</span></div>';
    }).join('');
  });
}
async function loadAllTpChoices(){
  // 全分岐点のvoteを一括取得（自分の回答も含む）
  var r=await sb.from('turning_votes').select('turning_id,choice,user_id').eq('game_id',GAME_ID);
  if(!r.data)return;
  // turning_idごとに集計 & 自分の回答チェック
  var map={}, myAnswers={};
  r.data.forEach(function(v){
    if(!v.choice)return;
    if(!map[v.turning_id])map[v.turning_id]={};
    map[v.turning_id][v.choice]=(map[v.turning_id][v.choice]||0)+1;
    if(v.user_id===userId) myAnswers[v.turning_id]=v.choice;
  });
  // 各bodyに描画
  turnings.forEach(function(t){
    var body=document.getElementById('tpcb-'+t.id);
    if(!body)return;
    var counts=map[t.id]||{};
    var total=Object.values(counts).reduce(function(s,v){return s+v;},0);
    var choices=(t.choices)||[];
    var myAnswer=myAnswers[t.id]||null;

    if(!myAnswer){
      // 未回答：選択肢ボタンを表示（他の人が回答していても関係なし）
      if(choices.length===0){
        body.innerHTML='<div style="font-size:11px;color:var(--muted);padding:.25rem 0">選択肢なし</div>';
        return;
      }
      body.innerHTML='<div style="font-size:10px;color:var(--muted);margin-bottom:6px">この場面ならどうした？</div>'+
        '<div style="display:flex;flex-direction:column;gap:5px">'+
        choices.map(function(c){
          return '<button class="tp-choice-opt" onclick="voteTpChoice(this)" data-v="'+esc(c)+'" data-tid="'+t.id+'">'+esc(c)+'</button>';
        }).join('')+
        '</div>';
    } else {
      // 回答済み：投票率バーを表示（自分の選択をハイライト）
      var allChoices=choices.length>0?choices:Object.keys(counts);
      var totForBar=Object.values(counts).reduce(function(s,v){return s+v;},0);
      body.innerHTML='<div style="font-size:10px;color:var(--muted);margin-bottom:5px">'+totForBar+'人が回答</div>'+
        allChoices.map(function(c){
          var cnt=counts[c]||0;
          var pct=totForBar>0?Math.round(cnt/totForBar*100):0;
          var isMe=c===myAnswer;
          return '<div class="choice-bar-row" style="'+(isMe?'opacity:1':'opacity:.7')+'">'+
            '<span class="choice-lbl" style="'+(isMe?'font-weight:700;color:var(--text)':'')+'">'+
            (isMe?'✓ ':'')+esc(c)+'</span>'+
            '<div class="choice-bar"><div class="choice-bar-fill" style="width:'+pct+'%;background:'+(isMe?'var(--carp)':'var(--blue)')+'"></div></div>'+
            '<span class="choice-pct">'+pct+'%</span>'+
            '</div>';
        }).join('');
    }
  });
}
async function toggleTpChoice(btn, turningId){
  var body=document.getElementById('tpcb-'+turningId);
  if(!body)return;
  var isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  btn.textContent=isOpen?'＋':'－';
  if(!isOpen){
    await renderTpChoiceBody(turningId, body);
  }
}

async function renderTpChoiceBody(turningId, body){
  body.innerHTML='<div style="font-size:11px;color:var(--muted);padding:.5rem 0">読み込み中...</div>';
  // turning_votesのchoice集計を取得
  var r=await sb.from('turning_votes').select('choice,user_id').eq('turning_id',turningId);
  var counts={};var total=0;var myChoice=null;
  if(r.data)r.data.forEach(function(v){
    if(!v.choice)return;
    counts[v.choice]=(counts[v.choice]||0)+1;
    total++;
    if(v.user_id===userId)myChoice=v.choice;
  });
  // 分岐点のchoices取得
  var t=turnings.find(function(x){return x.id===turningId;});
  var choices=(t&&t.choices)||Object.keys(counts);
  // choicesがなければcountsのキーから生成
  if(!choices.length){
    body.innerHTML='<div style="font-size:11px;color:var(--muted);padding:.4rem 0">選択肢が設定されていません</div>';
    return;
  }
  // 投票済み or 未投票で表示を切り替え（Xのアンケート方式）
  if(myChoice){
    // 投票率バー表示
    body.innerHTML='<div style="font-size:10px;color:var(--muted);margin-bottom:5px">'+total+'人が回答</div>'+
      choices.map(function(c){
        var cnt=counts[c]||0;
        var pct=total>0?Math.round(cnt/total*100):0;
        var isMe=c===myChoice;
        return '<div class="choice-bar-row">'+
          '<span class="choice-lbl" style="'+(isMe?'color:var(--text);font-weight:500':'')+'">'+(isMe?'✓ ':'')+esc(c)+'</span>'+
          '<div class="choice-bar"><div class="choice-bar-fill" style="width:'+pct+'%;'+(isMe?'background:var(--carp)':'')+'"></div></div>'+
          '<span class="choice-pct">'+pct+'%</span>'+
          '</div>';
      }).join('');
  } else {
    // 未投票：選択肢ボタンを表示
    body.innerHTML='<div style="font-size:10px;color:var(--muted);margin-bottom:6px">この場面ならどうした？</div>'+
      '<div style="display:flex;flex-direction:column;gap:5px">'+
      choices.map(function(c){
        return '<button class="tp-choice-opt" onclick="voteTpChoice(this)" data-v="'+esc(c)+'" data-tid="'+turningId+'">'+esc(c)+'</button>';
      }).join('')+
      '</div>';
  }
}

async function voteTpChoice(btn){
  var turningId=btn.dataset.tid, choice=btn.dataset.v;
  // 楽観的UI更新：選択を表示
  btn.style.background='rgba(200,16,46,.1)';btn.style.borderColor='var(--carp)';btn.style.color='var(--carp)';
  // optimistic UI: 即座にバー表示
  var body=document.getElementById('tpcb-'+turningId);
  if(body){body.innerHTML='<div style="font-size:11px;color:var(--muted);padding:.4rem 0">保存中...</div>';}
  // turning_votesにchoiceを保存
  await sb.from('turning_votes').upsert({
    turning_id:turningId, game_id:GAME_ID, user_id:userId, choice:choice
  },{onConflict:'turning_id,user_id'});
  showToast('「'+choice+'」と回答しました！');
  // バー表示に切り替え
  if(body)await renderTpChoiceBody(turningId, body);
}

// ===== Xシェア =====
function shareToX(text){
  var url='https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent('https://carp-talk.vercel.app/?date='+currentDate);
  window.open(url,'_blank','noopener,noreferrer');
}

function getTurningShareText(turningId){
  var t=turnings.find(function(x){return x.id===turningId;});
  if(!t)return '';
  var score=GAME.home+''+GAME.homeScore+'-'+GAME.awayScore+GAME.away;
  return '【カープトーク】'+GAME.date+' '+score+'\n'+
    t.inning+'「'+t.description+'」が分岐点だと思う。\nあなたはどこが分岐点でしたか？\n#広島カープ #カープトーク';
}

function flashLive(){var el=document.getElementById('live-update');if(!el)return;el.style.display='flex';clearTimeout(el._t);el._t=setTimeout(function(){el.style.display='none';},3000);}
