<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本日のカープトーク</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--bg:#0a0c0f;--surface:#111318;--surface2:#181c23;--surface3:#1e2330;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#eef0f4;--muted:#7a8090;--faint:#2e3340;--accent:#f0c040;--blue:#4a9eff;--green:#3ecf8e;--red:#f46060;--orange:#f07840;--carp:#c8102e;--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,12,15,0.96);backdrop-filter:blur(14px);z-index:100}
.site-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.1em;color:var(--carp);line-height:1}
.site-sub{font-size:10px;color:var(--muted)}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.wrap{max-width:680px;margin:0 auto;padding:0 1rem 6rem}
/* 日付ナビ */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;margin:.5rem 0}
.date-nav-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 12px;font-size:13px;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.date-nav-btn:hover{color:var(--text)}.date-nav-btn:disabled{opacity:.3;cursor:default}
.date-nav-label{font-size:14px;font-weight:500}
/* スコアカード */
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;position:relative;overflow:hidden}
.score-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--carp),#ff4060,var(--accent))}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--carp);text-transform:uppercase;margin-bottom:.4rem}
.scoreboard{display:flex;align-items:center;justify-content:center;gap:2rem;margin:.5rem 0 .75rem}
.team{text-align:center}
.tn{font-family:'Bebas Neue',sans-serif;font-size:20px}
.tn.carp{color:var(--carp)}.tn.away{color:#f5d000}
.ts{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1}
.sep{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--faint);padding-top:.5rem}
.badges{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.bf{background:var(--faint);color:var(--muted)}.bw{background:rgba(200,16,46,.2);color:#ff7090;border:1px solid rgba(200,16,46,.3)}
/* イニング表 */
.inning-table-wrap{margin-top:1rem;overflow-x:auto}
.inning-table{width:100%;border-collapse:collapse;font-size:12px}
.inning-table th,.inning-table td{text-align:center;padding:4px 6px;border:1px solid var(--border);min-width:26px}
.inning-table th{color:var(--muted);background:var(--surface2)}
.inning-table td.team-label{text-align:left;font-weight:500;padding-left:10px;min-width:48px}
.inning-table td.score-col{color:var(--text);font-weight:700;font-size:13px;border-left:1px solid var(--border2)}
.inning-table td.zero{color:var(--faint)}.inning-table td.scoring{color:var(--accent);font-weight:700}
.pitcher-bar{margin-top:1rem;display:flex;gap:6px;flex-wrap:wrap}
.pitcher-chip{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:3px 9px;font-size:12px}
.pitcher-chip .role{font-size:10px;color:var(--muted)}
.s-win{font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(62,207,142,.2);color:var(--green)}
.s-loss{font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(244,96,96,.2);color:var(--red)}
.s-save{font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(74,158,255,.15);color:var(--blue)}
/* セクション共通 */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.slabel{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem}
.sdesc{font-size:13px;color:var(--muted);margin-bottom:.9rem;line-height:1.6}
/* タイトル投票 */
.title-list{display:flex;flex-direction:column;gap:6px}
.title-opt{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:.65rem .9rem;cursor:pointer;position:relative;overflow:hidden;transition:all .15s}
.title-opt:hover{border-color:var(--border2)}
.title-opt.picked{border-color:var(--accent);background:rgba(240,192,64,.04)}
.title-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(240,192,64,.07);transition:width .5s ease;z-index:0}
.title-body{position:relative;z-index:1;flex:1}
.title-txt{font-size:14px;font-weight:500}
.title-pct{font-size:11px;color:var(--muted);margin-top:1px}
.title-stat{position:relative;z-index:1;font-size:11px;color:var(--muted);white-space:nowrap}
.add-row{display:flex;gap:8px;margin-top:8px}
.add-inp{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:.5rem .9rem;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text)}
.add-inp:focus{outline:none;border-color:var(--accent)}
.add-btn{padding:.5rem 1rem;background:var(--accent);color:#000;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
/* 波形グラフ */
.wave-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.25rem 0;margin-bottom:0;border-bottom:none;border-radius:var(--r) var(--r) 0 0}
.wave-svg{width:100%;display:block;overflow:visible}
.wave-inn-labels{display:flex;padding:0 4px 12px;margin-top:2px}
.wave-inn-btn{flex:1;font-size:11px;color:var(--muted);text-align:center;cursor:pointer;padding:4px 2px;border-radius:4px;border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;position:relative;transition:color .15s}
.wave-inn-btn.has-tp{color:var(--text)}
.wave-inn-btn.sel{color:var(--carp);font-weight:500}
.wave-inn-dot{position:absolute;top:2px;right:3px;width:4px;height:4px;border-radius:50%;background:var(--carp)}
.wave-legend{display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--muted);flex-wrap:wrap;padding-bottom:2px}
.conn-area{background:var(--surface);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:0 1.25rem;height:24px;position:relative}
.conn-svg{width:100%;height:24px;display:block;overflow:visible}
.tp-scroll-section{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:0 1.25rem 1rem;margin-bottom:1rem}
.tp-track-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tp-track-wrap::-webkit-scrollbar{display:none}
.tp-track{display:flex;gap:10px;padding:4px 2px 2px;transition:none}
.tp-card{flex-shrink:0;width:240px;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--rs);padding:12px;transition:opacity .3s,transform .3s;cursor:pointer}
.tp-card.focused{border-color:var(--carp);border-width:1.5px;background:rgba(200,16,46,.04)}
.tp-card.focused.mid{border-color:var(--orange);background:rgba(240,120,64,.04)}
.tp-card.dimmed{opacity:.35;transform:scale(.95)}
.tp-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.tp-badge-s{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(200,16,46,.15);color:#ff7090;font-weight:500}
.tp-badge-m{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(240,120,64,.15);color:var(--orange);font-weight:500}
.tp-inn-lbl{font-size:11px;color:var(--muted)}
.tp-desc{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.4}
.tp-reason{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.45;font-style:italic}
.tp-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.tp-bar-bg{flex:1;height:4px;background:var(--faint);border-radius:2px;overflow:hidden}
.tp-bar-fill{height:4px;border-radius:2px;transition:width .5s ease}
.tp-stat{font-size:11px;color:var(--muted);white-space:nowrap}
.tp-vote-btn{width:100%;padding:6px;border-radius:var(--rs);border:1px solid var(--carp);background:transparent;color:var(--carp);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s;font-family:'Noto Sans JP',sans-serif}
.tp-vote-btn:hover{background:rgba(200,16,46,.1)}
.tp-vote-btn.voted{background:var(--carp);color:#fff}
.tp-vote-btn.mid-btn{border-color:var(--orange);color:var(--orange)}
.tp-vote-btn.mid-btn:hover{background:rgba(240,120,64,.1)}
.tp-vote-btn.mid-btn.voted{background:var(--orange);color:#fff}
.tp-hint{font-size:11px;color:var(--muted);text-align:center;padding:12px 0 4px}
.tp-sel-inn{font-size:13px;color:var(--muted);padding:10px 0 6px;font-weight:500}
/* ストーリー */
.story{margin-bottom:1rem}
.inning-head{display:flex;align-items:center;gap:8px;padding:1.25rem 0 .4rem}
.inning-num{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--muted);letter-spacing:.1em;white-space:nowrap}
.inning-emotion{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.em-push{background:rgba(200,16,46,.12);color:#ff7090}
.em-hold{background:rgba(74,158,255,.12);color:var(--blue)}
.em-tens{background:rgba(240,192,64,.12);color:var(--accent)}
.em-none{background:var(--faint);color:var(--muted)}
.inning-divider{flex:1;height:1px;background:var(--border)}
.inning-ctx{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:.5rem;font-style:italic}
.flow-change{text-align:center;padding:.3rem 0;font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px}
.flow-change.up{color:rgba(200,16,46,.7)}
.flow-change.down{color:rgba(74,158,255,.5)}
.flow-change.flat{color:var(--faint);font-size:16px}
.fc-line{flex:1;height:1px;max-width:60px}
.flow-change.up .fc-line{background:rgba(200,16,46,.2)}
.flow-change.down .fc-line{background:rgba(74,158,255,.15)}
/* イベントチャンク */
.evt{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:.8rem 1rem;margin-bottom:.4rem;position:relative;overflow:hidden}
.evt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.evt.hr::before{background:var(--red);opacity:1}
.evt.score::before{background:var(--accent);opacity:1}
.evt.crisis::before{background:var(--orange);opacity:1}
.evt.pitcher::before{background:var(--blue);opacity:1}
.evt-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.evt-badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700}
.eb-hr{background:rgba(244,96,96,.15);color:var(--red)}
.eb-score{background:rgba(240,192,64,.15);color:var(--accent)}
.eb-crisis{background:rgba(240,120,64,.15);color:var(--orange)}
.eb-pitcher{background:rgba(74,158,255,.15);color:var(--blue)}
.evt-desc{font-size:14px;color:var(--text);line-height:1.5}
.evt-sub{font-size:12px;color:var(--muted);margin-top:2px;font-style:italic}
/* 分岐点 */
.turning-section{margin:.5rem 0 1rem}
.turning-hd{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
.turning-hd-title{font-size:13px;font-weight:700;color:var(--text)}
.turning-hd-sub{font-size:11px;color:var(--muted)}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:.6rem;position:relative;overflow:hidden;transition:border-color .15s}
.tc.top-voted{border-color:rgba(200,16,46,.35);background:rgba(200,16,46,.04)}
.tc.top-voted::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--carp),#ff4060,var(--accent))}
.tc.user-post{border-color:rgba(62,207,142,.2);background:rgba(62,207,142,.02)}
.tc-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.tc-inn{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;padding-top:2px}
.tc-body{flex:1}
.tc-desc{font-size:14px;font-weight:500;color:var(--text);line-height:1.5}
.tc-reason{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5;font-style:italic}
.tc-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.tc-tag{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500}
.tag-strong{background:rgba(200,16,46,.15);color:#ff7090}
.tag-mid{background:rgba(240,192,64,.12);color:var(--accent)}
.tag-weak{background:rgba(74,158,255,.12);color:var(--blue)}
.tp-badge-w{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(74,158,255,.12);color:var(--blue);font-weight:500}
.tag-sys{background:var(--faint);color:var(--muted);border:1px solid var(--border2)}
.tag-user{background:rgba(62,207,142,.12);color:var(--green)}
.tc-foot{display:flex;align-items:center;gap:8px;margin-top:8px}
.tc-vote-row{flex:1;display:flex;align-items:center;gap:6px}
.tc-bar-wrap{flex:1;height:3px;background:var(--faint);border-radius:2px;overflow:hidden}
.tc-bar{height:3px;border-radius:2px;background:var(--carp);transition:width .5s ease}
.tc-stat{font-size:11px;color:var(--muted);white-space:nowrap}
.tc-vbtn{font-size:12px;padding:4px 12px;border-radius:var(--rs);border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;white-space:nowrap}
.tc-vbtn:hover{border-color:rgba(200,16,46,.4);color:#ff7090}
.tc-vbtn.active{background:rgba(200,16,46,.12);border-color:var(--carp);color:#ff6080;font-weight:700}
.tc-comments-wrap{margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.tc-cmt{font-size:12px;color:var(--muted);padding:3px 0;display:flex;gap:6px;align-items:flex-start;line-height:1.5}
.tc-cmt-dot{width:5px;height:5px;border-radius:50%;background:var(--faint);flex-shrink:0;margin-top:6px}
/* 投稿フォーム */
.post-form{background:rgba(62,207,142,.04);border:1px solid rgba(62,207,142,.15);border-radius:var(--r);padding:1rem 1.1rem;margin-top:.75rem}
.post-form-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.form-row{margin-bottom:.65rem}
.form-label{font-size:11px;color:var(--muted);margin-bottom:4px;display:block}
.form-select,.form-input,.form-textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:.5rem .9rem;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text)}
.form-textarea{resize:none;min-height:70px}
.form-select:focus,.form-input:focus,.form-textarea:focus{outline:none;border-color:var(--green)}
.intensity-row{display:flex;gap:6px}
.int-btn{flex:1;padding:.4rem;font-size:11px;border-radius:var(--rs);border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;text-align:center}
.int-btn.sel-s{border-color:rgba(200,16,46,.4);color:#ff7090;background:rgba(200,16,46,.1);font-weight:700}
.int-btn.sel-m{border-color:rgba(240,192,64,.4);color:var(--accent);background:rgba(240,192,64,.1);font-weight:700}
.int-btn.sel-w{border-color:rgba(74,158,255,.4);color:var(--blue);background:rgba(74,158,255,.1);font-weight:700}
.form-submit{width:100%;padding:.65rem;background:var(--green);color:#061a10;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:.5rem}
/* コメント */
.ctabs{display:flex;gap:4px;margin-bottom:.75rem}
.ctab{flex:1;text-align:center;padding:.4rem;font-size:12px;cursor:pointer;border:1px solid var(--border);border-radius:var(--rs);color:var(--muted);font-family:'Noto Sans JP',sans-serif;background:transparent;transition:all .15s}
.ctab.active{background:var(--surface2);color:var(--text);font-weight:500;border-color:var(--border2)}
.comment{padding:.65rem 0;border-bottom:1px solid var(--border)}
.comment:last-child{border-bottom:none}
.cmeta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.cname{font-size:12px;color:var(--muted)}
.ccat{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.cc-a{background:rgba(74,158,255,.12);color:var(--blue)}
.cc-f{background:rgba(62,207,142,.12);color:var(--green)}
.cc-n{background:rgba(240,192,64,.12);color:var(--accent)}
.clink{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--faint);color:var(--muted)}
.cbody{font-size:14px;color:var(--text);line-height:1.6;padding-left:30px}
.empty-state{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
.new-comment{margin-top:.75rem}
.ctype-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.ctype-lbl{font-size:11px;color:var(--muted)}
.ctype-btn{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.ctype-btn.sa{border-color:rgba(74,158,255,.4);color:var(--blue);background:rgba(74,158,255,.1);font-weight:700}
.ctype-btn.sf{border-color:rgba(62,207,142,.4);color:var(--green);background:rgba(62,207,142,.1);font-weight:700}
.ctype-btn.sn{border-color:rgba(240,192,64,.4);color:var(--accent);background:rgba(240,192,64,.1);font-weight:700}
.cinput-row{display:flex;gap:8px}
.cinput{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:.55rem .9rem;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text)}
.cinput:focus{outline:none;border-color:var(--blue)}
.csend{padding:.55rem 1rem;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
.csend:disabled{opacity:.5;cursor:not-allowed}
/* ローディング・その他 */
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--faint);border-top-color:var(--blue);border-radius:50%;animation:spinAnim .7s linear infinite}
@keyframes spinAnim{to{transform:rotate(360deg)}}
.no-game{text-align:center;padding:4rem 2rem}
.no-game-icon{font-size:48px;margin-bottom:1rem}
.no-game-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--muted);margin-bottom:.5rem}
.no-game-sub{font-size:14px;color:var(--muted)}
.no-game-link{display:inline-block;margin-top:1.5rem;padding:8px 20px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);text-decoration:none;font-size:13px}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(12px);background:var(--green);color:#061a10;font-size:13px;font-weight:700;padding:.5rem 1.4rem;border-radius:99px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

<script>

// ===== 状態 =====

// ===== ユーティリティ =====
function todayStr(){var d=new Date();return d.getFullYear()+'-'+(String(d.getMonth()+1).padStart(2,'0'))+'-'+(String(d.getDate()).padStart(2,'0'));}
function dateLabel(str){var p=str.split('-');return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日';}
function addDays(str,n){var d=new Date(str);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hashStr(s){var h=0;for(var i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return h;}
function formatTime(iso){var d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/1000);if(diff<60)return 'たった今';if(diff<3600)return Math.floor(diff/60)+'分前';if(diff<86400)return Math.floor(diff/3600)+'時間前';return (d.getMonth()+1)+'/'+d.getDate();}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function goDate(n){var nd=addDays(currentDate,n);history.pushState({},'','/?date='+nd);loadGame(nd);}
function getEmotion(flow){if(flow<=20)return{label:'圧倒',cls:'em-push'};if(flow<=30)return{label:'押してる',cls:'em-push'};if(flow<=42)return{label:'緊張',cls:'em-tens'};if(flow<=60)return{label:'耐えてる',cls:'em-hold'};if(flow<=73)return{label:'ピンチ',cls:'em-hold'};return{label:'崩壊',cls:'em-hold'};}

// ===== 日付ナビ =====
function updateDateNav(date){
  var today=todayStr();
  document.getElementById('date-nav-label').textContent=dateLabel(date)+(date===today?' (今日)':'');
  document.getElementById('btn-next').disabled=(date>=today);
}

// ===== ゲーム読み込み =====
async function loadGame(date){
  currentDate=date;
  updateDateNav(date);
  document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:4rem 0;color:var(--muted)"><span class="spin"></span></div>';
  var r=await fetch('/games/'+date+'.json?t='+Date.now());

    document.getElementById('main-content').innerHTML=
      '<div class="no-game">'+
      '<div class="no-game-icon">⚾</div>'+
      '<div class="no-game-title">試合データなし</div>'+
      '<div class="no-game-sub">'+dateLabel(date)+'の試合データは準備中です</div>'+
      '<a href="/?date='+addDays(date,-1)+'" class="no-game-link">← 前日の試合を見る</a>'+
      '</div>';
    return;
  }
  var g=await r.json();
  GAME_ID=g.id;GAME={home:g.home_team,away:g.away_team,homeScore:g.home_score,awayScore:g.away_score,date:dateLabel(g.game_date),venue:g.venue,innings:g.innings||{},startTime:g.start_time||'',awayPitcher:g.away_pitcher||'',homePitcher:g.home_pitcher||'',status:g.status||'final'};

// ===== 波形 + 分岐点横スクロール =====
var SEL_INN=null;
function ptX(i){return (i/8)*540+10;}

function drawWave(){
  var el=document.getElementById('wave-svg');if(!el)return;
  var flows=[];
  var hiroshimaIsAway = GAME && GAME.away === '広島';
  for(var i=1;i<=9;i++){
    var evts=MOMENTS.filter(function(m){return m.inning&&parseInt(m.inning)===i;});
    var base=45;
    // 表・裏それぞれの最悪値（最も影響の大きい値）を計算
    var omoteVal=null, uraVal=null;
    evts.forEach(function(evt){
      var isUra=evt.inning&&evt.inning.includes('裏');
      var isHiroshimaAttack=hiroshimaIsAway?!isUra:isUra;
      var val;
      if(evt.type==='hr') val=isHiroshimaAttack?18:80;   // 広島HR=上(Y小)、相手HR=下(Y大)
      else if(evt.type==='score') val=isHiroshimaAttack?25:72;  // 広島得点=上、相手得点=下
      else if(evt.type==='crisis') val=isHiroshimaAttack?62:58; // チャンス逃し=やや下
      else val=45;
      if(!isUra){
        // 表のイベント：広島の攻撃なら上昇（大きい方）、相手なら下降（小さい方）
        if(omoteVal===null) omoteVal=val;
        else omoteVal=isHiroshimaAttack?Math.max(omoteVal,val):Math.min(omoteVal,val);
      } else {
        // 裏のイベント
        if(uraVal===null) uraVal=val;
        else uraVal=isHiroshimaAttack?Math.max(uraVal,val):Math.min(uraVal,val);
      }
    });
    // 表・裏両方あれば裏（その回の最終状態）を優先、なければ表
    if(uraVal!==null) base=uraVal;
    else if(omoteVal!==null) base=omoteVal;
    flows.push({x:ptX(i-1),y:base});
  }
  var d='M'+flows[0].x+','+flows[0].y;
  for(var i=1;i<flows.length;i++){
    var p=flows[i-1],c=flows[i],cx=(p.x+c.x)/2;
    d+=' C'+cx+','+p.y+' '+cx+','+c.y+' '+c.x+','+c.y;
  }
  document.getElementById('wave-line').setAttribute('d',d);
  document.getElementById('wave-fill').setAttribute('d',d+' L'+flows[8].x+',90 L10,90 Z');
  var tpInns={};
  turnings.forEach(function(t){var n=parseInt(t.inning);if(!isNaN(n)&&n>=1&&n<=9)tpInns[n]=true;});
  var markers='';
  Object.keys(tpInns).forEach(function(inn){
    var n=parseInt(inn)-1;
    var p=flows[n];
    var isSel=(SEL_INN===parseInt(inn));
    var r=isSel?9:6;
    markers+='<circle cx="'+p.x+'" cy="'+p.y+'" r="'+r+'" fill="#c8102e" stroke="var(--surface)" stroke-width="2" style="cursor:pointer;transition:r .2s" onclick="tapInn('+inn+')"/>';
    if(isSel)markers+='<circle cx="'+p.x+'" cy="'+p.y+'" r="14" fill="none" stroke="#c8102e" stroke-width="1.5" opacity=".3"/>';
  });
  document.getElementById('wave-markers').innerHTML=markers;
  renderInnLabels(tpInns);
  renderConnector(flows);
  renderTpCards();
}

function renderInnLabels(tpInns){
  var el=document.getElementById('wave-inn-labels');if(!el)return;
  var html='';
  for(var i=1;i<=9;i++){
    var hasTp=!!tpInns[i];
    var isSel=(SEL_INN===i);
    html+='<button class="wave-inn-btn'+(hasTp?' has-tp':'')+(isSel?' sel':'')+'" onclick="tapInn('+i+')">';
    html+=i+'回';
    if(hasTp)html+='<span class="wave-inn-dot"></span>';
    html+='</button>';
  }
  el.innerHTML=html;
}

function renderConnector(flows){
  var g=document.getElementById('conn-lines');if(!g)return;
  if(SEL_INN===null){g.innerHTML='';return;}
  var x=ptX(SEL_INN-1);
  var xpct=(x/560*100).toFixed(1)+'%';
  g.innerHTML='<line x1="'+xpct+'" y1="0" x2="'+xpct+'" y2="18" stroke="#c8102e" stroke-width="1.5" stroke-dasharray="3 2"/>'+
    '<circle cx="'+xpct+'" cy="21" r="3" fill="#c8102e"/>';
}

function tapInn(inn){
  var n=parseInt(inn);
  var tpInns={};
  turnings.forEach(function(t){var x=parseInt(t.inning);if(!isNaN(x))tpInns[x]=true;});
  SEL_INN=(tpInns[n]&&SEL_INN!==n)?n:null;
  drawWave();
}

function tapCard(inn){
  SEL_INN=(SEL_INN===parseInt(inn))?null:parseInt(inn);
  drawWave();
}

function renderTpCards(){
  var track=document.getElementById('tp-track');
  var hint=document.getElementById('tp-hint');
  var label=document.getElementById('tp-sel-label');
  if(!track)return;
  var total=turnings.reduce(function(s,t){return s+(t.vote_count||0);},0);
  var html='';
  // イニングでソート（表→裏の順）
  var sorted=turnings.slice().sort(function(a,b){
    var pa=parseInt(a.inning)||0, pb=parseInt(b.inning)||0;
    if(pa!==pb)return pa-pb;
    var ua=a.inning.includes('表')?0:1, ub=b.inning.includes('表')?0:1;
    return ua-ub;
  });
  sorted.forEach(function(t,i){
    var inn=parseInt(t.inning);
    var isFocus=(SEL_INN!==null&&SEL_INN===inn);
    var isDimmed=(SEL_INN!==null&&!isFocus);
    var isS=t.intensity==='strong';
    var isW=t.intensity==='weak';
    var col=isS?'#c8102e':isW?'#4a9eff':'#f07840';
    var cnt=t.vote_count||0;
    var pct=total>0?Math.round(cnt/total*100):0;
    var voted=(myTurning===t.id);
    html+='<div class="tp-card'+(isFocus?' focused'+(isS?'':isW?' weak':' mid'):'')+(isDimmed?' dimmed':'')+'" onclick="tapCard('+inn+')" id="tpc-'+i+'">';
    html+='<div class="tp-card-head"><span class="tp-badge-'+(isS?'s':isW?'w':'m')+'">'+(isS?'ここが分かれ目':isW?'注目場面':'流れが変わった')+'</span><span class="tp-inn-lbl">'+esc(t.inning)+'</span></div>';
    html+='<p class="tp-desc">'+esc(t.description)+'</p>';

// ===== タイトル投票 =====
function renderTitles(){
  var el=document.getElementById('title-list');if(!el)return;
  var candidates=Object.keys(titleVotes);
  if(!candidates.length){el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:.5rem 0">まだ投票がありません。最初の投票をどうぞ！</div>';return;}
  var total=Object.values(titleVotes).reduce(function(s,v){return s+v;},0);
  var sorted=candidates.slice().sort(function(a,b){return titleVotes[b]-titleVotes[a];});
  el.innerHTML=sorted.map(function(txt){
    var cnt=titleVotes[txt]||0;
    var pct=total>0?Math.round(cnt/total*100):0;
    var picked=myTitleVote===txt;
    return '<div class="title-opt'+(picked?' picked':'')+'" onclick="voteTitle(\''+esc(txt)+'\')">'+
      '<div class="title-fill" style="width:'+pct+'%"></div>'+
      '<div class="title-body">'+
      '<div class="title-txt">'+(picked?'✓ ':'')+esc(txt)+'</div>'+
      '<div class="title-pct">'+cnt+'票 '+pct+'%</div>'+
      '</div>'+
      '</div>';
  }).join('');
}

async function voteTitle(txt){
  if(myTitleVote===txt){
    await sb.from('title_votes').delete().eq('game_id',GAME_ID).eq('user_id',userId);
    if(titleVotes[txt])titleVotes[txt]--;myTitleVote=null;
  } else {
    if(myTitleVote){
      await sb.from('title_votes').delete().eq('game_id',GAME_ID).eq('user_id',userId);
      if(titleVotes[myTitleVote])titleVotes[myTitleVote]--;
    }
    var r=await sb.from('title_votes').insert({game_id:GAME_ID,title_text:txt,user_id:userId});
    if(!r.error){myTitleVote=txt;titleVotes[txt]=(titleVotes[txt]||0)+1;}
    else if(r.error.code==='23505'){showToast('すでに投票済みです');return;}
  }
  renderTitles();
  showToast(myTitleVote?'「'+txt+'」に投票しました！':'投票を取り消しました');
}

async function addTitle(){
  var inp=document.getElementById('title-inp'),txt=inp.value.trim();
  if(!txt)return;
  var r=await sb.from('title_votes').insert({game_id:GAME_ID,title_text:txt,user_id:userId});
  if(r.error&&r.error.code==='23505'){showToast('すでに投票済みです');return;}
  if(myTitleVote&&titleVotes[myTitleVote])titleVotes[myTitleVote]--;
  myTitleVote=txt;titleVotes[txt]=(titleVotes[txt]||0)+1;
  inp.value='';renderTitles();
  showToast('「'+txt+'」を提案しました！');
}

async function loadTitleVotes(){
  var r=await sb.from('title_votes').select('title_text').eq('game_id',GAME_ID);
  titleVotes={};
  if(r.data)r.data.forEach(function(v){titleVotes[v.title_text]=(titleVotes[v.title_text]||0)+1;});
  // JSONのcandidatesをシード（票なし）
  // 既存候補から seed
  renderTitles();
}

// ===== ストーリー =====
function renderStory(){
  var el=document.getElementById('story-root');if(!el)return;
  var html='';
  // イニング別モーメント
  for(var inn=1;inn<=9;inn++){
    var evts=MOMENTS.filter(function(m){return m.inning&&parseInt(m.inning)===inn;});
    var myT=turnings.filter(function(t){return parseInt(t.inning)===inn;});
    if(!evts.length&&!myT.length)continue;

    // 流れ変化
    if(inn>1){
      var prevEvts=MOMENTS.filter(function(m){return m.inning&&parseInt(m.inning)===inn-1;});
      var hiroshimaIsAway4 = GAME && GAME.away === '広島';
      // 広島の攻撃かどうか判定してラベルを変える
      var hiroScore=evts.some(function(e){
        var isUra=e.inning&&e.inning.includes('裏');
        var isHiro=hiroshimaIsAway4?!isUra:isUra;
        return isHiro&&(e.type==='hr'||e.type==='score');
      });
      var aiteScore=evts.some(function(e){
        var isUra=e.inning&&e.inning.includes('裏');
        var isAite=hiroshimaIsAway4?isUra:!isUra;
        return isAite&&(e.type==='hr'||e.type==='score');
      });
      var hasPrevCrisis=prevEvts.some(function(e){return e.type==='crisis';});
      if(hiroScore){
        html+='<div class="flow-change up"><div class="fc-line"></div>▲ 流れが来た！<div class="fc-line"></div></div>';
      } else if(aiteScore){
        html+='<div class="flow-change down"><div class="fc-line"></div>▼ 流れが傾いた<div class="fc-line"></div></div>';
      } else if(hasPrevCrisis){
        html+='<div class="flow-change flat"><div class="fc-line"></div>▽ チャンスを逃した<div class="fc-line"></div></div>';
      } else {
        html+='<div class="flow-change flat">│</div>';
      }
    }

    html+='<div class="fi">';
    // イニングヘッダー
    // flow: 広島優勢=小(上)、相手優勢=大(下)、45=平常
    var hiroshimaIsAway3 = GAME && GAME.away === '広島';
    var flow = 45;
    if(evts.length){
      var bestFlow = 45;
      evts.forEach(function(evt){
        var isUra = evt.inning && evt.inning.includes('裏');
        var isHiroAttack = hiroshimaIsAway3 ? !isUra : isUra;
        var f;
        if(evt.type==='hr') f = isHiroAttack ? 18 : 80;
        else if(evt.type==='score') f = isHiroAttack ? 25 : 72;
        else if(evt.type==='crisis') f = isHiroAttack ? 62 : 58;
        else f = 45;
        // 最も極端な値を使う（広島優勢なら最小、相手優勢なら最大）
        if(isHiroAttack) bestFlow = Math.min(bestFlow, f);
        else bestFlow = Math.max(bestFlow, f);
      });
      flow = bestFlow;
    }
    var emo=getEmotion(flow);
    html+='<div class="inning-head"><span class="inning-num">'+inn+'回</span>';
    html+='<span class="inning-emotion '+emo.cls+'">'+emo.label+'</span>';
    html+='<div class="inning-divider"></div></div>';

    // イベント
    evts.forEach(function(e){
      html+='<div class="evt '+e.type+'">'+
        '<div class="evt-meta"><span class="evt-badge '+(TYPE_BADGE[e.type]||'')+'">'+(TYPE_LABEL[e.type]||e.type)+'</span></div>'+
        '<div class="evt-desc">'+esc(e.desc)+'</div>'+
        (e.sub?'<div class="evt-sub">'+esc(e.sub)+'</div>':'')+
        '</div>';
    });

    html+='</div>';// fi
  }
  el.innerHTML=html||'<div class="empty-state">試合データを読み込み中...</div>';
  initFI();
}

async function initLineup(g){
  var area = document.getElementById('lineup-body-area');
  if(!area) return;
  // スポナビから一軍野手を動的取得
  var players = [];
  var pitchers = [];
  try{
    var resp = await fetch('https://baseball.yahoo.co.jp/npb/teams/6/battingstats');
    var html = await resp.text();
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');
    var links = Array.from(doc.querySelectorAll('a[href*="/player/"]'));
    var seen = {};
    links.forEach(function(a){
      var name = a.textContent.trim();
      if(name.length>1&&name.length<12&&!seen[name]){
        seen[name]=true;
        // テーブルのセルからポジション取得
        var row = a.closest('tr');
        var cells = row?Array.from(row.querySelectorAll('td,th')):[];
        var pos = cells[1]?cells[1].textContent.trim():'';
        // 背番号ぽい文字列はスキップ
        if(!/^\d+$/.test(pos)) players.push({name:name, pos:pos||'野手'});
      }
    });
    // 投手は別ページから
    var resp2 = await fetch('https://baseball.yahoo.co.jp/npb/teams/6/pitchingstats');
    var html2 = await resp2.text();
    var doc2 = parser.parseFromString(html2, 'text/html');
    var links2 = Array.from(doc2.querySelectorAll('a[href*="/player/"]'));
    var seen2 = {};
    links2.forEach(function(a){
      var name = a.textContent.trim();
      if(name.length>1&&name.length<12&&!seen2[name]){seen2[name]=true;pitchers.push(name);}
    });
  }catch(e){
    console.warn('選手取得失敗、JSONの選手リストを使用:', e);
  }
  // フォールバック
  if(!players.length) players = (g&&g.players)?g.players:CARP_PLAYERS_MASTER;
  if(!pitchers.length) pitchers = CARP_PITCHERS_MASTER;

  renderLineupForm(area, players, pitchers);
  loadMinnaLineup();
}

    '<span class="lineup-pitcher-label">先発：</span>'+

    '<option value="">先発を選ぶ</option>'+pitcherOpts+
    '</select></div>'+
    '<div class="lineup-step-label">打順を選択（タップで順番に登録）</div>'+
    '<div class="lineup-players" id="lineup-players">'+
    players.filter(function(p){return p.pos!=='投'&&!p.pos.includes('投');}).map(function(p){
      return '<button class="lp-btn" onclick="addLineupPlayer(this)" data-name="'+esc(p.name)+'" data-pos="'+esc(p.pos)+'">'+esc(p.name)+'</button>';
    }).join('')+

function addLineupPlayer(btn){
  if(LINEUP_ORDER.length>=9) return;
  var name=btn.dataset.name, pos=btn.dataset.pos;
  LINEUP_ORDER.push({order:LINEUP_ORDER.length+1, name:name, pos:pos});
  btn.classList.add('used');
  renderLineupOrder();
  updateLineupSubmit();
}

function removeLineupPlayer(order){
  var removed = LINEUP_ORDER.find(function(p){return p.order===order;});
  LINEUP_ORDER = LINEUP_ORDER.filter(function(p){return p.order!==order;});
  // 順番を振り直す
  LINEUP_ORDER.forEach(function(p,i){p.order=i+1;});
  // ボタンを戻す
  if(removed){
    Array.from(document.querySelectorAll('#lineup-players .lp-btn')).forEach(function(btn){
      if(btn.dataset.name===removed.name) btn.classList.remove('used');
    });
  }
  renderLineupOrder();
  updateLineupSubmit();
}

function renderLineupOrder(){
  var el=document.getElementById('lineup-order');
  if(!el) return;
  el.innerHTML=LINEUP_ORDER.map(function(p){
    return '<div class="lo-row">'+
      '<div class="lo-num">'+p.order+'</div>'+
      '<span class="lo-name">'+esc(p.name)+'</span>'+
      '<span class="lo-pos">'+esc(p.pos)+'</span>'+
      '<span class="lo-del" onclick="removeLineupPlayer('+p.order+')">✕</span>'+
      '</div>';
  }).join('');
  var btn=document.getElementById('lineup-submit');
  if(btn) btn.textContent='投稿する（'+LINEUP_ORDER.length+'/9）';
  updateLineupSubmit();
}

function updateLineupSubmit(){
  var btn=document.getElementById('lineup-submit');
  if(btn) btn.classList.toggle('on', LINEUP_ORDER.length===9&&!!LINEUP_PITCHER);
}

async function submitLineup(){
  if(LINEUP_POSTED){showToast('投稿済みです');return;}
  if(LINEUP_ORDER.length!==9){showToast('9人を選択してください');return;}
  if(!LINEUP_PITCHER){showToast('先発投手を選んでください');return;}
  // 試合開始前チェック
  if(!isBeforeGameStart()){showToast('試合が始まっているため投稿できません');return;}
  var r=await sb.from('lineup_predictions').upsert({
    game_id:GAME_ID, user_id:userId,
    lineup:LINEUP_ORDER,
    pitcher:LINEUP_PITCHER
  },{onConflict:'game_id,user_id'});
  if(r.error){showToast('投稿に失敗しました');return;}
  LINEUP_POSTED=true;
  showToast('予想オーダーを投稿しました！');
  // ボタンを「投稿済み・シェア」に切り替え
  var nav=document.getElementById('lineup-nav');
  if(nav){
    nav.innerHTML='<button class="ep-back" onclick="resetLineup()">やり直す</button>'+
      '<button class="ep-btn-share" onclick="shareLineup()">'+
      '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'+
      'シェア</button>';
  }
  await loadMinnaLineup();
}

function isBeforeGameStart(){
  if(GAME.status==='final') return false;
  if(!GAME.startTime) return true;
  var today=new Date();
  var gameDateStr=currentDate+'T'+GAME.startTime+':00+09:00';
  var gameTime=new Date(gameDateStr);
  return today < gameTime;
}

function resetLineup(){
  LINEUP_ORDER=[];LINEUP_POSTED=false;LINEUP_PITCHER='';
  var area=document.getElementById('lineup-body-area');
  if(area){
    var players=(PLAYERS&&PLAYERS.length>0)?PLAYERS:CARP_PLAYERS_MASTER;
    renderLineupForm(area, players, CARP_PITCHERS_MASTER);
  }
}

function shareLineup(){
  var score=GAME.away+'vs'+GAME.home+'（'+GAME.date+'）';
  var orderText=LINEUP_ORDER.map(function(p){return p.order+'番 '+p.name;}).join('\n');
  var text='【カープ予想スタメン】\n'+score+'\n先発：'+LINEUP_PITCHER+'\n'+orderText+'\n#広島カープ #カープトーク';
  var shareUrl='https://carp-talk.vercel.app/?date='+currentDate;

  // Canvas画像生成
  function buildLineupCanvas(cb){
    try{
      var cv=document.createElement('canvas');cv.width=800;cv.height=500;
      var ctx=cv.getContext('2d');
      ctx.fillStyle='#0a0c10';ctx.fillRect(0,0,800,500);
      var grad=ctx.createLinearGradient(0,0,800,0);
      grad.addColorStop(0,'#c8102e');grad.addColorStop(.5,'#ff4060');grad.addColorStop(1,'#f0c040');
      ctx.fillStyle=grad;ctx.fillRect(0,0,800,4);
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='13px sans-serif';
      ctx.fillText('本日のカープトーク｜予想スタメン　'+GAME.date,40,35);
      ctx.fillStyle='#f0c040';ctx.font='bold 16px sans-serif';
      ctx.fillText('先発予想：'+LINEUP_PITCHER,40,70);
      ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(40,85);ctx.lineTo(760,85);ctx.stroke();
      var cols=[[1,2,3,4,5],[6,7,8,9]];
      var startY=110;
      LINEUP_ORDER.forEach(function(p,idx){
        var col=idx<5?0:1;
        var row=idx<5?idx:idx-5;
        var x=col===0?40:420;
        var y=startY+row*52;
        // 番号サークル
        ctx.fillStyle='#c8102e';ctx.beginPath();ctx.arc(x+14,y+14,14,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
        ctx.fillText(p.order,x+14,y+19);ctx.textAlign='left';
        // 選手名
        ctx.fillStyle='#ffffff';ctx.font='bold 18px sans-serif';
        ctx.fillText(p.name,x+36,y+20);
        ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='11px sans-serif';
        ctx.fillText(p.pos,x+36,y+36);
      });
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='12px sans-serif';
      ctx.textAlign='right';ctx.fillText('carp-talk.vercel.app',760,480);ctx.textAlign='left';
      ctx.fillStyle='#c8102e';ctx.font='bold 12px sans-serif';ctx.fillText('本日のカープトーク',40,480);
      cb(cv);
    }catch(e){console.error(e);cb(null);}
  }

  if(navigator.share&&navigator.canShare){
    buildLineupCanvas(function(cv){
      if(cv){
        cv.toBlob(function(blob){
          var file=new File([blob],'lineup-'+currentDate+'.png',{type:'image/png'});
          var shareData={title:'カープ予想スタメン',text:text,files:[file]};
          if(navigator.canShare(shareData)){
            navigator.share(shareData).catch(function(e){
              if(e.name!=='AbortError'){
                window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(shareUrl),'_blank');
              }
            });return;
          }
          var a=document.createElement('a');a.download='lineup-'+currentDate+'.png';
          a.href=URL.createObjectURL(blob);a.click();
          setTimeout(function(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(shareUrl),'_blank');},600);

async function voteTurning(id){
  var t=turnings.find(function(x){return x.id===id;});if(!t)return;
  if(myTurning===id){
    await sb.from('turning_votes').delete().eq('turning_id',id).eq('user_id',userId);
    t.vote_count=Math.max(0,(t.vote_count||1)-1);myTurning=null;
    renderStory();drawWave();
    showToast('投票を取り消しました');
  } else {
    if(myTurning){
      await sb.from('turning_votes').delete().eq('turning_id',myTurning).eq('user_id',userId);
      var prev=turnings.find(function(x){return x.id===myTurning;});
      if(prev)prev.vote_count=Math.max(0,(prev.vote_count||1)-1);
    }
    var r=await sb.from('turning_votes').insert({turning_id:id,game_id:GAME_ID,user_id:userId});
    if(r.error&&r.error.code==='23505'){showToast('すでに投票済みです');return;}
    t.vote_count=(t.vote_count||0)+1;myTurning=id;
    renderStory();drawWave();
    // 投票後にポップアップを表示
    setTimeout(function(){openPopup(id,t.inning+'の分岐点に投票しました');},300);
  }
}

// ===== ターニングポイント読み込み =====
async function loadTurnings(g){
  // ① JSONのsystem候補をDBに upsert（なければ追加）
  if(g.turning_suggestions){
    for(var i=0;i<g.turning_suggestions.length;i++){
      var s=g.turning_suggestions[i];
      var ex=await sb.from('turnings').select('id').eq('game_id',GAME_ID).eq('description',s.description).eq('source','system').maybeSingle();
      if(!ex.data){
        await sb.from('turnings').insert({game_id:GAME_ID,inning:s.inning,description:s.description,reason:s.reason||null,intensity:s.intensity||'mid',source:'system',user_id:'system'});
      }
    }
  }
  // ② DBから全分岐点を取得
  var r=await sb.from('turnings').select('*').eq('game_id',GAME_ID).order('created_at',{ascending:true});
  turnings=r.data||[];
  // ③ 投票数を別クエリで取得（より確実）
  var rv=await sb.from('turning_votes').select('turning_id').eq('game_id',GAME_ID);
  var counts={};
  if(rv.data)rv.data.forEach(function(v){counts[v.turning_id]=(counts[v.turning_id]||0)+1;});
  turnings.forEach(function(t){t.vote_count=counts[t.id]||0;});
  // JSONのchoicesをDBのturningsにマージ
  if(g&&g.turning_suggestions){
    g.turning_suggestions.forEach(function(s){
      var found=turnings.find(function(t){return t.description===s.description;});
      if(found&&s.choices)found.choices=s.choices;
    });
  }
}

function subscribeRealtime(){
  sb.channel('title-'+GAME_ID).on('postgres_changes',{event:'INSERT',schema:'public',table:'title_votes',filter:'game_id=eq.'+GAME_ID},function(payload){
    titleVotes[payload.new.title_text]=(titleVotes[payload.new.title_text]||0)+1;
    renderTitles();flashLive();
  }).subscribe();
  sb.channel('turnings-'+GAME_ID).on('postgres_changes',{event:'*',schema:'public',table:'turning_votes',filter:'game_id=eq.'+GAME_ID},function(){
    // 再取得
    sb.from('turning_votes').select('turning_id').eq('game_id',GAME_ID).then(function(r){
      if(r.data){var counts={};r.data.forEach(function(v){counts[v.turning_id]=(counts[v.turning_id]||0)+1;});turnings.forEach(function(t){t.vote_count=counts[t.id]||0;});renderStory();drawWave();}
    });
    flashLive();
  }).subscribe();
  sb.channel('comments-'+GAME_ID).on('postgres_changes',{event:'INSERT',schema:'public',table:'comments',filter:'game_id=eq.'+GAME_ID},function(){loadComments();flashLive();}).subscribe();
}

function renderPlayerGrid(){
  var el=document.getElementById('player-grid');if(!el)return;
  if(!PLAYERS||!PLAYERS.length){
    el.innerHTML='<div style="color:var(--muted);font-size:13px">選手データを読み込み中...</div>';
    return;
  }
  var html='';
  PLAYERS.forEach(function(p){
    var r=playerRatings[p.name]||null;
    var c=playerRatingCounts[p.name]||{mvp:0,good:0,cheer:0};
    var total=c.mvp+c.good+c.cheer;
    var BTNS=[{v:'mvp',l:'MVP',col:'var(--accent)'},{v:'good',l:'よかった',col:'var(--green)'},{v:'cheer',l:'もっと頑張れ',col:'var(--carp)'}];
    html+='<div class="player-row" style="flex-direction:column;align-items:stretch;gap:5px">';
    // 上段：アバター + 名前 + ボタン
    html+='<div style="display:flex;align-items:center;gap:10px">';
    html+='<div class="player-av">'+p.name.slice(0,1)+'</div>';
    html+='<span class="player-name">'+esc(p.name)+'</span>';
    html+='<span class="player-pos">'+esc(p.pos)+'</span>';
    html+='<div class="rating-row" style="margin-left:auto">';
    BTNS.forEach(function(rb){
      var sel=r===rb.v;
      var cnt=c[rb.v]||0;
      html+='<button class="rating-btn '+rb.v+(sel?' sel':'')+'" onclick="ratePlayerGrid(this)" data-name="'+p.name+'" data-rv="'+rb.v+'">';
      html+=rb.l+(cnt>0?'<span class="rating-count">'+cnt+'</span>':'');
      html+='</button>';
    });
    html+='</div></div>';
    // 下段：票数バー（1票以上あるとき）
    if(total>0){
      html+='<div class="player-rating-bar" style="padding:0 0 0 42px">';
      BTNS.forEach(function(rb){
        var cnt=c[rb.v]||0;
        if(cnt===0)return;
        var pct=Math.round(cnt/total*100);
        html+='<div style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--muted)">';
        html+='<div class="rating-bar-seg" style="width:'+pct+'px;background:'+rb.col+';opacity:.6"></div>';
        html+=rb.l+' '+pct+'%';
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });
  el.innerHTML=html;
}

    if(x.rating) playerRatings[x.player_name]=x.rating;
  });
  // 全員の集計（票数表示用）
  var all=await sb.from('player_ratings').select('player_name,rating').eq('game_id',GAME_ID);
  playerRatingCounts={};
  if(all.data)all.data.forEach(function(x){
    if(!x.rating)return;
    if(!playerRatingCounts[x.player_name])playerRatingCounts[x.player_name]={mvp:0,good:0,cheer:0};

        playerRatingCounts[x.player_name][rv]++;
    });
  });
  renderPlayerGrid();
}

  var existingR=await sb.from('eval_posts').select('*').eq('game_id',GAME_ID).eq('user_id',userId).order('created_at',{ascending:false}).limit(1);
  var existing={data:existingR.data&&existingR.data[0]||null};
  if(existing.data){
    var ep=existing.data;
    EP.v1=ep.title||''; EP.v2=ep.bunki_text||''; EP.v3=ep.choice||''; EP.bunki=ep.bunki_id||null;
    document.getElementById('ep-sv1').textContent=EP.v1;
    document.getElementById('ep-sv2').textContent=EP.v2;
    document.getElementById('ep-sv3').textContent=EP.v3;
    evalPostDone=true;
    updateEpSelBar();
    epShowShare();
    // 決定済みラベルを表示
    var btn=document.querySelector('.ep-btn-post');
    if(btn){btn.textContent='✓ 投稿済み';btn.style.color='var(--green)';btn.style.borderColor='var(--green)';}
    return;
  }
  renderEpStep(1);
}

function renderEpStep2(){

// free input
document.addEventListener('input', function(e){
  if(e.target.id!=='ep-free')return;
  var val=e.target.value.trim();
  if(val){
    document.querySelectorAll('#ep-opts3 .sp-opt').forEach(function(b){b.classList.remove('s3');});

function renderEpStep(n){
  EP.step=n;
  [1,2,3].forEach(function(i){
    var p=document.getElementById('ep-p'+i);
    if(p)p.classList.toggle('active',i===n);
    var d=document.getElementById('ep'+i);
    if(d){d.classList.toggle('done',i<n);d.classList.toggle('active',i===n);}
  });
  var back=document.getElementById('ep-btn-back');
  var next=document.getElementById('ep-btn-next');
  if(back)back.style.display=n>1?'':'none';
  if(next){
    next.textContent=n===3?'決定':'次へ →';
    var hasVal=(n===1&&EP.v1)||(n===2&&EP.v2)||(n===3&&EP.v3);
    next.classList.toggle('on',!!hasVal);
  }
  var sum=document.getElementById('ep-summary');
  if(sum)sum.style.display='none';
}

function epNext(){
  if(EP.step===1&&!EP.v1)return;
  if(EP.step===2&&!EP.v2)return;
  if(EP.step===3){
    if(!EP.v3)return;
    epShowShare();
    return;
  }
  if(EP.step===2)renderEpStep3Choices(turnings.find(function(t){return t.id===EP.bunki;}));
  EP.step++;
  renderEpStep(EP.step);
  if(EP.step===2)renderEpStep2();
}

function epBack(){
  if(EP.step>1){EP.step--;renderEpStep(EP.step);}
}

function epShowShare(){
  [1,2,3].forEach(function(i){
    var p=document.getElementById('ep-p'+i);if(p)p.classList.remove('active');
    var d=document.getElementById('ep'+i);if(d){d.classList.add('done');d.classList.remove('active');}
  });
  var sum=document.getElementById('ep-summary');
  if(sum)sum.style.display='flex';
  var nav=document.getElementById('ep-nav');
  if(nav){
    nav.innerHTML='<button class="ep-back" onclick="epReset()">やり直す</button>'+
      '<button class="ep-btn-post" onclick="epPost()">決定</button>'+
      '<button class="ep-btn-share" onclick="epShare()">'+
      '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'+
      'シェア</button>';
  }
}

function epShare(){
  var score=GAME.home+GAME.homeScore+'-'+GAME.awayScore+GAME.away;
  var shareText='【カープトーク】'+GAME.date+' '+score+'\n'+
    '一言：「'+EP.v1+'」\n'+
    '分岐点：'+EP.v2+'\n'+
    '自分なら：'+EP.v3+'\n'+
    '#広島カープ #カープトーク';
  var shareUrl='https://carp-talk.vercel.app/?date='+currentDate;

  // Canvas でシェアカード画像を生成
  function buildCanvas(cb){
    try{
      var cv=document.createElement('canvas');
      cv.width=800;cv.height=420;
      var ctx=cv.getContext('2d');
      ctx.fillStyle='#0a0c10';ctx.fillRect(0,0,800,420);
      var grad=ctx.createLinearGradient(0,0,800,0);
      grad.addColorStop(0,'#c8102e');grad.addColorStop(.5,'#ff4060');grad.addColorStop(1,'#f0c040');
      ctx.fillStyle=grad;ctx.fillRect(0,0,800,4);
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='14px sans-serif';
      ctx.fillText(GAME.date+'  '+score,40,40);
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='11px sans-serif';
      ctx.fillText('この試合を一言で言うと',40,80);
      ctx.fillStyle='#f0c040';ctx.font='bold 22px sans-serif';
      ctx.fillText('「'+EP.v1+'」',40,112);
      ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(40,135);ctx.lineTo(760,135);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='11px sans-serif';
      ctx.fillText('ここが分岐点だと思った',40,162);
      ctx.fillStyle='#ffffff';ctx.font='bold 18px sans-serif';
      var bt=EP.v2;if(ctx.measureText(bt).width>680)bt=bt.slice(0,28)+'...';
      ctx.fillText(bt,40,190);
      ctx.beginPath();ctx.moveTo(40,215);ctx.lineTo(760,215);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='11px sans-serif';
      ctx.fillText('自分ならこうしてた',40,242);
      ctx.fillStyle='#4adf9a';ctx.font='bold 18px sans-serif';
      var ct=EP.v3;if(ctx.measureText(ct).width>680)ct=ct.slice(0,28)+'...';
      ctx.fillText(ct,40,270);
      ctx.beginPath();ctx.moveTo(40,295);ctx.lineTo(760,295);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='13px sans-serif';
      ctx.fillText('#広島カープ #カープトーク',40,330);
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='12px sans-serif';
      ctx.textAlign='right';ctx.fillText('carp-talk.vercel.app',760,330);ctx.textAlign='left';
      ctx.fillStyle='#c8102e';ctx.font='bold 13px sans-serif';
      ctx.fillText('本日のカープトーク',40,370);
      ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='11px sans-serif';
      ctx.fillText('あなたの分岐点を、シェアしよう。',40,390);
      cb(cv);
    }catch(e){console.error('Canvas error:',e);cb(null);}
  }

  // Web Share API（スマホ対応）
  if(navigator.share && navigator.canShare){
    buildCanvas(function(cv){
      if(cv){
        cv.toBlob(function(blob){
          var file=new File([blob],'carp-talk-'+currentDate+'.png',{type:'image/png'});
          var shareData={title:'本日のカープトーク',text:shareText,files:[file]};
          if(navigator.canShare(shareData)){
            navigator.share(shareData).catch(function(e){
              // シェアキャンセル or エラー時はURL共有にフォールバック
              if(e.name!=='AbortError'){
                window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText)+'&url='+encodeURIComponent(shareUrl),'_blank','noopener,noreferrer');
              }
            });
            return;
          }
          // canShare=falseの場合はダウンロード+X
          var a=document.createElement('a');
          a.download='carp-talk-'+currentDate+'.png';
          a.href=URL.createObjectURL(blob);a.click();
          setTimeout(function(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText)+'&url='+encodeURIComponent(shareUrl),'_blank','noopener,noreferrer');},600);
        },'image/png');
      }
    });
  } else {
    // PC: ダウンロード + X投稿画面
    buildCanvas(function(cv){
      if(cv){
        var a=document.createElement('a');
        a.download='carp-talk-'+currentDate+'.png';
        a.href=cv.toDataURL('image/png');a.click();
      }
      setTimeout(function(){
        window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText)+'&url='+encodeURIComponent(shareUrl),'_blank','noopener,noreferrer');
      },600);
    });
  }
}

async function epPost(){
  if(evalPostDone){showToast('投稿済みです');return;}
  // sel-barからフォールバック取得（EP変数が空の場合）
  if(!EP.v1){var e=document.getElementById('ep-sv1-bar');if(e&&e.textContent.trim())EP.v1=e.textContent.trim();}
  if(!EP.v2){var e=document.getElementById('ep-sv2-bar');if(e&&e.textContent.trim())EP.v2=e.textContent.trim();}
  if(!EP.v3){var e=document.getElementById('ep-sv3-bar');if(e&&e.textContent.trim())EP.v3=e.textContent.trim();}
  // summaryからもフォールバック
  if(!EP.v1){var e=document.getElementById('ep-sv1');if(e&&e.textContent.trim())EP.v1=e.textContent.trim();}
  if(!EP.v2){var e=document.getElementById('ep-sv2');if(e&&e.textContent.trim())EP.v2=e.textContent.trim();}
  if(!EP.v3){var e=document.getElementById('ep-sv3');if(e&&e.textContent.trim())EP.v3=e.textContent.trim();}
  console.log('[epPost] v1='+EP.v1+' v2='+EP.v2+' v3='+EP.v3);
  if(!EP.v1||!EP.v2||!EP.v3){showToast('全ての項目を選択してください');return;}
  var t=turnings.find(function(x){
    return (EP.bunki&&x.id===EP.bunki)||(x.description&&EP.v2.includes(x.description.slice(0,10)));
  });
  var r=await sb.from('eval_posts').upsert({
    game_id:GAME_ID, user_id:userId,
    title:EP.v1,
    bunki_id:t?t.id:null,
    bunki_text:EP.v2,
    choice:EP.v3
  },{onConflict:'game_id,user_id'});
  if(r.error){showToast('投稿に失敗しました：'+r.error.message);return;}
  evalPostDone=true;
  showToast('評価を投稿しました！');
  epShowShareSilent();
  await loadMinnaEval();
}

async function loadMinnaEval(){

// ===== 分岐点choice表示 =====
async function loadTpChoicesAll(){
  if(!turnings||!turnings.length)return;
  // 全分岐点のchoice集計を一括取得
  var r=await sb.from('turning_votes').select('turning_id,choice').eq('game_id',GAME_ID);
  if(!r.data)return;
  // turning_idごとに集計
  var map={};
  r.data.forEach(function(v){
    if(!v.choice)return;
    if(!map[v.turning_id])map[v.turning_id]={};
    map[v.turning_id][v.choice]=(map[v.turning_id][v.choice]||0)+1;
  });
  // 各分岐点のbodyに表示
  turnings.forEach(function(t){
    var body=document.getElementById('tpcb-'+t.id);
    if(!body)return;
    var counts=map[t.id]||{};
    var total=Object.values(counts).reduce(function(s,v){return s+v;},0);
    var choices=(t.choices)||[];
    if(total===0){
      if(choices.length){
        body.innerHTML=choices.map(function(c){
          return '<div class="choice-bar-row">'+
            '<span class="choice-lbl">'+esc(c)+'</span>'+
            '<div class="choice-bar"><div class="choice-bar-fill" style="width:0%"></div></div>'+
            '<span class="choice-pct">0%</span></div>';
        }).join('');
      } else {
        body.innerHTML='<div style="font-size:11px;color:var(--muted);padding:.25rem 0">まだ回答がありません</div>';
      }
      return;
    }
    // 得票順にソート
    var allChoices=choices.length?choices:Object.keys(counts);
    var sorted=allChoices.map(function(c){return{c:c,n:counts[c]||0};}).sort(function(a,b){return b.n-a.n;});
    body.innerHTML=sorted.map(function(e){
      var pct=Math.round(e.n/total*100);
      return '<div class="choice-bar-row">'+
        '<span class="choice-lbl">'+esc(e.c)+'</span>'+
        '<div class="choice-bar"><div class="choice-bar-fill" style="width:'+pct+'%"></div></div>'+
        '<span class="choice-pct">'+pct+'%</span></div>';
    }).join('');
  });
}
async function loadAllTpChoices(){
  // 全分岐点のvoteを一括取得（自分の回答も含む）
  var r=await sb.from('turning_votes').select('turning_id,choice,user_id').eq('game_id',GAME_ID);
  if(!r.data)return;
  // turning_idごとに集計 & 自分の回答チェック
  var map={}, myAnswers={};
  r.data.forEach(function(v){
    if(!v.choice)return;
    if(!map[v.turning_id])map[v.turning_id]={};
    map[v.turning_id][v.choice]=(map[v.turning_id][v.choice]||0)+1;
    if(v.user_id===userId) myAnswers[v.turning_id]=v.choice;
  });
  // 各bodyに描画
  turnings.forEach(function(t){
    var body=document.getElementById('tpcb-'+t.id);
    if(!body)return;
    var counts=map[t.id]||{};
    var total=Object.values(counts).reduce(function(s,v){return s+v;},0);
    var choices=(t.choices)||[];
    var myAnswer=myAnswers[t.id]||null;

    if(!myAnswer){
      // 未回答：選択肢ボタンを表示（他の人が回答していても関係なし）
      if(choices.length===0){
        body.innerHTML='<div style="font-size:11px;color:var(--muted);padding:.25rem 0">選択肢なし</div>';
        return;
      }
      body.innerHTML='<div style="font-size:10px;color:var(--muted);margin-bottom:6px">この場面ならどうした？</div>'+
        '<div style="display:flex;flex-direction:column;gap:5px">'+
        choices.map(function(c){
          return '<button class="tp-choice-opt" onclick="voteTpChoice(this)" data-v="'+esc(c)+'" data-tid="'+t.id+'">'+esc(c)+'</button>';
        }).join('')+
        '</div>';
    } else {
      // 回答済み：投票率バーを表示（自分の選択をハイライト）
      var allChoices=choices.length>0?choices:Object.keys(counts);
      var totForBar=Object.values(counts).reduce(function(s,v){return s+v;},0);
      body.innerHTML='<div style="font-size:10px;color:var(--muted);margin-bottom:5px">'+totForBar+'人が回答</div>'+
        allChoices.map(function(c){
          var cnt=counts[c]||0;
          var pct=totForBar>0?Math.round(cnt/totForBar*100):0;
          var isMe=c===myAnswer;
          return '<div class="choice-bar-row" style="'+(isMe?'opacity:1':'opacity:.7')+'">'+
            '<span class="choice-lbl" style="'+(isMe?'font-weight:700;color:var(--text)':'')+'">'+
            (isMe?'✓ ':'')+esc(c)+'</span>'+
            '<div class="choice-bar"><div class="choice-bar-fill" style="width:'+pct+'%;background:'+(isMe?'var(--carp)':'var(--blue)')+'"></div></div>'+
            '<span class="choice-pct">'+pct+'%</span>'+
            '</div>';
        }).join('');
    }
  });
}
async function toggleTpChoice(btn, turningId){
  var body=document.getElementById('tpcb-'+turningId);
  if(!body)return;
  var isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  btn.textContent=isOpen?'＋':'－';
  if(!isOpen){
    await renderTpChoiceBody(turningId, body);
  }
}

async function renderTpChoiceBody(turningId, body){
  body.innerHTML='<div style="font-size:11px;color:var(--muted);padding:.5rem 0">読み込み中...</div>';
  // turning_votesのchoice集計を取得
  var r=await sb.from('turning_votes').select('choice,user_id').eq('turning_id',turningId);
  var counts={};var total=0;var myChoice=null;
  if(r.data)r.data.forEach(function(v){
    if(!v.choice)return;
    counts[v.choice]=(counts[v.choice]||0)+1;
    total++;
    if(v.user_id===userId)myChoice=v.choice;
  });
  // 分岐点のchoices取得
  var t=turnings.find(function(x){return x.id===turningId;});
  var choices=(t&&t.choices)||Object.keys(counts);
  // choicesがなければcountsのキーから生成
  if(!choices.length){
    body.innerHTML='<div style="font-size:11px;color:var(--muted);padding:.4rem 0">選択肢が設定されていません</div>';
    return;
  }
  // 投票済み or 未投票で表示を切り替え（Xのアンケート方式）
  if(myChoice){
    // 投票率バー表示
    body.innerHTML='<div style="font-size:10px;color:var(--muted);margin-bottom:5px">'+total+'人が回答</div>'+
      choices.map(function(c){
        var cnt=counts[c]||0;
        var pct=total>0?Math.round(cnt/total*100):0;
        var isMe=c===myChoice;
        return '<div class="choice-bar-row">'+
          '<span class="choice-lbl" style="'+(isMe?'color:var(--text);font-weight:500':'')+'">'+(isMe?'✓ ':'')+esc(c)+'</span>'+
          '<div class="choice-bar"><div class="choice-bar-fill" style="width:'+pct+'%;'+(isMe?'background:var(--carp)':'')+'"></div></div>'+
          '<span class="choice-pct">'+pct+'%</span>'+
          '</div>';
      }).join('');
  } else {
    // 未投票：選択肢ボタンを表示
    body.innerHTML='<div style="font-size:10px;color:var(--muted);margin-bottom:6px">この場面ならどうした？</div>'+
      '<div style="display:flex;flex-direction:column;gap:5px">'+
      choices.map(function(c){
        return '<button class="tp-choice-opt" onclick="voteTpChoice(this)" data-v="'+esc(c)+'" data-tid="'+turningId+'">'+esc(c)+'</button>';
      }).join('')+
      '</div>';
  }
}

async function voteTpChoice(btn){
  var turningId=btn.dataset.tid, choice=btn.dataset.v;
  // 楽観的UI更新：選択を表示
  btn.style.background='rgba(200,16,46,.1)';btn.style.borderColor='var(--carp)';btn.style.color='var(--carp)';
  // optimistic UI: 即座にバー表示
  var body=document.getElementById('tpcb-'+turningId);
  if(body){body.innerHTML='<div style="font-size:11px;color:var(--muted);padding:.4rem 0">保存中...</div>';}
  // turning_votesにchoiceを保存
  await sb.from('turning_votes').upsert({
    turning_id:turningId, game_id:GAME_ID, user_id:userId, choice:choice
  },{onConflict:'turning_id,user_id'});
  showToast('「'+choice+'」と回答しました！');
  // バー表示に切り替え
  if(body)await renderTpChoiceBody(turningId, body);
}

// ===== Xシェア =====
function shareToX(text){
  var url='https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent('https://carp-talk.vercel.app/?date='+currentDate);
  window.open(url,'_blank','noopener,noreferrer');
}

function getTurningShareText(turningId){
  var t=turnings.find(function(x){return x.id===turningId;});
  if(!t)return '';
  var score=GAME.home+''+GAME.homeScore+'-'+GAME.awayScore+GAME.away;
  return '【カープトーク】'+GAME.date+' '+score+'\n'+
    t.inning+'「'+t.description+'」が分岐点だと思う。\nあなたはどこが分岐点でしたか？\n#広島カープ #カープトーク';
}

function flashLive(){var el=document.getElementById('live-update');if(!el)return;el.style.display='flex';clearTimeout(el._t);el._t=setTimeout(function(){el.style.display='none';},3000);}
