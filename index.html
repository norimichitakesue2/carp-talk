<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本日のカープトーク</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--bg:#0a0c0f;--surface:#111318;--surface2:#181c23;--surface3:#1e2330;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#eef0f4;--muted:#7a8090;--faint:#2e3340;--accent:#f0c040;--blue:#4a9eff;--green:#3ecf8e;--red:#f46060;--orange:#f07840;--carp:#c8102e;--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,12,15,0.96);backdrop-filter:blur(14px);z-index:100}
.site-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.1em;color:var(--carp);line-height:1}
.site-sub{font-size:10px;color:var(--muted)}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.wrap{max-width:680px;margin:0 auto;padding:0 1rem 6rem}
/* 日付ナビ */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;margin:.5rem 0}
.date-nav-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 12px;font-size:13px;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.date-nav-btn:hover{color:var(--text)}.date-nav-btn:disabled{opacity:.3;cursor:default}
.date-nav-label{font-size:14px;font-weight:500}
/* スコアカード */
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;position:relative;overflow:hidden}
.score-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--carp),#ff4060,var(--accent))}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--carp);text-transform:uppercase;margin-bottom:.4rem}
.scoreboard{display:flex;align-items:center;justify-content:center;gap:2rem;margin:.5rem 0 .75rem}
.scoreboard .team{display:flex;flex-direction:column;align-items:center;text-align:center}
.tn{font-family:'Bebas Neue',sans-serif;font-size:20px;white-space:nowrap}
.tn.carp{color:var(--carp)}.tn.away{color:#f5d000}
.ts{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1}
.sep{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--faint);padding-top:.5rem}
.badges{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.bf{background:var(--faint);color:var(--muted)}.bw{background:rgba(200,16,46,.2);color:#ff7090;border:1px solid rgba(200,16,46,.3)}
/* イニング表 */
.inning-table-wrap{margin-top:1rem;overflow-x:auto}
.inning-table{width:100%;border-collapse:collapse;font-size:12px}
.inning-table th,.inning-table td{text-align:center;padding:4px 6px;border:1px solid var(--border);min-width:26px}
.inning-table th{color:var(--muted);background:var(--surface2)}
.inning-table td.team-label{text-align:left;font-weight:500;padding-left:10px;min-width:48px}
.inning-table td.score-col{color:var(--text);font-weight:700;font-size:13px;border-left:1px solid var(--border2)}
.inning-table td.zero{color:var(--faint)}.inning-table td.scoring{color:var(--accent);font-weight:700}
.pitcher-bar{margin-top:1rem;display:flex;gap:6px;flex-wrap:wrap}
.pitcher-chip{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:3px 9px;font-size:12px}
.pitcher-chip .role{font-size:10px;color:var(--muted)}
.s-win{font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(62,207,142,.2);color:var(--green)}
.s-loss{font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(244,96,96,.2);color:var(--red)}
.s-save{font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(74,158,255,.15);color:var(--blue)}
/* セクション共通 */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.slabel{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem}
.sdesc{font-size:13px;color:var(--muted);margin-bottom:.9rem;line-height:1.6}
/* タイトル投票 */
.title-list{display:flex;flex-direction:column;gap:6px}
.title-opt{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:.65rem .9rem;cursor:pointer;position:relative;overflow:hidden;transition:all .15s}
.title-opt:hover{border-color:var(--border2)}
.title-opt.picked{border-color:var(--accent);background:rgba(240,192,64,.04)}
.title-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(240,192,64,.07);transition:width .5s ease;z-index:0}
.title-body{position:relative;z-index:1;flex:1}
.title-txt{font-size:14px;font-weight:500}
.title-pct{font-size:11px;color:var(--muted);margin-top:1px}
.title-stat{position:relative;z-index:1;font-size:11px;color:var(--muted);white-space:nowrap}
.add-row{display:flex;gap:8px;margin-top:8px}
.add-inp{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:.5rem .9rem;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text)}
.add-inp:focus{outline:none;border-color:var(--accent)}
.add-btn{padding:.5rem 1rem;background:var(--accent);color:#000;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
/* 波形グラフ */
.wave-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.25rem 0;margin-bottom:0;border-bottom:none;border-radius:var(--r) var(--r) 0 0}
.wave-svg{width:100%;display:block;overflow:visible}
.wave-inn-labels{display:flex;padding:0 4px 12px;margin-top:2px}
.wave-inn-btn{flex:1;font-size:11px;color:var(--muted);text-align:center;cursor:pointer;padding:4px 2px;border-radius:4px;border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;position:relative;transition:color .15s}
.wave-inn-btn.has-tp{color:var(--text)}
.wave-inn-btn.sel{color:var(--carp);font-weight:500}
.wave-inn-dot{position:absolute;top:2px;right:3px;width:4px;height:4px;border-radius:50%;background:var(--carp)}
.wave-legend{display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--muted);flex-wrap:wrap;padding-bottom:2px}
.conn-area{background:var(--surface);border-left:1px solid var(--border);border-right:1px solid var(--border);padding:0 1.25rem;height:24px;position:relative}
.conn-svg{width:100%;height:24px;display:block;overflow:visible}
.tp-scroll-section{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:0 1.25rem 1rem;margin-bottom:1rem}
.tp-track-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tp-track-wrap::-webkit-scrollbar{display:none}
.tp-track{display:flex;gap:10px;padding:4px 2px 2px;transition:none}
.tp-card{flex-shrink:0;width:240px;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--rs);padding:12px;transition:opacity .3s,transform .3s;cursor:pointer}
.tp-card.focused{border-color:var(--carp);border-width:1.5px;background:rgba(200,16,46,.04)}
.tp-card.focused.mid{border-color:var(--orange);background:rgba(240,120,64,.04)}
.tp-card.dimmed{opacity:.35;transform:scale(.95)}
.tp-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.tp-badge-s{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(200,16,46,.15);color:#ff7090;font-weight:500}
.tp-badge-m{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(240,120,64,.15);color:var(--orange);font-weight:500}
.tp-inn-lbl{font-size:11px;color:var(--muted)}
.tp-desc{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.4}
.tp-reason{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.45;font-style:italic}
.tp-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.tp-bar-bg{flex:1;height:4px;background:var(--faint);border-radius:2px;overflow:hidden}
.tp-bar-fill{height:4px;border-radius:2px;transition:width .5s ease}
.tp-stat{font-size:11px;color:var(--muted);white-space:nowrap}
.tp-vote-btn{width:100%;padding:6px;border-radius:var(--rs);border:1px solid var(--carp);background:transparent;color:var(--carp);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s;font-family:'Noto Sans JP',sans-serif}
.tp-vote-btn:hover{background:rgba(200,16,46,.1)}
.tp-vote-btn.voted{background:var(--carp);color:#fff}
.tp-vote-btn.mid-btn{border-color:var(--orange);color:var(--orange)}
.tp-vote-btn.mid-btn:hover{background:rgba(240,120,64,.1)}
.tp-vote-btn.mid-btn.voted{background:var(--orange);color:#fff}
.tp-hint{font-size:11px;color:var(--muted);text-align:center;padding:12px 0 4px}
.tp-sel-inn{font-size:13px;color:var(--muted);padding:10px 0 6px;font-weight:500}
/* ストーリー */
.story{margin-bottom:1rem}
.inning-head{display:flex;align-items:center;gap:8px;padding:1.25rem 0 .4rem}
.inning-num{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--muted);letter-spacing:.1em;white-space:nowrap}
.inning-emotion{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.em-push{background:rgba(200,16,46,.12);color:#ff7090}
.em-hold{background:rgba(74,158,255,.12);color:var(--blue)}
.em-tens{background:rgba(240,192,64,.12);color:var(--accent)}
.em-none{background:var(--faint);color:var(--muted)}
.inning-divider{flex:1;height:1px;background:var(--border)}
.inning-ctx{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:.5rem;font-style:italic}
.flow-change{text-align:center;padding:.3rem 0;font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px}
.flow-change.up{color:rgba(200,16,46,.7)}
.flow-change.down{color:rgba(74,158,255,.5)}
.flow-change.flat{color:var(--faint);font-size:16px}
.fc-line{flex:1;height:1px;max-width:60px}
.flow-change.up .fc-line{background:rgba(200,16,46,.2)}
.flow-change.down .fc-line{background:rgba(74,158,255,.15)}
/* イベントチャンク */
.evt{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:.8rem 1rem;margin-bottom:.4rem;position:relative;overflow:hidden}
.evt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.evt.hr::before{background:var(--red);opacity:1}
.evt.score::before{background:var(--accent);opacity:1}
.evt.crisis::before{background:var(--orange);opacity:1}
.evt.pitcher::before{background:var(--blue);opacity:1}
.evt-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.evt-badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700}
.eb-hr{background:rgba(244,96,96,.15);color:var(--red)}
.eb-score{background:rgba(240,192,64,.15);color:var(--accent)}
.eb-crisis{background:rgba(240,120,64,.15);color:var(--orange)}
.eb-pitcher{background:rgba(74,158,255,.15);color:var(--blue)}
.evt-desc{font-size:14px;color:var(--text);line-height:1.5}
.evt-sub{font-size:12px;color:var(--muted);margin-top:2px;font-style:italic}
/* 分岐点 */
.turning-section{margin:.5rem 0 1rem}
.turning-hd{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
.turning-hd-title{font-size:13px;font-weight:700;color:var(--text)}
.turning-hd-sub{font-size:11px;color:var(--muted)}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:.6rem;position:relative;overflow:hidden;transition:border-color .15s}
.tc.top-voted{border-color:rgba(200,16,46,.35);background:rgba(200,16,46,.04)}
.tc.top-voted::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--carp),#ff4060,var(--accent))}
.tc.user-post{border-color:rgba(62,207,142,.2);background:rgba(62,207,142,.02)}
.tc-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.tc-inn{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;padding-top:2px}
.tc-body{flex:1}
.tc-desc{font-size:14px;font-weight:500;color:var(--text);line-height:1.5}
.tc-reason{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5;font-style:italic}
.tc-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.tc-tag{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500}
.tag-strong{background:rgba(200,16,46,.15);color:#ff7090}
.tag-mid{background:rgba(240,192,64,.12);color:var(--accent)}
.tag-weak{background:rgba(74,158,255,.12);color:var(--blue)}
.tp-badge-w{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(74,158,255,.12);color:var(--blue);font-weight:500}
.tag-sys{background:var(--faint);color:var(--muted);border:1px solid var(--border2)}
.tag-user{background:rgba(62,207,142,.12);color:var(--green)}
.tc-foot{display:flex;align-items:center;gap:8px;margin-top:8px}
.tc-vote-row{flex:1;display:flex;align-items:center;gap:6px}
.tc-bar-wrap{flex:1;height:3px;background:var(--faint);border-radius:2px;overflow:hidden}
.tc-bar{height:3px;border-radius:2px;background:var(--carp);transition:width .5s ease}
.tc-stat{font-size:11px;color:var(--muted);white-space:nowrap}
.tc-vbtn{font-size:12px;padding:4px 12px;border-radius:var(--rs);border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;white-space:nowrap}
.tc-vbtn:hover{border-color:rgba(200,16,46,.4);color:#ff7090}
.tc-vbtn.active{background:rgba(200,16,46,.12);border-color:var(--carp);color:#ff6080;font-weight:700}
.tc-comments-wrap{margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.tc-cmt{font-size:12px;color:var(--muted);padding:3px 0;display:flex;gap:6px;align-items:flex-start;line-height:1.5}
.tc-cmt-dot{width:5px;height:5px;border-radius:50%;background:var(--faint);flex-shrink:0;margin-top:6px}
/* 投稿フォーム */
.post-form{background:rgba(62,207,142,.04);border:1px solid rgba(62,207,142,.15);border-radius:var(--r);padding:1rem 1.1rem;margin-top:.75rem}
.post-form-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.form-row{margin-bottom:.65rem}
.form-label{font-size:11px;color:var(--muted);margin-bottom:4px;display:block}
.form-select,.form-input,.form-textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:.5rem .9rem;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text)}
.form-textarea{resize:none;min-height:70px}
.form-select:focus,.form-input:focus,.form-textarea:focus{outline:none;border-color:var(--green)}
.intensity-row{display:flex;gap:6px}
.int-btn{flex:1;padding:.4rem;font-size:11px;border-radius:var(--rs);border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;text-align:center}
.int-btn.sel-s{border-color:rgba(200,16,46,.4);color:#ff7090;background:rgba(200,16,46,.1);font-weight:700}
.int-btn.sel-m{border-color:rgba(240,192,64,.4);color:var(--accent);background:rgba(240,192,64,.1);font-weight:700}
.int-btn.sel-w{border-color:rgba(74,158,255,.4);color:var(--blue);background:rgba(74,158,255,.1);font-weight:700}
.form-submit{width:100%;padding:.65rem;background:var(--green);color:#061a10;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:.5rem}
/* コメント */
.ctabs{display:flex;gap:4px;margin-bottom:.75rem}
.ctab{flex:1;text-align:center;padding:.4rem;font-size:12px;cursor:pointer;border:1px solid var(--border);border-radius:var(--rs);color:var(--muted);font-family:'Noto Sans JP',sans-serif;background:transparent;transition:all .15s}
.ctab.active{background:var(--surface2);color:var(--text);font-weight:500;border-color:var(--border2)}
.comment{padding:.65rem 0;border-bottom:1px solid var(--border)}
.comment:last-child{border-bottom:none}
.cmeta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.cname{font-size:12px;color:var(--muted)}
.ccat{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.cc-a{background:rgba(74,158,255,.12);color:var(--blue)}
.cc-f{background:rgba(62,207,142,.12);color:var(--green)}
.cc-n{background:rgba(240,192,64,.12);color:var(--accent)}
.clink{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--faint);color:var(--muted)}
.cbody{font-size:14px;color:var(--text);line-height:1.6;padding-left:30px}
.empty-state{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
.new-comment{margin-top:.75rem}
.ctype-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.ctype-lbl{font-size:11px;color:var(--muted)}
.ctype-btn{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.ctype-btn.sa{border-color:rgba(74,158,255,.4);color:var(--blue);background:rgba(74,158,255,.1);font-weight:700}
.ctype-btn.sf{border-color:rgba(62,207,142,.4);color:var(--green);background:rgba(62,207,142,.1);font-weight:700}
.ctype-btn.sn{border-color:rgba(240,192,64,.4);color:var(--accent);background:rgba(240,192,64,.1);font-weight:700}
.cinput-row{display:flex;gap:8px}
.cinput{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:.55rem .9rem;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text)}
.cinput:focus{outline:none;border-color:var(--blue)}
.csend{padding:.55rem 1rem;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
.csend:disabled{opacity:.5;cursor:not-allowed}
/* ローディング・その他 */
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--faint);border-top-color:var(--blue);border-radius:50%;animation:spinAnim .7s linear infinite}
@keyframes spinAnim{to{transform:rotate(360deg)}}
.no-game{text-align:center;padding:4rem 2rem}
.no-game-icon{font-size:48px;margin-bottom:1rem}
.no-game-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--muted);margin-bottom:.5rem}
.no-game-sub{font-size:14px;color:var(--muted)}
.no-game-link{display:inline-block;margin-top:1.5rem;padding:8px 20px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);text-decoration:none;font-size:13px}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(12px);background:var(--green);color:#061a10;font-size:13px;font-weight:700;padding:.5rem 1.4rem;border-radius:99px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ============================================================ */
/* 🔴 デザイン刷新：カープ色＋スポーツ熱気                        */
/* ============================================================ */
:root{--carp-dark:#8a0a1e;--carp-bright:#ff1a3c;--gold:#f0c040;--gold-bright:#ffd965}

/* 全体の背景：応援席のドット＋スタジアム照明＋CRTスキャンライン */
body{
  background:
    url('/assets/crowd.svg'),
    repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(255,255,255,.012) 2px, rgba(255,255,255,.012) 3px),
    radial-gradient(ellipse 100% 60% at 50% -10%, rgba(200,16,46,.18), transparent 60%),
    radial-gradient(ellipse 80% 50% at 90% 10%, rgba(240,192,64,.07), transparent 50%),
    radial-gradient(ellipse 120% 80% at 50% 100%, rgba(200,16,46,.08), transparent 55%),
    var(--bg);
  background-size: 480px 480px, auto, auto, auto, auto, auto;
  background-attachment: fixed;
  background-repeat: repeat, repeat, no-repeat, no-repeat, no-repeat, no-repeat;
  position: relative;
}
/* 画面全体にアニメーションするドットレイヤー：一部が点滅する応援席のイメージ */
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:url('/assets/crowd.svg');
  background-size: 480px 480px;
  background-repeat: repeat;
  mix-blend-mode: screen;
  opacity:.35;
  pointer-events:none;
  animation: crowdFlicker 3.2s ease-in-out infinite;
  z-index:0;
}
@keyframes crowdFlicker{
  0%,100%{opacity:.32; transform:translate(0,0)}
  50%{opacity:.5; transform:translate(1px,-1px)}
}
/* CRT型のスキャンライン（ゲーム感） */
body::after{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,.0) 0px,
    rgba(0,0,0,.0) 3px,
    rgba(0,0,0,.08) 3px,
    rgba(0,0,0,.08) 4px
  );
  pointer-events:none;
  z-index:1;
  mix-blend-mode:multiply;
}
.wrap, header{position:relative; z-index:2}

/* ヘッダー：上部にカープレッドの帯＋glow */
header{
  border-bottom-color:rgba(200,16,46,.35);
  box-shadow:0 1px 0 rgba(200,16,46,.15), 0 6px 20px rgba(0,0,0,.4);
}
header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, var(--carp-dark), var(--carp), var(--carp-bright), var(--gold), var(--carp-bright), var(--carp));
  background-size:300% 100%;
  animation:headerShine 8s linear infinite;
}
@keyframes headerShine{0%{background-position:0% 50%}100%{background-position:300% 50%}}

.site-title{
  font-size:22px;letter-spacing:.14em;
  background:linear-gradient(90deg, var(--carp-bright), var(--gold), var(--carp-bright));
  background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 20px rgba(200,16,46,.4);
  animation:titleShine 6s linear infinite;
}
@keyframes titleShine{0%{background-position:0% center}100%{background-position:200% center}}
.site-sub{letter-spacing:.08em;color:rgba(255,255,255,.5)}

/* 日付ナビ：ボタンに熱気 */
.date-nav-btn{
  background:linear-gradient(180deg, var(--surface2), #0f1219);
  border-color:rgba(200,16,46,.25);transition:all .18s;
}
.date-nav-btn:hover:not(:disabled){
  border-color:var(--carp);color:var(--text);
  box-shadow:0 0 12px rgba(200,16,46,.35);
  transform:translateY(-1px);
}
.date-nav-label{font-weight:600;letter-spacing:.02em}

/* スコアカード：ちゃんと色付きの電光掲示板パネル */
.score-card{
  background:
    radial-gradient(ellipse at top, rgba(200,16,46,.12), transparent 70%),
    repeating-linear-gradient(90deg, transparent 0, transparent 40px, rgba(255,255,255,.015) 40px, rgba(255,255,255,.015) 41px),
    linear-gradient(180deg, #1a1e28 0%, #0d1016 100%);
  border:2px solid rgba(200,16,46,.42);
  box-shadow:
    0 14px 40px rgba(0,0,0,.65),
    0 0 24px rgba(200,16,46,.18),
    inset 0 1px 0 rgba(255,255,255,.08),
    inset 0 -2px 0 rgba(0,0,0,.45);
  position:relative;
  overflow:hidden;
}
.score-card > *{position:relative; z-index:1}

/* 背景にスタジアムを大きく配置（ページ全体のアンビエント） */
body::before{
  background:
    url('/assets/stadium.svg') no-repeat center -4vh / min(1600px, 170vw) auto,
    url('/assets/crowd.svg') repeat 0 0 / 480px 480px;
  mix-blend-mode: screen;
  opacity: .5;
  animation: stadiumPulse 7s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(200,16,46,.3));
}
@keyframes stadiumPulse{
  0%,100%{opacity:.38}
  50%{opacity:.55}
}
.score-card::before{
  height:4px;
  background:linear-gradient(90deg, var(--carp-dark), var(--carp), var(--carp-bright), var(--gold), var(--carp-bright), var(--carp));
  background-size:300% 100%;
  animation:headerShine 10s linear infinite;
}
.eyebrow{
  color:var(--gold);letter-spacing:.18em;font-size:11px;
  text-shadow:0 0 8px rgba(240,192,64,.3);
}
.tn{font-size:24px;letter-spacing:.06em;font-weight:400}
.tn.carp{
  background:linear-gradient(180deg, #ff4060, var(--carp));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 6px rgba(200,16,46,.5));
}
.ts{font-size:58px;font-weight:400;letter-spacing:-.02em;line-height:.9}
.scoreboard .team .ts{filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
/* 広島が勝ったときだけスコア自体にグロー */
.score-card[data-hiroshima-win="true"] .tn.carp,
.score-card[data-hiroshima-win="true"] .ts{
  filter:drop-shadow(0 0 12px rgba(200,16,46,.6));
}
.sep{font-size:32px;color:rgba(255,255,255,.15)}

/* バッジ：勝利時はゴールドの祝祭感 */
.badges{margin-top:.3rem}
.badge{letter-spacing:.08em;padding:3px 10px;border-radius:3px;font-size:10.5px}
.bf{
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
  border:1px solid var(--border2);color:rgba(255,255,255,.7);
}
.bw{
  background:linear-gradient(180deg, rgba(240,192,64,.25), rgba(240,192,64,.1));
  border-color:var(--gold);color:var(--gold-bright);font-weight:800;
  box-shadow:0 0 16px rgba(240,192,64,.3);
  animation:winPulse 2s ease-in-out infinite;
}
/* live badge */
.bl{
  background:linear-gradient(180deg, rgba(200,16,46,.35), rgba(200,16,46,.15));
  border:1px solid var(--carp-bright);color:#ff8090;font-weight:800;
  box-shadow:0 0 14px rgba(200,16,46,.45);
  animation:livePulse 1.4s ease-in-out infinite;
}
/* cancelled badge */
.bc{
  background:linear-gradient(180deg, rgba(180,180,180,.18), rgba(180,180,180,.06));
  border:1px solid rgba(200,200,200,.35);color:#cfcfcf;font-weight:700;
}
@keyframes livePulse{0%,100%{box-shadow:0 0 14px rgba(200,16,46,.45);opacity:1}50%{box-shadow:0 0 22px rgba(200,16,46,.7);opacity:.85}}

/* ============================================================ */
/* 😤 気分チェックイン                                         */
/* ============================================================ */
.mood-section{
  background:linear-gradient(180deg, var(--surface) 0%, #0d1117 100%);
  border:1px solid rgba(200,16,46,.22);
  border-radius:var(--r);
  padding:.9rem 1rem .85rem;
  margin-bottom:1rem;
  position:relative;
  overflow:hidden;
}
.mood-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg, var(--carp), var(--gold), var(--carp));
}
.mood-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mood-q{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.02em}
.mood-meta{font-size:10px;color:var(--muted)}
.mood-buttons{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.mood-btn{
  background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);
  padding:.55rem .3rem .5rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:all .15s;position:relative;overflow:hidden;
}
.mood-btn:hover{border-color:var(--carp);transform:translateY(-2px);box-shadow:0 4px 12px rgba(200,16,46,.2)}
.mood-btn.picked{border-color:var(--gold);background:linear-gradient(180deg, rgba(240,192,64,.15), rgba(200,16,46,.05));box-shadow:0 0 12px rgba(240,192,64,.3)}
.mood-emoji{font-size:24px;line-height:1;filter:grayscale(.2);transition:filter .2s}
.mood-btn:hover .mood-emoji,.mood-btn.picked .mood-emoji{filter:grayscale(0) drop-shadow(0 0 4px rgba(255,255,255,.3))}
.mood-label{font-size:10.5px;color:var(--muted);font-weight:600}
.mood-btn.picked .mood-label{color:var(--gold-bright)}
.mood-pct{font-size:9.5px;color:var(--muted);margin-top:1px;font-family:'Bebas Neue',sans-serif;letter-spacing:.05em;height:11px}
.mood-btn.picked .mood-pct{color:var(--gold-bright)}
.mood-fill{position:absolute;left:0;bottom:0;height:2px;background:linear-gradient(90deg, var(--carp), var(--gold));transition:width .5s ease;z-index:0}
.mood-share-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border2)}
.mood-status{font-size:10.5px;color:var(--muted)}
.mood-status .em{color:var(--gold)}
.mood-share-btn{font-size:10.5px;padding:4px 10px;border-radius:4px;border:1px solid var(--blue);background:rgba(74,158,255,.08);color:var(--blue);cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:600}
.mood-share-btn:hover{background:rgba(74,158,255,.2)}

/* ============================================================ */
/* 🎫 マイカード（観戦サマリー）                                 */
/* ============================================================ */
.mycard-section{
  background:
    radial-gradient(ellipse at top right, rgba(240,192,64,.1), transparent 50%),
    linear-gradient(180deg, var(--surface) 0%, #100c14 100%);
  border:1px solid rgba(240,192,64,.3);
  border-radius:var(--r);
  padding:1.1rem 1rem;
  margin-bottom:1rem;
  position:relative;
  overflow:hidden;
}
.mycard-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, var(--gold), var(--carp), var(--gold));
  background-size:200% 100%;
  animation:headerShine 5s linear infinite;
}
.mc-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.mc-icon{font-size:18px;filter:drop-shadow(0 0 6px rgba(240,192,64,.5))}
.mc-title{
  font-family:'Bebas Neue', 'Noto Sans JP', sans-serif;
  font-size:18px;letter-spacing:.1em;
  background:linear-gradient(90deg, var(--gold-bright), #ffb840);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.mc-sub{font-size:11px;color:var(--muted);margin-bottom:12px;margin-left:26px}
.mc-card{
  background:linear-gradient(180deg, #1a1820 0%, #0d0c12 100%);
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--rs);
  padding:.85rem 1rem;
  position:relative;
}
.mc-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px dashed rgba(255,255,255,.06);font-size:12.5px}
.mc-row:last-child{border-bottom:none}
.mc-icon-mini{flex-shrink:0;width:20px;text-align:center;font-size:13px}
.mc-key{flex-shrink:0;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.04em;width:80px}
.mc-val{flex:1;color:var(--text);line-height:1.5;font-weight:500}
.mc-val.empty{color:var(--faint);font-style:italic;font-weight:400;font-size:11.5px}
.mc-stance{display:inline-block;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(240,192,64,.15);color:var(--gold-bright);margin-left:6px;letter-spacing:.04em}
.mc-cta{display:flex;justify-content:flex-end;margin-top:10px;gap:8px}
.mc-share-btn{
  font-size:12px;padding:.5rem 1rem;border-radius:var(--rs);
  background:linear-gradient(180deg, var(--carp-bright), var(--carp));
  color:#fff;border:none;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;letter-spacing:.04em;
  box-shadow:0 4px 14px rgba(200,16,46,.35);
  transition:all .18s;
}
.mc-share-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(200,16,46,.5)}
.mc-empty-hint{font-size:10.5px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.5}
.mc-comment-wrap{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border2)}
.mc-comment-lbl{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.06em;margin-bottom:5px}
.mc-comment-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:.55rem .75rem;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text);resize:vertical;min-height:48px;line-height:1.5}
.mc-comment-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 8px rgba(240,192,64,.2)}
.mc-comment-meta{font-size:10.5px;color:var(--muted);text-align:right;margin-top:3px}
@keyframes winPulse{0%,100%{box-shadow:0 0 16px rgba(240,192,64,.3)}50%{box-shadow:0 0 24px rgba(240,192,64,.55)}}

/* イニング表：電光風 */
.inning-table{font-family:'Bebas Neue', monospace;letter-spacing:.04em}
.inning-table th{
  background:linear-gradient(180deg, #151822, #0d1016);
  color:var(--gold);font-size:13px;letter-spacing:.1em;
}
.inning-table td.scoring{
  color:var(--gold-bright);font-size:15px;
  text-shadow:0 0 8px rgba(240,192,64,.6);
}
.inning-table td.score-col{font-size:15px;color:var(--text)}

/* 投手チップ：カード風 */
.pitcher-chip{
  background:linear-gradient(180deg, var(--surface2), #0f1219);
  border-color:rgba(200,16,46,.2);transition:all .2s;
}
.pitcher-chip:hover{border-color:var(--carp);transform:translateY(-1px);box-shadow:0 4px 12px rgba(200,16,46,.2)}
.s-win{background:linear-gradient(180deg, rgba(240,192,64,.3), rgba(240,192,64,.15));color:var(--gold-bright);font-weight:800;box-shadow:0 0 6px rgba(240,192,64,.4)}
.s-loss{background:linear-gradient(180deg, rgba(244,96,96,.25), rgba(244,96,96,.1))}
.s-save{background:linear-gradient(180deg, rgba(74,158,255,.2), rgba(74,158,255,.08))}

/* セクション全体：微かなピンストライプ */
.section, .wave-box, .tp-scroll-section, .lineup-section, .player-section, .minna-section, .ai-analysis-section, .eval-bar, .story{
  background:
    linear-gradient(180deg, rgba(255,255,255,.012), transparent 120px),
    var(--surface);
  border-color:rgba(200,16,46,.14);
  box-shadow:0 4px 16px rgba(0,0,0,.28);
}

/* セクション見出し：エンブレム風 */
.slabel{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'Bebas Neue', 'Noto Sans JP', sans-serif;
  font-size:15px;letter-spacing:.14em;font-weight:400;
  color:var(--gold);margin-bottom:.7rem;
  text-shadow:0 0 10px rgba(240,192,64,.2);
}
.slabel::before{
  content:'';width:3px;height:16px;
  background:linear-gradient(180deg, var(--carp-bright), var(--carp-dark));
  border-radius:2px;box-shadow:0 0 6px rgba(200,16,46,.5);
}

/* タイトル投票：熱気のあるグラデ */
.title-opt{transition:all .2s}
.title-opt:hover{border-color:var(--gold);box-shadow:0 0 14px rgba(240,192,64,.15);transform:translateX(2px)}
.title-opt.picked{
  border-color:var(--gold);
  background:linear-gradient(90deg, rgba(240,192,64,.1), rgba(200,16,46,.06));
  box-shadow:0 0 18px rgba(240,192,64,.25);
}
.title-fill{background:linear-gradient(90deg, rgba(200,16,46,.18), rgba(240,192,64,.16))}
.tc.top-voted{
  border-color:var(--carp-bright);
  background:linear-gradient(135deg, rgba(200,16,46,.08), rgba(240,192,64,.04));
  box-shadow:0 0 20px rgba(200,16,46,.18);
}
.tc.top-voted::before{
  height:3px;
  background:linear-gradient(90deg, var(--carp-dark), var(--carp-bright), var(--gold), var(--carp-bright), var(--carp-dark));
  background-size:200% 100%;animation:headerShine 6s linear infinite;
}

/* ボタン全般：押したくなるインタラクション */
.add-btn, .form-submit, .lineup-submit.on, .popup-submit, .ep-next, .csend, .pos-post-btn{
  background:linear-gradient(180deg, var(--carp-bright), var(--carp));
  color:#fff;font-weight:800;letter-spacing:.04em;
  box-shadow:0 4px 14px rgba(200,16,46,.35), inset 0 1px 0 rgba(255,255,255,.15);
  transition:all .18s;border:none;
}
.add-btn:hover, .form-submit:hover, .lineup-submit.on:hover, .popup-submit:hover, .ep-next:hover, .csend:hover, .pos-post-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(200,16,46,.5), inset 0 1px 0 rgba(255,255,255,.2);
  filter:brightness(1.08);
}
.add-btn:active, .form-submit:active, .popup-submit:active, .ep-next:active, .csend:active, .pos-post-btn:active{
  transform:translateY(0);box-shadow:0 2px 8px rgba(200,16,46,.4);
}
.pos-post-btn{background:linear-gradient(180deg, var(--gold-bright), var(--gold));color:#222;box-shadow:0 4px 14px rgba(240,192,64,.35)}
.pos-post-btn:hover{box-shadow:0 6px 20px rgba(240,192,64,.5)}

/* 投票ボタン：選択時に脈動 */
.tp-vote-btn.voted{
  background:linear-gradient(180deg, var(--carp-bright), var(--carp));
  box-shadow:0 0 14px rgba(200,16,46,.4);
}
.tp-vote-btn:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(200,16,46,.2)}

/* AI分析セクション：スタジアム案内風 */
.ai-analysis-section{
  background:
    linear-gradient(135deg, rgba(74,158,255,.04), transparent 50%),
    var(--surface);
  border-color:rgba(74,158,255,.22);
}

/* ポジセクション：光り輝かせる */
.positive-section{
  background:
    linear-gradient(135deg,rgba(240,192,64,.1),rgba(62,207,142,.05) 50%, rgba(200,16,46,.04)),
    radial-gradient(circle at 20% 0%, rgba(240,192,64,.12), transparent 50%),
    var(--surface);
  border-color:rgba(240,192,64,.3);
  box-shadow:0 4px 20px rgba(240,192,64,.08);
}
.positive-section::before{
  height:3px;
  background:linear-gradient(90deg, var(--gold-bright), var(--gold), #ffb840, var(--gold), var(--gold-bright));
  background-size:200% 100%;animation:headerShine 5s linear infinite;
}
.pos-title-t{
  font-family:'Bebas Neue', 'Noto Sans JP', sans-serif;
  font-size:18px;letter-spacing:.1em;
  background:linear-gradient(90deg, var(--gold-bright), var(--gold));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.pos-icon{filter:drop-shadow(0 0 6px rgba(240,192,64,.6));animation:sparkle 3s ease-in-out infinite}
@keyframes sparkle{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.15) rotate(8deg)}}
.pos-tab.active{
  background:linear-gradient(180deg, rgba(240,192,64,.25), rgba(240,192,64,.1));
  border-color:var(--gold);box-shadow:0 0 12px rgba(240,192,64,.2);
}

/* 選手評価バー：グラデ化 */
.rating-btn.mvp.sel{
  background:linear-gradient(180deg, rgba(240,192,64,.35), rgba(240,192,64,.15));
  box-shadow:0 0 12px rgba(240,192,64,.4);
}
.rating-btn.good.sel{
  background:linear-gradient(180deg, rgba(62,207,142,.3), rgba(62,207,142,.1));
  box-shadow:0 0 10px rgba(62,207,142,.3);
}
.rating-btn.cheer.sel{
  background:linear-gradient(180deg, rgba(200,16,46,.3), rgba(200,16,46,.1));
  box-shadow:0 0 10px rgba(200,16,46,.3);
}

/* オンラインドット：より鮮やかに */
.online-dot{background:var(--gold-bright);box-shadow:0 0 8px var(--gold-bright);}

/* コメントタブ：熱気 */
.ctab.active{
  color:var(--carp-bright);
  border-bottom:2px solid var(--carp);
  text-shadow:0 0 8px rgba(200,16,46,.4);
}

/* スクロールバー（WebKit） */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.3)}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg, var(--carp), var(--carp-dark));border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--carp-bright)}

/* ============================================================ */
/* 🔮 試合前プレビュー（preview）                                */
/* ============================================================ */
.preview-section{
  background:
    radial-gradient(ellipse at top right, rgba(74,158,255,.1), transparent 50%),
    linear-gradient(180deg, var(--surface) 0%, #0c0d18 100%);
  border:1px solid rgba(74,158,255,.3);
  border-radius:var(--r);
  padding:1rem;
  margin-bottom:1rem;
  position:relative;
  overflow:hidden;
}
.preview-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, #4a9eff, var(--gold), #4a9eff);
  background-size:200% 100%;
  animation:headerShine 5s linear infinite;
}
.pv-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
/* 試合後の「答え合わせ」折りたたみ */
.pv-head-toggle{cursor:pointer;user-select:none}
.pv-toggle-arrow{
  margin-left:auto;font-size:11px;color:var(--muted);
  transition:transform .2s;
}
.preview-section.pv-collapsed .pv-toggle-arrow{transform:rotate(-90deg)}
.preview-section.pv-collapsed .pv-sub,
.preview-section.pv-collapsed #pv-body,
.preview-section.pv-collapsed .pv-disclaimer{display:none}
/* 試合後レビュー時は青みを抑えて控えめに */
.preview-section.pv-review{
  border-color:var(--border);
  background:linear-gradient(180deg, var(--surface) 0%, #0d1117 100%);
}
.preview-section.pv-review.pv-collapsed{margin-bottom:1rem}
.pv-icon{font-size:18px;filter:drop-shadow(0 0 6px rgba(74,158,255,.5))}
.pv-title-t{
  font-family:'Bebas Neue', 'Noto Sans JP', sans-serif;
  font-size:18px;letter-spacing:.1em;
  background:linear-gradient(90deg, #5badff, var(--gold-bright));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.pv-sub{font-size:11px;color:var(--muted);margin-bottom:12px;margin-left:26px}
.pv-flow{
  background:rgba(74,158,255,.08);
  border:1px solid rgba(74,158,255,.2);
  border-radius:var(--rs);
  padding:.7rem .9rem;
  font-size:13px;line-height:1.6;color:var(--text);
  margin-bottom:14px;
}
.pv-flow-lbl{font-size:10.5px;font-weight:700;color:#5badff;letter-spacing:.06em;margin-bottom:4px}
.pv-section-lbl{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.08em;margin:14px 0 8px;text-transform:uppercase}
.pv-watchpoints{display:flex;flex-direction:column;gap:8px}
.pv-wp{
  background:linear-gradient(180deg, var(--surface) 0%, #0d1117 100%);
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--rs);
  padding:.7rem .9rem;
  position:relative;padding-left:1.6rem;
}
.pv-wp::before{
  content:counter(pv-counter);
  counter-increment:pv-counter;
  position:absolute;left:.65rem;top:.7rem;
  font-family:'Bebas Neue',sans-serif;font-size:14px;
  background:linear-gradient(180deg, var(--gold), #d4a020);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  font-weight:700;
}
.pv-watchpoints{counter-reset:pv-counter}
.pv-wp-title{font-size:13.5px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:3px}
.pv-wp-desc{font-size:11.5px;color:var(--muted);line-height:1.6}
.pv-players{display:flex;flex-direction:column;gap:6px}
.pv-player{
  background:linear-gradient(90deg, rgba(200,16,46,.06), transparent);
  border:1px solid rgba(200,16,46,.18);
  border-radius:var(--rs);
  padding:.55rem .8rem;
  display:flex;align-items:flex-start;gap:8px;
}
.pv-player-role{
  flex-shrink:0;
  font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:3px;
  background:rgba(240,192,64,.18);color:var(--gold-bright);
  margin-top:2px;letter-spacing:.04em;
}
.pv-player-body{flex:1}
.pv-player-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:1px}
.pv-player-reason{font-size:11px;color:var(--muted);line-height:1.5}
.pv-stats-grid{display:grid;grid-template-columns:1fr;gap:6px;margin-top:10px}
@media(min-width:600px){.pv-stats-grid{grid-template-columns:1fr 1fr 1fr}}
.pv-stat{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:var(--rs);
  padding:.55rem .75rem;
}
.pv-stat-lbl{font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
.pv-stat.strength .pv-stat-lbl{color:var(--green)}
.pv-stat.weakness .pv-stat-lbl{color:#ff7090}
.pv-stat.threat .pv-stat-lbl{color:#ffa040}
.pv-stat-val{font-size:11.5px;color:var(--text);line-height:1.5}
.pv-disclaimer{font-size:10px;color:var(--faint);margin-top:10px;text-align:center;font-style:italic}

/* 🎯 相手先発との相性 (key_matchups) */
.pv-matchups{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.pv-matchup{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-left-width:3px;
  border-radius:var(--rs);
  padding:.5rem .75rem;
}
.pv-matchup.mu-good{border-left-color:#3ecf8e;background:linear-gradient(90deg, rgba(62,207,142,.08), transparent 60%)}
.pv-matchup.mu-bad{border-left-color:#ff7090;background:linear-gradient(90deg, rgba(255,112,144,.08), transparent 60%)}
.pv-matchup.mu-even{border-left-color:rgba(200,200,200,.4)}
.pv-mu-head{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.pv-mu-icon{font-size:13px}
.pv-mu-name{font-size:13px;font-weight:700;color:var(--text)}
.pv-mu-stat{font-size:11px;color:var(--muted);font-family:ui-monospace, 'SF Mono', monospace;letter-spacing:.02em}
.pv-mu-note{font-size:11px;color:var(--text);line-height:1.5;margin-top:3px;opacity:.85}

/* 🆚 相手先発との前回対戦 (last_matchup) */
.pv-matchup-review{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:var(--rs);
  padding:.65rem .8rem;margin-top:6px;
}
.pv-mr-summary{font-size:12px;color:var(--text);line-height:1.65}
.pv-mr-counter{
  font-size:11.5px;color:var(--text);line-height:1.6;margin-top:7px;
  padding-top:7px;border-top:1px dashed var(--border2);
}
.pv-mr-counter-lbl{font-weight:800;color:var(--accent);margin-right:5px}

/* ⚙️ 調子を踏まえた打順提案 (lineup_proposal) */
.pv-lineup-prop{
  background:linear-gradient(135deg, rgba(200,16,46,.06), rgba(200,16,46,.01));
  border:1px solid rgba(200,16,46,.22);
  border-radius:var(--rs);
  padding:.7rem .8rem;margin-top:6px;
}
.pv-lp-intro{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.5}
.pv-lp-order{display:flex;flex-direction:column;gap:3px}
.pv-lp-row{display:flex;align-items:baseline;gap:8px}
.pv-lp-num{
  flex-shrink:0;width:20px;height:20px;line-height:20px;text-align:center;
  background:var(--carp);color:#fff;font-size:11px;font-weight:800;border-radius:4px;
}
.pv-lp-name{font-size:12.5px;font-weight:700;color:var(--text);flex-shrink:0;min-width:60px}
.pv-lp-note{font-size:10.5px;color:var(--muted);line-height:1.5}
.pv-lp-foot{font-size:11px;color:var(--text);line-height:1.6;margin-top:8px;opacity:.9}
.pv-lp-disclaimer{font-size:9.5px;color:var(--faint);margin-top:6px;font-style:italic}

/* 🌱 ファームからのコールアップ提案 (farm_callup) */
.pv-farm{
  background:linear-gradient(135deg, rgba(62,207,142,.07), rgba(62,207,142,.01));
  border:1px solid rgba(62,207,142,.25);
  border-radius:var(--rs);
  padding:.7rem .8rem;margin-top:6px;
}
.pv-farm-issue{font-size:11.5px;color:var(--text);margin-bottom:8px;line-height:1.5}
.pv-farm-issue-lbl{
  font-size:9.5px;font-weight:800;color:#3ecf8e;
  background:rgba(62,207,142,.15);border-radius:3px;padding:1px 6px;margin-right:6px;
}
.pv-farm-cand{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:var(--rs);
  padding:.5rem .65rem;margin-bottom:5px;
}
.pv-farm-cand-head{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
.pv-farm-cand-name{font-size:13px;font-weight:700;color:var(--text)}
.pv-farm-cand-role{
  font-size:9.5px;font-weight:700;color:#3ecf8e;
  border:1px solid rgba(62,207,142,.4);border-radius:3px;padding:0 5px;
}
.pv-farm-cand-stat{font-size:10.5px;color:var(--muted);font-family:ui-monospace,'SF Mono',monospace}
.pv-farm-cand-reason{font-size:11px;color:var(--text);line-height:1.55;margin-top:3px;opacity:.9}

/* ============================================================ */
/* 📊 選手の調子（recent form）                                 */
/* ============================================================ */
.form-section{
  background:linear-gradient(180deg, var(--surface) 0%, #0d1117 100%);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:1.1rem 1.1rem .9rem;
  margin-bottom:1rem;
}
.form-head{display:flex;align-items:center;gap:7px;margin-bottom:2px}
.form-icon{font-size:16px}
.form-title-t{font-size:14px;font-weight:800;color:var(--text);letter-spacing:.02em}
.form-range{font-size:10.5px;color:var(--muted);margin-left:auto;font-family:ui-monospace,'SF Mono',monospace}
/* 野手/投手 切り替えタブ */
.form-tabs{display:flex;gap:6px;margin:10px 0 8px}
.form-tab{
  flex:1;padding:.5rem .4rem;font-size:12px;font-weight:700;
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:var(--rs);
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.form-tab.active{
  background:linear-gradient(180deg, rgba(200,16,46,.25), rgba(200,16,46,.1));
  border-color:var(--carp-bright);color:#ff8090;
}
.form-sub{font-size:11px;color:var(--muted);margin-bottom:10px}
/* MVP / 心配な選手 ピックアップ */
.form-pickup{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
@media(max-width:480px){.form-pickup{grid-template-columns:1fr}}
.form-pick{
  border-radius:var(--rs);padding:.6rem .7rem;
  border:1px solid var(--border);
}
.form-pick.pick-mvp{background:linear-gradient(135deg, rgba(240,192,64,.14), rgba(240,192,64,.03));border-color:var(--gold)}
.form-pick.pick-worst{background:linear-gradient(135deg, rgba(120,150,255,.12), rgba(120,150,255,.02));border-color:rgba(120,150,255,.4)}
.form-pick-lbl{font-size:9.5px;font-weight:800;letter-spacing:.08em;margin-bottom:3px}
.form-pick.pick-mvp .form-pick-lbl{color:var(--gold-bright)}
.form-pick.pick-worst .form-pick-lbl{color:#9ab0ff}
.form-pick-name{font-size:14px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px}
.form-pick-sum{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.5}
/* 選手リスト */
.form-list{display:flex;flex-direction:column;gap:5px}
.form-row{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.025);
  border:1px solid var(--border);
  border-radius:var(--rs);
  padding:.5rem .7rem;
}
.form-badge{
  flex-shrink:0;width:42px;text-align:center;
  font-size:15px;font-weight:900;line-height:1.15;
  border-radius:6px;padding:3px 0;
}
.form-badge .fb-label{display:block;font-size:8px;font-weight:700;letter-spacing:.02em}
.form-hot2{background:rgba(0,150,255,.18);color:#4ab8ff;border:1px solid rgba(74,184,255,.5)}
.form-hot1{background:rgba(0,150,255,.1);color:#6ec3ff;border:1px solid rgba(110,195,255,.3)}
.form-even{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.form-cold1{background:rgba(255,140,60,.1);color:#ffa860;border:1px solid rgba(255,168,96,.3)}
.form-cold2{background:rgba(255,70,70,.16);color:#ff7676;border:1px solid rgba(255,118,118,.5)}
.form-none{background:rgba(255,255,255,.03);color:var(--faint);border:1px solid var(--border)}
.form-row-body{flex:1;min-width:0}
.form-row-name{font-size:13px;font-weight:700;color:var(--text)}
.form-row-sum{font-size:10.5px;color:var(--muted);margin-top:1px;font-family:ui-monospace,'SF Mono',monospace}

/* ============================================================ */
/* ⚔️ 議論エンジン（debates）                                   */
/* ============================================================ */
.debate-section{
  background:
    radial-gradient(ellipse at top, rgba(200,16,46,.12), transparent 60%),
    linear-gradient(180deg, #1a1820 0%, #0f0c12 100%);
  border:1px solid rgba(200,16,46,.35);
  border-radius:var(--r);
  padding:1.1rem 1rem .9rem;
  margin-bottom:1rem;
  position:relative;
  overflow:hidden;
}
.debate-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, var(--carp-dark), var(--carp), var(--gold), var(--carp), var(--carp-dark));
  background-size:200% 100%;
  animation:headerShine 6s linear infinite;
}
.deb-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.deb-icon{font-size:18px;filter:drop-shadow(0 0 6px rgba(200,16,46,.5))}
.deb-title-t{
  font-family:'Bebas Neue', 'Noto Sans JP', sans-serif;
  font-size:18px;letter-spacing:.1em;
  background:linear-gradient(90deg, #ff4060, var(--gold));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.deb-sub{font-size:11px;color:var(--muted);margin-bottom:14px;margin-left:26px}
.deb-list{display:flex;flex-direction:column;gap:14px}
.deb-card{
  background:linear-gradient(180deg, var(--surface) 0%, #0d1117 100%);
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--rs);
  padding:.9rem 1rem;
  position:relative;
  transition:border-color .2s;
}
.deb-card:hover{border-color:rgba(200,16,46,.4)}
.deb-q{font-size:14.5px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:4px}
.deb-ctx{font-size:11px;color:var(--muted);line-height:1.55;margin-bottom:10px}
.deb-choices{display:flex;flex-direction:column;gap:6px}
.deb-choice{
  display:flex;align-items:center;gap:8px;
  padding:.6rem .8rem;
  border:1px solid var(--border2);
  background:var(--bg);
  border-radius:var(--rs);
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all .15s;
  font-family:'Noto Sans JP',sans-serif;
  text-align:left;
  width:100%;
  color:var(--text);
  font-size:13px;
}
.deb-choice:hover{border-color:var(--carp);background:rgba(200,16,46,.05);transform:translateX(2px)}
.deb-choice.picked{border-color:var(--gold);background:linear-gradient(90deg, rgba(240,192,64,.1), rgba(200,16,46,.05));box-shadow:0 0 14px rgba(240,192,64,.2)}
.deb-choice-fill{
  position:absolute;left:0;top:0;bottom:0;
  background:linear-gradient(90deg, rgba(200,16,46,.2), rgba(240,192,64,.18));
  transition:width .5s ease;z-index:0;
}
.deb-choice.picked .deb-choice-fill{
  background:linear-gradient(90deg, rgba(240,192,64,.3), rgba(200,16,46,.22));
}
.deb-choice-body{position:relative;z-index:1;flex:1;display:flex;align-items:center;gap:8px}
.deb-choice-stance{
  font-size:9.5px;font-weight:700;
  padding:1px 6px;border-radius:3px;
  background:rgba(255,255,255,.08);
  color:var(--muted);
  letter-spacing:.05em;
  white-space:nowrap;
}
.deb-choice.picked .deb-choice-stance{background:rgba(240,192,64,.2);color:var(--gold-bright)}
.deb-choice-pct{
  position:relative;z-index:1;
  font-size:11px;font-weight:700;color:var(--muted);
  white-space:nowrap;
  font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;
}
.deb-choice.picked .deb-choice-pct{color:var(--gold-bright)}
.deb-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:10px;color:var(--muted)}
.deb-stance-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;background:rgba(240,192,64,.14);color:var(--gold);font-weight:700;font-size:10px}
.deb-cmt-wrap{margin-top:10px;padding-top:8px;border-top:1px dashed var(--border2)}
.deb-cmt-input-row{display:flex;gap:6px;margin-top:6px}
.deb-cmt-input{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:.45rem .7rem;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--text)}
.deb-cmt-input:focus{outline:none;border-color:var(--carp)}
.deb-cmt-btn{padding:.45rem .8rem;background:linear-gradient(180deg, var(--carp-bright), var(--carp));color:#fff;border:none;border-radius:var(--rs);font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
.deb-cmt-list{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;margin-top:6px}
.deb-cmt-item{font-size:12px;line-height:1.5;padding:.5rem .65rem;background:rgba(255,255,255,.03);border-radius:6px;border-left:2px solid transparent}
.deb-cmt-item.minority{border-left-color:var(--gold);background:rgba(240,192,64,.05)}
.deb-cmt-stance{font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,.08);color:var(--muted);margin-right:6px;letter-spacing:.04em}
.deb-cmt-stance.minority{background:rgba(240,192,64,.2);color:var(--gold-bright)}
.deb-cmt-time{font-size:10px;color:var(--faint);margin-left:auto}
.deb-empty{padding:1rem;text-align:center;font-size:12px;color:var(--muted);line-height:1.6}
</style>
</head>
<body>
<header>
  <div><div class="site-title">本日のカープトーク</div><div class="site-sub">広島東洋カープ ファン議論</div></div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="online-dot"></div>
    <div id="live-update" style="display:none" class="live-update"><div class="live-dot"></div>更新されました</div>
  </div>
</header>

<div class="wrap">
  <div class="date-nav">
    <button class="date-nav-btn" id="btn-prev" onclick="goDate(-1)">← 前日</button>
    <span id="date-nav-label" style="font-size:14px;font-weight:500">読み込み中...</span>
    <button class="date-nav-btn" id="btn-next" onclick="goDate(1)">翌日 →</button>
  </div>
  <div id="main-content">
    <div style="text-align:center;padding:4rem 0;color:var(--muted)"><span class="spin"></span></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="popup-overlay" id="popup-overlay" style="display:none" onclick="closePopupOverlay(event)">
  <div class="popup-sheet" id="popup-sheet">
    <div class="popup-handle"></div>
    <div class="popup-title" id="popup-title">✓ <span id="popup-title-text">分岐点に投票しました</span></div>
    <div class="popup-sub" id="popup-sub">一言コメントや選手評価を追加しますか？</div>
    <div class="popup-tabs">
      <button class="ptab active" id="ptab-cmt" onclick="switchPopupTab('cmt')">💬 コメント</button>
      <button class="ptab" id="ptab-rate" onclick="switchPopupTab('rate')">⭐ 選手評価</button>
      <button class="ptab" id="ptab-skip" onclick="closePopup()">スキップ</button>
    </div>
    <div class="popup-tab-content" id="popup-tab-content"></div>
    <div class="x-share-wrap" id="popup-x-share" style="display:none">
      <button class="x-share-btn" onclick="shareToX(getTurningShareText(popupTurningId))">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Xでシェア
      </button>
    </div>
    <div class="popup-footer">
      <button class="popup-skip" onclick="closePopup()">スキップ</button>
      <button class="popup-submit" id="popup-submit-btn" onclick="submitPopup()">投稿して閉じる</button>
    </div>
  </div>
</div>

// ===== ユーティリティ =====
function todayStr(){var d=new Date();return d.getFullYear()+'-'+(String(d.getMonth()+1).padStart(2,'0'))+'-'+(String(d.getDate()).padStart(2,'0'));}
function dateLabel(str){var p=str.split('-');return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日';}
function addDays(str,n){var d=new Date(str);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hashStr(s){var h=0;for(var i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return h;}
function formatTime(iso){var d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/1000);if(diff<60)return 'たった今';if(diff<3600)return Math.floor(diff/60)+'分前';if(diff<86400)return Math.floor(diff/3600)+'時間前';return (d.getMonth()+1)+'/'+d.getDate();}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function goDate(n){var nd=addDays(currentDate,n);history.pushState({},'','/?date='+nd);loadGame(nd);}
function getEmotion(flow){if(flow<=20)return{label:'圧倒',cls:'em-push'};if(flow<=30)return{label:'押してる',cls:'em-push'};if(flow<=42)return{label:'緊張',cls:'em-tens'};if(flow<=60)return{label:'耐えてる',cls:'em-hold'};if(flow<=73)return{label:'ピンチ',cls:'em-hold'};return{label:'崩壊',cls:'em-hold'};}

// ===== 日付ナビ =====
function updateDateNav(date){
  var today=todayStr();
  var tomorrow=addDays(today,1);
  document.getElementById('date-nav-label').textContent=dateLabel(date)+(date===today?' (今日)':'');
  // 翌日まで選択可能（試合前プレビューを見られるように）
  document.getElementById('btn-next').disabled=(date>=tomorrow);
}

// ===== ゲーム読み込み =====
async function loadGame(date){
  currentDate=date;
  updateDateNav(date);
  document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:4rem 0;color:var(--muted)"><span class="spin"></span></div>';
  var r=await fetch('/games/'+date+'.json?t='+Date.now());
  if(!r.ok){
    document.getElementById('main-content').innerHTML=
      '<div class="no-game">'+
      '<div class="no-game-icon">⚾</div>'+
      '<div class="no-game-title">試合データなし</div>'+
      '<div class="no-game-sub">'+dateLabel(date)+'の試合データは準備中です</div>'+
      '<a href="/?date='+addDays(date,-1)+'" class="no-game-link">← 前日の試合を見る</a>'+
      '</div>';
    return;
  }
  var g=await r.json();
  GAME_ID=g.id;GAME={home:g.home_team,away:g.away_team,homeScore:g.home_score,awayScore:g.away_score,date:dateLabel(g.game_date),venue:g.venue,innings:g.innings||{},startTime:g.start_time||'',awayPitcher:g.away_pitcher||'',homePitcher:g.home_pitcher||'',status:g.status||'final',title_candidates:g.title_candidates||[],pitchers:g.pitchers||[],result_label:g.result_label||'',moments:g.moments||[],positives:g.positives||[],debates:g.debates||[],team_analysis:g.team_analysis||null,preview:g.preview||null};
  isScheduled=g.status==='scheduled';
  isCancelled=g.status==='cancelled';
  MOMENTS=g.moments||[];PLAYERS=g.players||[];
  // リセット
  titleVotes={};myTitleVote=null;turnings=[];myTurning=null;
  allComments=[];myLikes=new Set();currentCTab='all';currentCType='a';formIntensity={};
  fanPositives=[];myPosLikes=new Set();
  debateVotes={};myDebateVotes={};debateComments={};
  moodCounts={angry:0,sigh:0,mixed:0,light:0,best:0};myMood=null;
  renderMain(g);
  await initApp(g);
}

async function runAIAnalysis(){
  var btn=document.getElementById('ai-btn');
  var result=document.getElementById('ai-result');
  if(!btn||!result) return;
  btn.disabled=true;btn.textContent='⏳ 読み込み中...';
  result.innerHTML='<div style="font-size:12px;color:var(--muted);margin-top:8px;text-align:center">分析データを読み込んでいます...</div>';
  try{
    // 試合JSON（GAME）の team_analysis を最優先
    var ta=GAME&&GAME.team_analysis;
    if(ta&&(ta.issues||ta.improvements||ta.fan_voice)){
      var html='<div class="ai-result-wrap" style="margin-top:10px">';
      if(ta.issues&&ta.issues.length){
        html+='<div style="font-size:11px;font-weight:700;color:#ff8090;letter-spacing:.08em;margin-bottom:4px">■ 現状の課題</div>';
        html+='<ul style="font-size:13px;color:var(--text);line-height:1.7;margin:0 0 12px 1rem;padding:0">'+
          ta.issues.map(function(s){return '<li style="margin-bottom:3px">'+esc(s)+'</li>';}).join('')+'</ul>';
      }
      if(ta.improvements&&ta.improvements.length){
        html+='<div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.08em;margin-bottom:4px">■ 改善案</div>';
        html+='<ul style="font-size:13px;color:var(--text);line-height:1.7;margin:0 0 12px 1rem;padding:0">'+
          ta.improvements.map(function(s){return '<li style="margin-bottom:3px">'+esc(s)+'</li>';}).join('')+'</ul>';
      }
      if(ta.fan_voice){
        html+='<div style="font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.08em;margin-bottom:4px">■ ファンの本音</div>';
        html+='<p style="font-size:13px;color:var(--text);line-height:1.7;margin:0;font-style:italic;border-left:2px solid var(--blue);padding-left:.65rem">「'+esc(ta.fan_voice)+'」</p>';
      }
      html+='</div>';
      result.innerHTML=html;
      btn.disabled=false;btn.textContent='🔄 再読み込み';
      return;
    }
    // フォールバック: 旧形式の Supabase ai_analysis テーブル
    var cached=await sb.from('ai_analysis').select('content').eq('game_id',GAME_ID).maybeSingle();
    if(cached.data&&cached.data.content){
      var rawText=cached.data.content;
      result.innerHTML='<div class="ai-result-wrap"><p style="font-size:13px;color:var(--text);line-height:1.9;white-space:pre-wrap;margin:0">'+esc(rawText)+'</p></div>';
      btn.disabled=false;btn.textContent='🔄 再読み込み';
      return;
    }
    result.innerHTML='<div style="font-size:13px;color:var(--muted);margin-top:8px;text-align:center;line-height:1.8">⚙️ この試合の分析はまだ準備中です。<br>試合終了後に更新されます。</div>';
    btn.disabled=false;btn.textContent='▶ 分析を実行する';
    return;
  
    var gameIds=['npb_20260407','npb_20260408','npb_20260409','npb_20260410','npb_20260411','npb_20260412','npb_20260414','npb_20260415','npb_20260417','npb_20260418','npb_20260419'];
    var [tvRes,trRes,cmRes]=await Promise.all([
      sb.from('title_votes').select('title_text').in('game_id',gameIds),
      sb.from('turning_votes').select('choice').in('game_id',gameIds),
      sb.from('comments').select('body').in('game_id',gameIds)
    ]);
    var titleCounts={};
    (tvRes.data||[]).forEach(function(v){titleCounts[v.title_text]=(titleCounts[v.title_text]||0)+1;});
    var choiceCounts={};
    (trRes.data||[]).forEach(function(v){if(v.choice)choiceCounts[v.choice]=(choiceCounts[v.choice]||0)+1;});
    var topTitles=Object.entries(titleCounts).sort(function(a,b){return b[1]-a[1];}).slice(0,8).map(function(e){return e[1]+'票「'+e[0]+'」';}).join('\n');
    var topChoices=Object.entries(choiceCounts).sort(function(a,b){return b[1]-a[1];}).slice(0,10).map(function(e){return e[1]+'票：'+e[0];}).join('\n');
    var comments=(cmRes.data||[]).slice(0,15).map(function(c){return c.body;}).join('、');
    var prompt='あなたは広島東洋カープのデータアナリストです。2026年4月のファン投票データを分析してください。\n\n【ファンが選んだ試合タイトル上位】\n'+topTitles+'\n\n【分岐点での選択肢ランキング】\n'+topChoices+'\n\n【ファンコメント】'+comments+'\n\n以下の形式で分析してください：\n\n■ 現状の課題（3点、各50字以内、データの根拠付き）\n\n■ 改善案（3点、各50字以内、具体的に）\n\n■ ファンの本音（100字以内で温度感を表現）';
    var apiRes=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},method:'POST',
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    var apiJson=await apiRes.json();
    var text=(apiJson.content&&apiJson.content[0])?apiJson.content[0].text:'分析に失敗しました';
    // セクション分割して表示
    var sections=text.split(/\n(?=■)/);
    var html=sections.map(function(s){
      var lines=s.trim().split('\n');
      var title=lines[0]||'';
      var body=lines.slice(1).join('\n').trim();
      return '<div class="ai-result-section"><h4>'+esc(title)+'</h4><p style="font-size:13px;color:var(--text);line-height:1.8;margin:0">'+esc(body)+'</p></div>';
    }).join('');
    result.innerHTML='<div class="ai-result-wrap">'+html+'</div>';
  }catch(e){
    result.innerHTML='<div style="font-size:12px;color:var(--muted);margin-top:8px">分析に失敗しました</div>';
    console.error(e);
  }
  btn.disabled=false;btn.textContent='🔄 再分析する';
}

// ===== 📊 選手の調子（直近7日成績）=====
var RECENT_FORM=null, currentFormTab='bat';

function renderRecentForm(){
  var sec=document.getElementById('form-section');
  if(!sec) return;
  fetch('/games/recent_form.json?t='+Date.now()).then(function(r){
    return r.ok ? r.json() : null;
  }).then(function(d){
    var hasBat=d && Array.isArray(d.players) && d.players.length>0;
    var hasPit=d && Array.isArray(d.pitchers) && d.pitchers.length>0;
    if(!hasBat && !hasPit){
      sec.style.display='none';
      return;
    }
    RECENT_FORM=d;
    sec.style.display='';
    var rangeEl=document.getElementById('form-range');
    if(rangeEl) rangeEl.textContent=(d.rangeStart||'')+' 〜 '+(d.rangeEnd||'');
    // デフォルトタブ: 野手データがあれば野手、無ければ投手
    currentFormTab=hasBat?'bat':'pit';
    switchFormTab(currentFormTab);
  }).catch(function(){
    sec.style.display='none';
  });
}

function switchFormTab(tab){
  if(!RECENT_FORM) return;
  currentFormTab=tab;
  // タブのactive切り替え
  document.querySelectorAll('.form-tab').forEach(function(b){
    b.classList.toggle('active', b.dataset.ftab===tab);
  });
  var d=RECENT_FORM;
  var isBat=(tab==='bat');
  var rows=isBat?(d.players||[]):(d.pitchers||[]);
  var mvp=isBat?d.mvp:d.pitcherMvp;
  var worst=isBat?d.worst:d.pitcherWorst;

  var subEl=document.getElementById('form-sub');
  if(subEl) subEl.textContent=isBat?'直近の打撃成績から算出':'直近の登板成績（防御率）から算出';
  var discEl=document.getElementById('form-disclaimer');
  if(discEl) discEl.textContent=isBat
    ?'※ 打数が少ない選手は「様子見」表示。サンプル数も併記しています'
    :'※ 投球回3未満の投手は「様子見」表示。直近の防御率で判定しています';

  // MVP / 心配な選手
  var pickup=document.getElementById('form-pickup');
  if(pickup){
    var html='';
    if(mvp){
      html+='<div class="form-pick pick-mvp">'+
        '<div class="form-pick-lbl">'+(isBat?'🔥 直近の主役':'🔥 直近の柱')+'</div>'+
        '<div class="form-pick-name">'+(mvp.form?mvp.form.icon:'')+' '+esc(mvp.name)+'</div>'+
        '<div class="form-pick-sum">'+esc(mvp.summary||'')+'</div>'+
      '</div>';
    }
    if(worst){
      html+='<div class="form-pick pick-worst">'+
        '<div class="form-pick-lbl">💧 気がかりな'+(isBat?'選手':'投手')+'</div>'+
        '<div class="form-pick-name">'+(worst.form?worst.form.icon:'')+' '+esc(worst.name)+'</div>'+
        '<div class="form-pick-sum">'+esc(worst.summary||'')+'</div>'+
      '</div>';
    }
    pickup.innerHTML=html;
  }

  // リスト
  var list=document.getElementById('form-list');
  if(list){
    if(rows.length===0){
      list.innerHTML='<div style="font-size:12px;color:var(--muted);text-align:center;padding:1rem 0">'+
        (isBat?'野手':'投手')+'の直近データがまだありません</div>';
    } else {
      list.innerHTML=rows.map(function(p){
        var f=p.form||{};
        return '<div class="form-row">'+
          '<div class="form-badge '+(f.cls||'form-none')+'">'+(f.icon||'－')+
            '<span class="fb-label">'+esc(f.label||'')+'</span>'+
          '</div>'+
          '<div class="form-row-body">'+
            '<div class="form-row-name">'+esc(p.name)+'</div>'+
            '<div class="form-row-sum">'+esc(p.summary||'')+'</div>'+
          '</div>'+
        '</div>';
      }).join('');
    }
  }
}

function renderPositives(){
  var aiList=document.getElementById('pos-ai-list');
  var fanList=document.getElementById('pos-fan-list');
  if(!aiList||!fanList) return;
  var curated=(GAME.positives||[]);
  if(curated.length===0){
    aiList.innerHTML='<div class="pos-fan-empty">この試合の「光」はまだ準備中です。<br>次の試合までに届ける予定です。</div>';
  } else {
    aiList.innerHTML=curated.map(function(p){
      var layer=p.layer||1;
      var tagClass=layer===2?'layer-2':(layer===3?'layer-3':'');
      var liked=myPosLikes.has(p.id);
      var likeCount=p.like_count||0;
      return '<div class="pos-card '+tagClass+'">'+
        '<div class="pos-tag">'+esc(p.tag||'小さな光')+'</div>'+
        '<div class="pos-t">'+esc(p.title||'')+'</div>'+
        '<div class="pos-d">'+esc(p.desc||'')+'</div>'+
        '<div class="pos-card-actions">'+
        '<button class="pos-like-btn'+(liked?' liked':'')+'" onclick="likeCuratedPositive(\''+esc(p.id)+'\')">'+(liked?'✓ わかる':'👍 わかる')+(likeCount>0?' '+likeCount:'')+'</button>'+
        '<button class="pos-share-btn" onclick="sharePositiveOne(\''+esc(p.id)+'\')">🐦 シェア</button>'+
        '</div>'+
        '</div>';
    }).join('');
  }
  renderFanPositives();
}

function renderFanPositives(){
  var fanList=document.getElementById('pos-fan-list');
  if(!fanList) return;
  if(!fanPositives||fanPositives.length===0){
    fanList.innerHTML='<div class="pos-fan-empty">まだファン投稿はありません。<br>あなたが「光」を見つけて、最初の一人になりましょう。</div>';
    return;
  }
  // いいねの多い順
  var sorted=fanPositives.slice().sort(function(a,b){return (b.like_count||0)-(a.like_count||0);});
  fanList.innerHTML=sorted.map(function(p){
    var liked=myPosLikes.has('f_'+p.id);
    var likeCount=p.like_count||0;
    return '<div class="pos-card layer-3">'+
      '<div class="pos-tag">ファン発見</div>'+
      '<div class="pos-t">'+esc(p.body||'')+'</div>'+
      '<div class="pos-card-actions">'+
      '<button class="pos-like-btn'+(liked?' liked':'')+'" onclick="likeFanPositive(\''+esc(p.id)+'\')">'+(liked?'✓ わかる':'👍 わかる')+(likeCount>0?' '+likeCount:'')+'</button>'+
      '<button class="pos-share-btn" onclick="shareFanPositive(\''+esc(p.id)+'\')">🐦 シェア</button>'+
      '<span class="pos-meta">'+formatTime(p.created_at)+'</span>'+
      '</div>'+
      '</div>';
  }).join('');
}

function switchPosTab(tab){
  currentPosTab=tab;
  document.querySelectorAll('.pos-tab').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  document.getElementById('pos-body-ai').classList.toggle('active', tab==='ai');
  document.getElementById('pos-body-fan').classList.toggle('active', tab==='fan');
  // display:none/block はCSSのactiveクラスに任せる
  document.getElementById('pos-body-ai').style.display=tab==='ai'?'block':'none';
  document.getElementById('pos-body-fan').style.display=tab==='fan'?'block':'none';
}

async function loadFanPositives(){
  try{
    var r=await sb.from('fan_positives').select('*').eq('game_id',GAME_ID).order('created_at',{ascending:false});
    fanPositives=r.data||[];
    // いいね数を取得
    if(fanPositives.length>0){
      var ids=fanPositives.map(function(p){return p.id;});
      var lk=await sb.from('fan_positive_likes').select('positive_id,user_id').in('positive_id',ids);
      var counts={};
      (lk.data||[]).forEach(function(l){
        counts[l.positive_id]=(counts[l.positive_id]||0)+1;
        if(l.user_id===userId) myPosLikes.add('f_'+l.positive_id);
      });
      fanPositives.forEach(function(p){p.like_count=counts[p.id]||0;});
    }
    renderFanPositives();
  }catch(e){
    console.warn('[fan_positives] load failed:', e.message||e);
  }
}

async function postFanPositive(){
  var inp=document.getElementById('pos-post-inp');
  if(!inp) return;
  var txt=(inp.value||'').trim();
  if(!txt){showToast('内容を入力してください');return;}
  if(txt.length<5){showToast('もう少し詳しく書いてください');return;}
  try{
    var r=await sb.from('fan_positives').insert({game_id:GAME_ID,user_id:userId,body:txt}).select().single();
    if(r.error) throw r.error;
    inp.value='';
    if(r.data){
      fanPositives.unshift(r.data);
      renderFanPositives();
    }
    if(typeof renderMyCard==='function') renderMyCard();
    showToast('✨ 投稿しました');
  }catch(e){
    showToast('投稿に失敗しました');
    console.warn('[fan_positives] insert failed:', e.message||e);
  }
}

async function likeFanPositive(id){
  var key='f_'+id;
  var p=fanPositives.find(function(x){return x.id===id;});
  if(!p) return;
  try{
    if(myPosLikes.has(key)){
      await sb.from('fan_positive_likes').delete().eq('positive_id',id).eq('user_id',userId);
      myPosLikes.delete(key);
      p.like_count=Math.max(0,(p.like_count||1)-1);
    } else {
      await sb.from('fan_positive_likes').insert({positive_id:id,user_id:userId});
      myPosLikes.add(key);
      p.like_count=(p.like_count||0)+1;
    }
    renderFanPositives();
    if(typeof renderMyCard==='function') renderMyCard();
  }catch(e){
    showToast('操作に失敗しました');
  }
}

// キュレーションポジへの「わかる」はローカル保存（軽量）
async function likeCuratedPositive(id){
  var p=(GAME.positives||[]).find(function(x){return x.id===id;});
  if(!p) return;
  try{
    if(myPosLikes.has(id)){
      await sb.from('fan_positive_likes').delete().eq('positive_id',id).eq('user_id',userId);
      myPosLikes.delete(id);
      p.like_count=Math.max(0,(p.like_count||1)-1);
    } else {
      // キュレーション用のダミーpositive_idを使い、同じテーブルで管理
      await sb.from('fan_positive_likes').insert({positive_id:id,user_id:userId});
      myPosLikes.add(id);
      p.like_count=(p.like_count||0)+1;
    }
    renderPositives();
    if(typeof renderMyCard==='function') renderMyCard();
  }catch(e){
    // スキーマが未セットアップの場合はローカルだけ更新
    if(myPosLikes.has(id)){
      myPosLikes.delete(id);
      p.like_count=Math.max(0,(p.like_count||1)-1);
    } else {
      myPosLikes.add(id);
      p.like_count=(p.like_count||0)+1;
    }
    renderPositives();
    if(typeof renderMyCard==='function') renderMyCard();
  }
}

async function loadCuratedPositiveLikes(){
  var curated=GAME.positives||[];
  if(curated.length===0) return;
  try{
    var ids=curated.map(function(p){return p.id;});
    var r=await sb.from('fan_positive_likes').select('positive_id,user_id').in('positive_id',ids);
    var counts={};
    (r.data||[]).forEach(function(l){
      counts[l.positive_id]=(counts[l.positive_id]||0)+1;
      if(l.user_id===userId) myPosLikes.add(l.positive_id);
    });
    curated.forEach(function(p){p.like_count=counts[p.id]||0;});
    renderPositives();
  }catch(e){
    // テーブル未作成時はスキップ
  }
}

function renderPreview(){
  var sec = document.getElementById('preview-section');
  if(!sec) return;

  var hasContent = p && (
    (Array.isArray(p.watchpoints) && p.watchpoints.length) ||
    (Array.isArray(p.key_players) && p.key_players.length) ||
    p.predicted_flow
  );
  // 中止時 or 中身なしは非表示。試合終了後は「答え合わせ」として折りたたみ表示。
  if(!hasContent || GAME.status === 'cancelled'){
    sec.style.display = 'none';
    return;
  }
  sec.style.display = '';
  var isFinalReview = (GAME.status === 'final');

  // ヘッダー/サブ/折りたたみ状態を状況で切り替え
  var headEl = sec.querySelector('.pv-head');
  var subEl = sec.querySelector('.pv-sub');
  if(isFinalReview){
    sec.classList.add('pv-review');

      sec.dataset.pvInit = '1';

      headEl.classList.remove('pv-head-toggle');

      headEl.innerHTML = '<span class="pv-icon">🔮</span><span class="pv-title-t">今日の見どころ</span>';
