name: Update game data

# データ更新タイミング:
# - 朝 (JST 8:00, 10:00, 12:00) = 試合前のスケジュール・先発情報を反映
# - JST 13:00 = デーゲーム1時間前のベンチ入り公示反映
# - 試合中〜終了後 (JST 14:00〜23:30 30分毎) = 結果データを生成
# UTC換算: JST = UTC + 9
on:
  schedule:
    # GitHub Actions の cron は :00 で混みがち＆ベストエフォートなので
    # オフピーク分（:17 / :47 など）にも仕掛けて多重化する
    # 朝〜試合前 (JST 7:47〜13:47) の取得タイミングを多めに
    - cron: '47 22 * * *'      # JST 7:47
    - cron: '17 23 * * *'      # JST 8:17
    - cron: '47 23 * * *'      # JST 8:47
    - cron: '17 0 * * *'       # JST 9:17
    - cron: '17 1 * * *'       # JST 10:17
    - cron: '47 1 * * *'       # JST 10:47
    - cron: '17 2 * * *'       # JST 11:17
    - cron: '17 3 * * *'       # JST 12:17
    - cron: '47 3 * * *'       # JST 12:47
    - cron: '17 4 * * *'       # JST 13:17
    - cron: '47 4 * * *'       # JST 13:47
    # 試合中〜終了後 JST 14:00〜23:50 で 15分毎程度
    - cron: '7,22,37,52 5-14 * * *'  # JST 14:07/22/37/52 ... 23:52
  workflow_dispatch:
    inputs:
      date:
        description: '対象日 (YYYY-MM-DD、空欄なら今日)'
        required: false
        default: ''
  # 外部cron（cron-job.org）から POST で起動可能
  repository_dispatch:
    types: [update-games]

permissions:
  contents: write

concurrency:
  group: update-games
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Resolve target date (JST)
        id: date
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}"
          DISPATCH_DATE="${{ github.event.client_payload.date }}"
          if [ -n "$INPUT_DATE" ]; then
            echo "value=$INPUT_DATE" >> $GITHUB_OUTPUT
          elif [ -n "$DISPATCH_DATE" ]; then
            echo "value=$DISPATCH_DATE" >> $GITHUB_OUTPUT
          else
            # GitHub Actions runner is UTC. Compute JST date.
            JST_DATE=$(TZ='Asia/Tokyo' date +%Y-%m-%d)
            echo "value=${JST_DATE}" >> $GITHUB_OUTPUT
          fi

      - name: Build game data
        id: build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          OUT=$(node scripts/build_game.mjs ${{ steps.date.outputs.value }} 2>&1)
          STATUS=$?
          echo "$OUT"
          echo "exit_code=${STATUS}" >> $GITHUB_OUTPUT
          # status 2 = no game / not finished, treat as success-but-no-update
          if [ "$STATUS" != "0" ] && [ "$STATUS" != "2" ]; then
            exit $STATUS
          fi

      - name: Commit changes (if any)
        if: steps.build.outputs.exit_code == '0'
        run: |
          git config user.name "carp-talk-bot"
          git config user.email "carp-talk-bot@users.noreply.github.com"
          # 新規未追跡ファイル＋既存ファイルの変更の両方を検知
          if [ -z "$(git status --porcelain games/)" ]; then
            echo "No changes in games/."
          else
            echo "Changes detected:"
            git status --porcelain games/
            git add games/
            git commit -m "data: auto-update ${{ steps.date.outputs.value }}"
            # Push with retry (rebase in case main moved)
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              sleep 5
            done
          fi
