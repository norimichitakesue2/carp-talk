name: Refresh Carp batters cache

# 1日1回 nf3 から全カープ打者の通算/対右/対左 成績を取得して
# games/nf3_carp_batters.json に保存する。
# build_game.mjs がこれを読んで AI プロンプトに利用する。
#
# nf3 への配慮:
# - 1日1回のみ実行
# - 1.5秒スリープで14-20選手を順次取得 (約30秒で完了)

on:
  schedule:
    # JST 04:00 = UTC 19:00 (前日)
    - cron: '0 19 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-carp-batters
  cancel-in-progress: false  # データ取得は最後まで走らせる

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Refresh carp batter stats from nf3
        run: node scripts/refresh_carp_batters.mjs

      - name: Refresh Carp farm stats from NPB
        run: node scripts/fetch_npb_farm.mjs || true

      - name: Refresh Carp official roster from NPB公示
        run: node scripts/fetch_npb_official_roster.mjs || true

      - name: Commit changes (if any)
        run: |
          git config user.name "carp-talk-bot"
          git config user.email "carp-talk-bot@users.noreply.github.com"
          FILES="games/nf3_carp_batters.json games/npb_farm_carp.json games/npb_official_roster_c.json"
          if [ -z "$(git status --porcelain $FILES)" ]; then
            echo "No changes."
          else
            git add $FILES
            git commit -m "data: refresh carp batter + farm + roster"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin HEAD:main && break
              sleep 5
            done
          fi
